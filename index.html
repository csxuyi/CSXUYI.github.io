<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星穹祈愿 · 主页</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ===== vortex canvas ===== */
html,body{
  margin:0px;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
}
#canvas{
  position:absolute;
  width:100%;
  height:100%;
}

/* ===== UI layer ===== */
:root{
  --gold:#D4B87A;--g2:#E8D5A3;--g3:#F5E6CC;--g4:#B89A50;
  --purple:#B08FFF;--p2:#c8b0ff;
  --text:#E8E0D0;--t2:#9999AA;
  --ft:"Noto Serif SC","STSong","SimSun",serif;
  --fu:"Inter","PingFang SC","Microsoft YaHei",sans-serif;
}

.vignette{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse at 50% 40%, transparent 25%, rgba(0,0,0,0.6) 100%);
}

.hero{
  position:fixed;inset:0;z-index:2;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 20px;text-align:center;pointer-events:none;
  transition:opacity 0.5s ease, transform 0.6s cubic-bezier(0.22,1,0.36,1);
}
.hero>*{pointer-events:auto}
.hero.warping{opacity:0;transform:scale(0.92)}
.vignette{transition:opacity 0.4s ease}
.vignette.warping{opacity:0}
.footer{transition:opacity 0.4s ease}
.footer.warping{opacity:0}

.hero .logo{
  font-family:var(--ft);font-size:3rem;font-weight:900;
  background:linear-gradient(180deg,var(--g3),var(--gold),var(--g4));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:12px;letter-spacing:0.12em;
  text-shadow:0 0 80px rgba(212,184,122,0.3);
}
.hero .subtitle{
  font-family:var(--ft);font-size:1rem;color:var(--t2);
  letter-spacing:0.2em;margin-bottom:60px;
}

.portals{
  display:flex;gap:24px;flex-wrap:wrap;justify-content:center;
  max-width:900px;width:100%;
}
/* Frosted glass blobs behind cards — give backdrop-filter something to blur */
.portals::before{
  content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(ellipse 300px 350px at 20% 55%, rgba(212,175,110,0.10) 0%, transparent 70%),
    radial-gradient(ellipse 250px 300px at 75% 45%, rgba(176,143,255,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 200px 250px at 50% 60%, rgba(100,160,220,0.06) 0%, transparent 70%);
}
.portal{
  flex:1;min-width:200px;max-width:240px;
  padding:40px 28px;border-radius:24px;
  /* Frosted glass core */
  background:rgba(18,22,40,0.28);
  backdrop-filter:blur(14px) saturate(150%) brightness(1.05);
  -webkit-backdrop-filter:blur(14px) saturate(150%) brightness(1.05);
  /* Directional borders — light from top-left, glass edge highlight */
  border-top:1px solid rgba(255,255,255,0.16);
  border-left:1px solid rgba(255,255,255,0.12);
  border-right:1px solid rgba(255,255,255,0.05);
  border-bottom:1px solid rgba(255,255,255,0.03);
  /* Multi-layer shadow for glass depth */
  box-shadow:
    0 20px 50px rgba(0,0,0,0.45),
    0 0 0 1px rgba(255,255,255,0.02) inset,
    0 1px 0 rgba(255,255,255,0.05) inset;
  text-decoration:none;color:inherit;
  transition:transform 0.4s cubic-bezier(0.22,1,0.36,1),box-shadow 0.4s ease,border-color 0.4s ease;
  display:flex;flex-direction:column;align-items:center;gap:16px;
}
.portal:hover{
  transform:translateY(-10px);
  border-top-color:rgba(255,255,255,0.28);
  border-left-color:rgba(255,255,255,0.20);
  border-right-color:rgba(255,255,255,0.10);
  border-bottom-color:rgba(255,255,255,0.06);
  box-shadow:
    0 30px 60px rgba(0,0,0,0.55),
    0 0 0 1px rgba(255,255,255,0.05) inset,
    0 1px 0 rgba(255,255,255,0.10) inset,
    0 0 80px rgba(212,184,122,0.10);
}
.portal-icon{
  width:72px;height:72px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;
  background:rgba(255,255,255,0.04);
  border-top:1px solid rgba(255,255,255,0.14);
  border-left:1px solid rgba(255,255,255,0.10);
  border-right:1px solid rgba(255,255,255,0.04);
  border-bottom:1px solid rgba(255,255,255,0.02);
  box-shadow:0 8px 24px rgba(0,0,0,0.3),0 0 0 1px rgba(255,255,255,0.02) inset;
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  transition:all 0.4s ease;
}
.portal:hover .portal-icon{
  transform:translateY(-2px);
  box-shadow:0 12px 32px rgba(0,0,0,0.4),0 0 0 1px rgba(255,255,255,0.05) inset;
}
.portal.wish .portal-icon{background:radial-gradient(circle,rgba(212,184,122,0.18),rgba(212,184,122,0.03));border-top-color:rgba(212,184,122,0.3);border-left-color:rgba(212,184,122,0.2)}
.portal.cards .portal-icon{background:radial-gradient(circle,rgba(176,143,255,0.15),rgba(176,143,255,0.02));border-top-color:rgba(176,143,255,0.25);border-left-color:rgba(176,143,255,0.18)}
.portal.daily .portal-icon{background:radial-gradient(circle,rgba(255,180,100,0.15),rgba(255,180,100,0.02));border-top-color:rgba(255,180,100,0.25);border-left-color:rgba(255,180,100,0.18)}
.portal.stats .portal-icon{background:radial-gradient(circle,rgba(130,200,230,0.15),rgba(130,200,230,0.02));border-top-color:rgba(130,200,230,0.25);border-left-color:rgba(130,200,230,0.18)}

.portal h2{font-family:var(--ft);font-size:1.4rem;font-weight:700}
.portal.wish h2{background:linear-gradient(180deg,var(--g3),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.portal.cards h2{background:linear-gradient(180deg,var(--p2),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.portal.daily h2{background:linear-gradient(180deg,#FFCC99,#FF9966);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.portal.stats h2{background:linear-gradient(180deg,#99DDFF,#55AADD);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.portal p{font-size:0.85rem;color:var(--t2);line-height:1.6}

.portal-arrow{
  font-size:0.9rem;color:var(--gold);opacity:0;
  transform:translateX(0);transition:all 0.3s ease;
}
.portal:hover .portal-arrow{opacity:1;transform:translateX(4px)}

.footer{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  z-index:2;font-size:0.75rem;color:var(--t2);
  letter-spacing:0.1em;
}

/* ===== Portal auto-fade: dim when mouse is away ===== */
.hero .logo,.hero .subtitle,.hero .portals{
  transition:opacity 0.8s ease; /* slow fade-out */
}
.hero:not(.dimmed) .logo,.hero:not(.dimmed) .subtitle,.hero:not(.dimmed) .portals{
  transition:opacity 0.2s ease; /* fast fade-in */
}
.hero.dimmed .logo{opacity:0.25}
.hero.dimmed .subtitle{opacity:0.18}
.hero.dimmed .portals{opacity:0.12;pointer-events:none}
.hero.dimmed .portals:hover{opacity:0.12}

/* ===== Guestbook ===== */
.guestbook-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;
  transition:transform 0.45s cubic-bezier(0.22,1,0.36,1);
  transform:translateY(calc(100% - 44px));
}
.guestbook-bar.open{transform:translateY(0)}

.guestbook-toggle{
  display:flex;align-items:center;gap:8px;
  padding:8px 24px;border-radius:14px 14px 0 0;
  background:rgba(18,22,40,0.35);
  backdrop-filter:blur(14px) saturate(150%) brightness(1.05);
  -webkit-backdrop-filter:blur(14px) saturate(150%) brightness(1.05);
  border-top:1px solid rgba(255,255,255,0.14);
  border-left:1px solid rgba(255,255,255,0.10);
  border-right:1px solid rgba(255,255,255,0.05);
  color:var(--g2);font-family:var(--ft);font-size:0.85rem;
  letter-spacing:2px;cursor:pointer;user-select:none;
  box-shadow:0 -4px 20px rgba(0,0,0,0.3);
  transition:all 0.3s ease;
}
.guestbook-toggle:hover{
  border-top-color:rgba(255,255,255,0.22);
  background:rgba(18,22,40,0.45);
  box-shadow:0 -6px 28px rgba(0,0,0,0.4),0 0 20px rgba(212,184,122,0.06);
}
.guestbook-arrow{
  display:inline-block;transition:transform 0.35s ease;
  font-size:0.7rem;
}
.guestbook-bar.open .guestbook-arrow{transform:rotate(180deg)}

.guestbook-body{
  width:100%;max-width:800px;max-height:55vh;overflow-y:auto;
  padding:20px 24px;
  background:rgba(12,18,38,0.42);
  backdrop-filter:blur(18px) saturate(150%) brightness(1.05);
  -webkit-backdrop-filter:blur(18px) saturate(150%) brightness(1.05);
  border-top:1px solid rgba(255,255,255,0.08);
  border-left:1px solid rgba(255,255,255,0.04);
  border-right:1px solid rgba(255,255,255,0.02);
  box-shadow:0 -8px 32px rgba(0,0,0,0.4);
}
.guestbook-body::-webkit-scrollbar{width:3px}
.guestbook-body::-webkit-scrollbar-thumb{background:rgba(212,184,122,0.18);border-radius:2px}
.guestbook-body h3{
  font-family:var(--ft);font-size:1.1rem;
  background:linear-gradient(180deg,var(--g3),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:16px;text-align:center;letter-spacing:2px;
}

@media(max-width:600px){
  .hero .logo{font-size:2.2rem}
  .portals{gap:20px}
  .portal{padding:30px 20px}
  .guestbook-body{max-height:45vh;padding:16px}
}
</style>

<script>
function project3D(x,y,z,vars){
	var p,d;
	x-=vars.camX;
	y-=vars.camY-8;
	z-=vars.camZ;
	p=Math.atan2(x,z);
	d=Math.sqrt(x*x+z*z);
	x=Math.sin(p-vars.yaw)*d;
	z=Math.cos(p-vars.yaw)*d;
	p=Math.atan2(y,z);
	d=Math.sqrt(y*y+z*z);
	y=Math.sin(p-vars.pitch)*d;
	z=Math.cos(p-vars.pitch)*d;
	var rx1=-1000;
	var ry1=1;
	var rx2=1000;
	var ry2=1;
	var rx3=0;
	var ry3=0;
	var rx4=x;
	var ry4=z;
	var uc=(ry4-ry3)*(rx2-rx1)-(rx4-rx3)*(ry2-ry1);
	var ua=((rx4-rx3)*(ry1-ry3)-(ry4-ry3)*(rx1-rx3))/uc;
	var ub=((rx2-rx1)*(ry1-ry3)-(ry2-ry1)*(rx1-rx3))/uc;
	if(!z)z=0.000000001;
	if(ua>0&&ua<1&&ub>0&&ub<1){
		return {
			x:vars.cx+(rx1+ua*(rx2-rx1))*vars.scale,
			y:vars.cy+y/z*vars.scale,
			d:(x*x+y*y+z*z)
		};
	}else{
		return { d:-1 };
	}
}
function elevation(x,y,z){
	var dist = Math.sqrt(x*x+y*y+z*z);
	if(dist && z/dist>=-1 && z/dist <=1) return Math.acos(z / dist);
	return 0.00000001;
}
function rgb(col){
	col += 0.000001;
	var r = parseInt((0.5+Math.sin(col)*0.5)*16);
	var g = parseInt((0.5+Math.cos(col)*0.5)*16);
	var b = parseInt((0.5-Math.sin(col)*0.5)*16);
	return "#"+r.toString(16)+g.toString(16)+b.toString(16);
}
function interpolateColors(RGB1,RGB2,degree){
	var w2=degree;
	var w1=1-w2;
	return [w1*RGB1[0]+w2*RGB2[0],w1*RGB1[1]+w2*RGB2[1],w1*RGB1[2]+w2*RGB2[2]];
}
function rgbArray(col){
	col += 0.000001;
	var r = parseInt((0.5+Math.sin(col)*0.5)*256);
	var g = parseInt((0.5+Math.cos(col)*0.5)*256);
	var b = parseInt((0.5-Math.sin(col)*0.5)*256);
	return [r, g, b];
}
function colorString(arr){
	var r = parseInt(arr[0]);
	var g = parseInt(arr[1]);
	var b = parseInt(arr[2]);
	return "#"+("0" + r.toString(16) ).slice (-2)+("0" + g.toString(16) ).slice (-2)+("0" + b.toString(16) ).slice (-2);
}
function process(vars){
	if(vars.points.length<vars.initParticles) for(var i=0;i<5;++i) spawnParticle(vars);
	var p,d,t;
	p = Math.atan2(vars.camX, vars.camZ);
	d = Math.sqrt(vars.camX * vars.camX + vars.camZ * vars.camZ);
	d -= Math.sin(vars.frameNo / 80) / 25;
	t = Math.cos(vars.frameNo / 300) / 165;
	vars.camX = Math.sin(p + t) * d;
	vars.camZ = Math.cos(p + t) * d;
	vars.camY = -Math.sin(vars.frameNo / 220) * 15;
	vars.yaw = Math.PI + p + t;
	vars.pitch = elevation(vars.camX, vars.camZ, vars.camY) - Math.PI / 2;
	var t;
	for(var i=0;i<vars.points.length;++i){
		x=vars.points[i].x;
		y=vars.points[i].y;
		z=vars.points[i].z;
		d=Math.sqrt(x*x+z*z)/1.0075;
		t=.1/(1+d*d/5);
		p=Math.atan2(x,z)+t;
		vars.points[i].x=Math.sin(p)*d;
		vars.points[i].z=Math.cos(p)*d;
		vars.points[i].y+=vars.points[i].vy*t*((Math.sqrt(vars.distributionRadius)-d)*2);
		if(vars.points[i].y>vars.vortexHeight/2 || d<.25){
			vars.points.splice(i,1);
			spawnParticle(vars);
		}
	}
}
function drawFloor(vars){
	var x,y,z,d,point,a;
	for (var i = -25; i <= 25; i += 1) {
		for (var j = -25; j <= 25; j += 1) {
			x = i*2;
			z = j*2;
			y = vars.floor;
			d = Math.sqrt(x * x + z * z);
			point = project3D(x, y-d*d/85, z, vars);
			if (point.d != -1) {
				size = 1 + 15000 / (1 + point.d);
				a = 0.15 - Math.pow(d / 50, 4) * 0.15;
				if (a > 0) {
					vars.ctx.fillStyle = colorString(interpolateColors(rgbArray(d/26-vars.frameNo/40),[0,128,32],.5+Math.sin(d/6-vars.frameNo/8)/2));
					vars.ctx.globalAlpha = a;
					vars.ctx.fillRect(point.x-size/2,point.y-size/2,size,size);
				}
			}
		}
	}
	vars.ctx.fillStyle = "#82f";
	for (var i = -25; i <= 25; i += 1) {
		for (var j = -25; j <= 25; j += 1) {
			x = i*2;
			z = j*2;
			y = -vars.floor;
			d = Math.sqrt(x * x + z * z);
			point = project3D(x, y+d*d/85, z, vars);
			if (point.d != -1) {
				size = 1 + 15000 / (1 + point.d);
				a = 0.15 - Math.pow(d / 50, 4) * 0.15;
				if (a > 0) {
					vars.ctx.fillStyle = colorString(interpolateColors(rgbArray(-d/26-vars.frameNo/40),[32,0,128],.5+Math.sin(-d/6-vars.frameNo/8)/2));
					vars.ctx.globalAlpha = a;
					vars.ctx.fillRect(point.x-size/2,point.y-size/2,size,size);
				}
			}
		}
	}
}
function sortFunction(a,b){
	return b.dist-a.dist;
}
function draw(vars){
	vars.ctx.globalAlpha=.15;
	vars.ctx.fillStyle="#000";
	vars.ctx.fillRect(0, 0, canvas.width, canvas.height);
	drawFloor(vars);
	var point,x,y,z,a;
	for(var i=0;i<vars.points.length;++i){
		x=vars.points[i].x;
		y=vars.points[i].y;
		z=vars.points[i].z;
		point=project3D(x,y,z,vars);
		if(point.d != -1){
			vars.points[i].dist=point.d;
			size=1+vars.points[i].radius/(1+point.d);
			d=Math.abs(vars.points[i].y);
			a = .8 - Math.pow(d / (vars.vortexHeight/2), 1000) * .8;
			vars.ctx.globalAlpha=a>=0&&a<=1?a:0;
			vars.ctx.fillStyle=rgb(vars.points[i].color);
			if(point.x>-1&&point.x<vars.canvas.width&&point.y>-1&&point.y<vars.canvas.height)vars.ctx.fillRect(point.x-size/2,point.y-size/2,size,size);
		}
	}
	vars.points.sort(sortFunction);
}
function spawnParticle(vars){

	var p,ls;
	pt={};
	p=Math.PI*2*Math.random();
	ls=Math.sqrt(Math.random()*vars.distributionRadius);
	pt.x=Math.sin(p)*ls;
	pt.y=-vars.vortexHeight/2;
	pt.vy=vars.initV/20+Math.random()*vars.initV;
	pt.z=Math.cos(p)*ls;
	pt.radius=200+800*Math.random();
	pt.color=pt.radius/1000+vars.frameNo/250;
	vars.points.push(pt);
}
function frame(vars) {
	if(vars === undefined){
		var vars={};
		vars.canvas = document.querySelector("canvas");
		vars.ctx = vars.canvas.getContext("2d");
		vars.canvas.width = document.body.clientWidth;
		vars.canvas.height = document.body.clientHeight;
		window.addEventListener("resize", function(){
			vars.canvas.width = document.body.clientWidth;
			vars.canvas.height = document.body.clientHeight;
			vars.cx=vars.canvas.width/2;
			vars.cy=vars.canvas.height/2;
		}, true);
		vars.frameNo=0;

		vars.camX = 0;
		vars.camY = 0;
		vars.camZ = -14;
		vars.pitch = elevation(vars.camX, vars.camZ, vars.camY) - Math.PI / 2;
		vars.yaw = 0;
		vars.cx=vars.canvas.width/2;
		vars.cy=vars.canvas.height/2;
		vars.bounding=10;
		vars.scale=500;
		vars.floor=26.5;

		vars.points=[];
		vars.initParticles=700;
		vars.initV=.01;
		vars.distributionRadius=800;
		vars.vortexHeight=25;
	}
	vars.frameNo++;
	requestAnimationFrame(function() {
		frame(vars);
	});
	process(vars);
	draw(vars);
}
frame();
</script>

<script>
/* ==============================================
   Hyperspace Warp Transition (Star Wars style)
   ============================================== */
(function(){
  var warpActive = false;

  // Intercept all portal clicks
  document.querySelectorAll('.portal').forEach(function(link){
    link.addEventListener('click', function(e){
      e.preventDefault();
      if(warpActive) return;
      var href = this.getAttribute('href');
      if(href) startWarp(href);
    });
  });

  function startWarp(targetUrl){
    warpActive = true;

    // Fade out UI layers
    document.querySelector('.hero').classList.add('warping');
    document.querySelector('.vignette').classList.add('warping');
    document.querySelector('.footer').classList.add('warping');

    // Create warp canvas on top of everything
    var warp = document.createElement('canvas');
    warp.style.cssText = 'position:fixed;inset:0;z-index:100;pointer-events:none';
    document.body.appendChild(warp);
    warp.width = window.innerWidth;
    warp.height = window.innerHeight;
    var ctx = warp.getContext('2d');

    var cx = warp.width / 2;
    var cy = warp.height / 2;

    // Hyperspace streaks — spawn from edges, race toward center
    var streaks = [];
    var STREAK_COUNT = 400;
    for (var i = 0; i < STREAK_COUNT; i++){
      streaks.push(spawnStreak(cx, cy, warp.width, warp.height, true));
    }

    var startTime = performance.now();
    var DURATION = 1800; // ms

    function spawnStreak(cx, cy, w, h, randomDist){
      // Spawn from far outside the viewport on a random edge
      var edge = Math.floor(Math.random() * 4);
      var x, y;
      var margin = 300;
      if(edge === 0){ x = Math.random() * w; y = -margin; }          // top
      else if(edge === 1){ x = w + margin; y = Math.random() * h; }   // right
      else if(edge === 2){ x = Math.random() * w; y = h + margin; }   // bottom
      else { x = -margin; y = Math.random() * h; }                     // left

      if(randomDist){
        // Randomize initial position along the path
        x += (cx - x) * (Math.random() * 0.8);
        y += (cy - y) * (Math.random() * 0.8);
      }

      // Slight randomization of target (vanishing point)
      var tx = cx + (Math.random() - 0.5) * 80;
      var ty = cy + (Math.random() - 0.5) * 60;

      var dx = tx - x;
      var dy = ty - y;
      var dist = Math.sqrt(dx * dx + dy * dy);

      return {
        x: x, y: y,
        tx: tx, ty: ty,
        nx: dx / dist, ny: dy / dist,
        dist: dist,
        speed: 4 + Math.random() * 12,
        length: 30 + Math.random() * 120,
        hue: Math.random() < 0.2 ? 40 : Math.random() < 0.5 ? 210 : 260,
        opacity: 0.5 + Math.random() * 0.5
      };
    }

    function animateWarp(ts){
      var elapsed = ts - startTime;
      var progress = Math.min(elapsed / DURATION, 1);
      // Aggressive ease-in: slow start → explosive finish
      var eased = Math.pow(progress, 4);

      // Fade-to-black overlay intensifies
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = 'rgba(0,0,0,' + (0.08 + eased * 0.35) + ')';
      ctx.fillRect(0, 0, warp.width, warp.height);

      ctx.globalCompositeOperation = 'lighter';

      for (var i = 0; i < streaks.length; i++){
        var s = streaks[i];
        var currentSpeed = s.speed * (1 + eased * 40);
        s.x += s.nx * currentSpeed;
        s.y += s.ny * currentSpeed;

        var remainingDist = Math.sqrt(
          (s.tx - s.x) * (s.tx - s.x) + (s.ty - s.y) * (s.ty - s.y)
        );

        // Streak tail position
        var tailLen = s.length * (1 + eased * 8);
        var sx = s.x - s.nx * tailLen;
        var sy = s.y - s.ny * tailLen;

        var alpha = s.opacity * (1 - progress * 0.3);

        // Wide coloured glow
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(s.x, s.y);
        ctx.strokeStyle = 'hsla(' + s.hue + ',100%,80%,' + (alpha * 0.25) + ')';
        ctx.lineWidth = 4 + eased * 8;
        ctx.lineCap = 'round';
        ctx.stroke();

        // Mid glow
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(s.x, s.y);
        ctx.strokeStyle = 'hsla(' + s.hue + ',100%,95%,' + (alpha * 0.55) + ')';
        ctx.lineWidth = 1.5 + eased * 3;
        ctx.lineCap = 'round';
        ctx.stroke();

        // White-hot core
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(s.x, s.y);
        ctx.strokeStyle = 'hsla(0,0%,100%,' + alpha + ')';
        ctx.lineWidth = 0.8 + eased * 1.2;
        ctx.lineCap = 'round';
        ctx.stroke();

        // Respawn if past vanishing point or too close
        if(remainingDist < 20 || s.x < -500 || s.x > warp.width + 500 || s.y < -500 || s.y > warp.height + 500){
          streaks[i] = spawnStreak(cx, cy, warp.width, warp.height, false);
        }
      }

      // Central glow builds from 30% progress
      if(progress > 0.3){
        var glowAlpha = Math.pow((progress - 0.3) / 0.7, 2);
        var glowRadius = 80 + eased * 500;
        var g = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowRadius);
        g.addColorStop(0, 'rgba(255,255,255,' + (glowAlpha * 0.9) + ')');
        g.addColorStop(0.2, 'rgba(180,210,255,' + (glowAlpha * 0.5) + ')');
        g.addColorStop(0.5, 'rgba(80,120,255,' + (glowAlpha * 0.15) + ')');
        g.addColorStop(1, 'rgba(20,40,180,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(cx, cy, glowRadius, 0, Math.PI * 2);
        ctx.fill();
      }

      if(progress < 1){
        requestAnimationFrame(animateWarp);
      }else{
        // Terminal flash
        ctx.globalCompositeOperation = 'source-over';
        var flashAlpha = 1;
        function flashOut(){
          flashAlpha -= 0.06;
          if(flashAlpha <= 0){
            window.location.href = targetUrl;
            return;
          }
          ctx.fillStyle = 'rgba(255,255,255,' + Math.max(0, flashAlpha) + ')';
          ctx.fillRect(0, 0, warp.width, warp.height);
          requestAnimationFrame(flashOut);
        }
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, warp.width, warp.height);
        requestAnimationFrame(flashOut);
      }
    }

    requestAnimationFrame(animateWarp);
  }
})();
</script>

<script>
/* ==============================================
   Portal auto-fade + Guestbook toggle
   ============================================== */
(function(){
  var hero = document.querySelector('.hero');
  var guestbookBar = document.getElementById('guestbook-bar');
  var guestbookToggle = document.getElementById('guestbook-toggle');
  var giscusLoaded = false;

  // ---- Portal fade ----
  var dimTimer = null;
  var DIM_DELAY = 1800;

  function undim(){
    hero.classList.remove('dimmed');
    resetTimer();
  }

  function resetTimer(){
    clearTimeout(dimTimer);
    dimTimer = setTimeout(function(){ hero.classList.add('dimmed'); }, DIM_DELAY);
  }

  // Mouse enters hero area — immediately show
  hero.addEventListener('mouseenter', undim);
  // Mouse moves anywhere on the page — reset the fade countdown
  document.addEventListener('mousemove', function(e){
    if(hero.contains(e.target)){
      undim();
    }else{
      resetTimer();
    }
  });
  // Start the timer on page load
  resetTimer();

  // ---- Guestbook toggle ----
  guestbookToggle.addEventListener('click', function(){
    var isOpen = guestbookBar.classList.contains('open');
    if(isOpen){
      guestbookBar.classList.remove('open');
    }else{
      guestbookBar.classList.add('open');
      if(!giscusLoaded) loadGiscus();
    }
  });

  function loadGiscus(){
    giscusLoaded = true;
    var container = document.getElementById('giscus-container');
    // Show loading hint
    container.innerHTML = '<p style="text-align:center;color:var(--t2);font-size:0.85rem;padding:20px">正在加载留言系统...</p>';

    var script = document.createElement('script');
    script.src = 'https://giscus.app/client.js';
    script.setAttribute('data-repo', 'csxuyi/CSXUYI.github.io');
    script.setAttribute('data-repo-id', 'R_kgDOSl85kg');
    script.setAttribute('data-category', 'General');
    script.setAttribute('data-category-id', 'DIC_kwDOSl85ks4C99iu');
    script.setAttribute('data-mapping', 'pathname');
    script.setAttribute('data-strict', '0');
    script.setAttribute('data-reactions-enabled', '1');
    script.setAttribute('data-emit-metadata', '0');
    script.setAttribute('data-input-position', 'bottom');
    script.setAttribute('data-theme', 'dark');
    script.setAttribute('data-lang', 'zh-CN');
    script.setAttribute('data-loading', 'lazy');
    script.crossOrigin = 'anonymous';
    script.async = true;

    script.onload = function(){
      // giscus will replace the container content
    };
    script.onerror = function(){
      container.innerHTML = '<p style="text-align:center;color:var(--t2);font-size:0.85rem;padding:20px">留言系统加载失败。请确认已在 GitHub 仓库中启用 Discussions 功能，并到 <a href="https://giscus.app" style="color:var(--gold)" target="_blank">giscus.app</a> 完成配置。</p>';
