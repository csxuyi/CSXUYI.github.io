<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星穹祈愿 · 主页</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#080e20;--bg1:#0c142e;--bg2:#111b3a;
  --gold:#D4B87A;--g2:#E8D5A3;--g3:#F5E6CC;--g4:#B89A50;
  --purple:#B08FFF;--p2:#c8b0ff;
  --panel:rgba(12,20,42,0.72);--pborder:rgba(212,184,122,0.32);
  --text:#E8E0D0;--t2:#9999AA;
  --ft:"Noto Serif SC","STSong","SimSun",serif;
  --fu:"Inter","PingFang SC","Microsoft YaHei",sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{
  font-family:var(--fu);background:#05081a;color:var(--text);
  -webkit-font-smoothing:antialiased;
}

canvas#starfield{position:fixed;inset:0;z-index:0;pointer-events:none}

.hero{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;padding:40px 20px;text-align:center;
}

.hero .logo{
  font-family:var(--ft);font-size:3rem;font-weight:900;
  background:linear-gradient(180deg,var(--g3),var(--gold),var(--g4));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:12px;letter-spacing:0.12em;
}
.hero .subtitle{
  font-family:var(--ft);font-size:1rem;color:var(--t2);
  letter-spacing:0.2em;margin-bottom:60px;
}

.portals{
  display:flex;gap:32px;flex-wrap:wrap;justify-content:center;
  max-width:700px;width:100%;
}
.portal{
  flex:1;min-width:260px;max-width:320px;
  padding:40px 28px;border-radius:24px;
  background:rgba(18,22,40,0.65);backdrop-filter:blur(20px) saturate(140%);
  -webkit-backdrop-filter:blur(20px) saturate(140%);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 8px 40px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.03) inset,0 1px 0 rgba(255,255,255,0.04) inset;
  text-decoration:none;color:inherit;
  transition:transform 0.4s cubic-bezier(0.22,1,0.36,1),box-shadow 0.4s ease,border-color 0.4s ease;
  display:flex;flex-direction:column;align-items:center;gap:16px;
}
.portal:hover{
  transform:translateY(-10px);
  border-color:rgba(255,255,255,0.15);
  box-shadow:0 16px 56px rgba(0,0,0,0.55),0 0 0 1px rgba(255,255,255,0.06) inset,0 1px 0 rgba(255,255,255,0.08) inset,0 0 80px rgba(212,184,122,0.08);
}
.portal-icon{
  width:72px;height:72px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.03);
}
.portal.wish .portal-icon{background:radial-gradient(circle,rgba(212,184,122,0.15),transparent);border-color:rgba(212,184,122,0.3)}
.portal.cards .portal-icon{background:radial-gradient(circle,rgba(176,143,255,0.12),transparent);border-color:rgba(176,143,255,0.25)}

.portal h2{font-family:var(--ft);font-size:1.4rem;font-weight:700}
.portal.wish h2{background:linear-gradient(180deg,var(--g3),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.portal.cards h2{background:linear-gradient(180deg,var(--p2),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.portal p{font-size:0.85rem;color:var(--t2);line-height:1.6}

.portal-arrow{
  font-size:0.9rem;color:var(--gold);opacity:0;
  transform:translateX(0);transition:all 0.3s ease;
}
.portal:hover .portal-arrow{opacity:1;transform:translateX(4px)}

.footer{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  z-index:1;font-size:0.75rem;color:var(--t2);
  letter-spacing:0.1em;
}

@media(max-width:600px){
  .hero .logo{font-size:2.2rem}
  .portals{gap:20px}
  .portal{padding:30px 20px}
}
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<main class="hero">
  <h1 class="logo">星 穹 祈 愿</h1>
  <p class="subtitle">— STELLAR WISH —</p>

  <div class="portals">
    <a href="wish.html" class="portal wish">
      <div class="portal-icon">🌠</div>
      <h2>祈 愿</h2>
      <p>踏入星河，抽取命运之卡<br>每张卡牌都承载着星穹的祝福</p>
      <span class="portal-arrow">进入 →</span>
    </a>
    <a href="cards.html" class="portal cards">
      <div class="portal-icon">🂠</div>
      <h2>卡牌图鉴</h2>
      <p>浏览全部收藏，细品每一张<br>卡牌背后的故事与灵魂</p>
      <span class="portal-arrow">进入 →</span>
    </a>
  </div>
</main>

<footer class="footer">© 2026 星穹祈愿 — Stellar Wish</footer>

<script>
(function(){
  const c=document.getElementById('starfield');
  const ctx=c.getContext('2d');
  let w,h;
  let stars=[];
  let meteors=[];

  function resize(){w=c.width=window.innerWidth;h=c.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);

  for(let i=0;i<200;i++){
    stars.push({
      x:Math.random()*w,y:Math.random()*h,
      r:Math.random()*1.6+0.3,
      a:Math.random()*0.7+0.15,
      s:Math.random()*0.003+0.001,
      phase:Math.random()*Math.PI*2
    });
  }

  function spawnMeteor(){
    const angle=-22+Math.random()*14;
    const rad=angle*Math.PI/180;
    const speed=10+Math.random()*18;
    const headR=3.5+Math.random()*5.5;
    const hue=Math.random()<0.12?265:Math.random()<0.25?30:44;
    const sat='90%';
    return {
      x:Math.random()*(w*0.85)+w*0.05,
      y:-30-Math.random()*h*0.25,
      vx:Math.cos(rad)*speed,
      vy:-Math.sin(rad)*speed,
      headR:headR,
      hue:hue,
      life:1,
      decay:0.004+Math.random()*0.008,
      trail:[],
      trailMax:22+Math.floor(Math.random()*20),
      sparks:[],
      sparkTimer:0,
      sparkInterval:0.04+Math.random()*0.06
    };
  }

  // Start with 6 active meteors
  for(let i=0;i<6;i++){
    const m=spawnMeteor();
    m.y=-Math.random()*h*0.7;
    m.life=0.3+Math.random()*0.7;
    meteors.push(m);
  }

  let meteorTimer=0;

  function draw(timestamp,dt){
    const dts=Math.min(dt,0.1);

    ctx.clearRect(0,0,w,h);

    // Static stars — with subtle twinkle
    const now=Date.now()*0.001;
    stars.forEach(s=>{
      s.x+=s.s;
      if(s.x>w+5){s.x=-5;s.y=Math.random()*h}
      const alpha=s.a+Math.sin(now+s.phase)*0.2;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(212,184,122,${Math.max(0,alpha)})`;
      ctx.fill();
    });

    // Spawn: very frequent
    meteorTimer+=dts;
    const spawnGap=0.15+Math.random()*0.4;
    if(meteorTimer>spawnGap){
      meteorTimer=0;
      meteors.push(spawnMeteor());
    }

    for(let i=meteors.length-1;i>=0;i--){
      const m=meteors[i];
      m.x+=m.vx*dts*60;
      m.y+=m.vy*dts*60;
      m.life-=m.decay*dts*60;

      m.trail.push({x:m.x,y:m.y,life:m.life});
      if(m.trail.length>m.trailMax)m.trail.shift();

      // Sparks
      m.sparkTimer+=dts*60;
      if(m.sparkTimer>m.sparkInterval*60){
        m.sparkTimer=0;
        if(m.life>0.15){
          m.sparks.push({
            x:m.x+(Math.random()-0.5)*m.headR*3,
            y:m.y+(Math.random()-0.5)*m.headR*3,
            vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,
            life:1,r:0.6+Math.random()*2.2
          });
        }
      }
      m.sparks.forEach(sp=>{
        sp.x+=sp.vx*dts*60;sp.y+=sp.vy*dts*60;sp.life-=0.025*dts*60;
      });
      m.sparks=m.sparks.filter(sp=>sp.life>0);

      if(m.life<=0||m.y>h+120||m.x<-120||m.x>w+120){
        meteors.splice(i,1);
        continue;
      }

      const headAlpha=m.life;

      // ── Trail: thick, glowing ──
      if(m.trail.length>1){
        for(let j=1;j<m.trail.length;j++){
          const t0=m.trail[j-1],t1=m.trail[j];
          const t=j/m.trail.length;
          const alpha=t*m.life*0.7;
          const w=t*6+0.8;
          // Outer trail glow
          ctx.beginPath();ctx.moveTo(t0.x,t0.y);ctx.lineTo(t1.x,t1.y);
          ctx.strokeStyle=`hsla(${m.hue},${m.sat},80%,${alpha*0.35})`;
          ctx.lineWidth=w+8;ctx.lineCap='round';ctx.stroke();
          // Inner trail
          ctx.beginPath();ctx.moveTo(t0.x,t0.y);ctx.lineTo(t1.x,t1.y);
          ctx.strokeStyle=`hsla(${m.hue},${m.sat},95%,${alpha})`;
          ctx.lineWidth=w;ctx.lineCap='round';ctx.stroke();
          // White-hot core
          ctx.beginPath();ctx.moveTo(t0.x,t0.y);ctx.lineTo(t1.x,t1.y);
          ctx.strokeStyle=`hsla(0,0%,100%,${alpha*0.5})`;
          ctx.lineWidth=w*0.35;ctx.lineCap='round';ctx.stroke();
        }
      }

      // ── Sparks ──
      m.sparks.forEach(sp=>{
        ctx.beginPath();ctx.arc(sp.x,sp.y,sp.r,0,Math.PI*2);
        ctx.fillStyle=`hsla(${m.hue},${m.sat},90%,${sp.life})`;
        ctx.fill();
        // Spark glow
        const sg=ctx.createRadialGradient(sp.x,sp.y,0,sp.x,sp.y,sp.r*3);
        sg.addColorStop(0,`hsla(${m.hue},${m.sat},100%,${sp.life*0.7})`);
        sg.addColorStop(1,`hsla(${m.hue},${m.sat},80%,0)`);
        ctx.beginPath();ctx.arc(sp.x,sp.y,sp.r*3,0,Math.PI*2);
        ctx.fillStyle=sg;ctx.fill();
      });

      // ── Head: dramatic multi-layer glow ──
      const hx=m.x,hy=m.y;

      // Layer 4 — massive outer halo (casts light on surroundings)
      const g4=ctx.createRadialGradient(hx,hy,m.headR*2,hx,hy,m.headR*14);
      g4.addColorStop(0,`hsla(${m.hue},${m.sat},80%,${headAlpha*0.15})`);
      g4.addColorStop(0.5,`hsla(${m.hue},${m.sat},70%,${headAlpha*0.04})`);
      g4.addColorStop(1,`hsla(${m.hue},${m.sat},60%,0)`);
      ctx.beginPath();ctx.arc(hx,hy,m.headR*14,0,Math.PI*2);
      ctx.fillStyle=g4;ctx.fill();

      // Layer 3 — mid glow
      const g3=ctx.createRadialGradient(hx,hy,m.headR*0.8,hx,hy,m.headR*7);
      g3.addColorStop(0,`hsla(${m.hue},${m.sat},90%,${headAlpha*0.45})`);
      g3.addColorStop(0.4,`hsla(${m.hue},${m.sat},80%,${headAlpha*0.2})`);
      g3.addColorStop(1,`hsla(${m.hue},${m.sat},70%,0)`);
      ctx.beginPath();ctx.arc(hx,hy,m.headR*7,0,Math.PI*2);
      ctx.fillStyle=g3;ctx.fill();

      // Layer 2 — inner glow
      const g2=ctx.createRadialGradient(hx,hy,m.headR*0.3,hx,hy,m.headR*3);
      g2.addColorStop(0,`hsla(${m.hue},${m.sat},100%,${headAlpha*0.8})`);
      g2.addColorStop(0.5,`hsla(${m.hue},${m.sat},85%,${headAlpha*0.35})`);
      g2.addColorStop(1,`hsla(${m.hue},${m.sat},75%,0)`);
      ctx.beginPath();ctx.arc(hx,hy,m.headR*3,0,Math.PI*2);
      ctx.fillStyle=g2;ctx.fill();

      // Layer 1 — core: blazing white-hot center
      const g1=ctx.createRadialGradient(hx,hy,0,hx,hy,m.headR*1.2);
      g1.addColorStop(0,'rgba(255,255,255,1)');
      g1.addColorStop(0.25,`hsla(${m.hue},${m.sat},98%,0.9)`);
      g1.addColorStop(0.6,`hsla(${m.hue},${m.sat},85%,0.3)`);
      g1.addColorStop(1,`hsla(${m.hue},${m.sat},70%,0)`);
      ctx.beginPath();ctx.arc(hx,hy,m.headR*1.2,0,Math.PI*2);
      ctx.fillStyle=g1;ctx.fill();

      // Lens flare streaks (cross)
      if(headAlpha>0.4){
        ctx.save();ctx.globalAlpha=headAlpha*0.25;
        const sx=m.headR*0.6,sy=m.headR*10;
        const grdX=ctx.createLinearGradient(hx-sx,hy,hx+sx,hy);
        grdX.addColorStop(0,'transparent');
        grdX.addColorStop(0.45,`hsla(${m.hue},${m.sat},95%,0.5)`);
        grdX.addColorStop(0.5,'white');
        grdX.addColorStop(0.55,`hsla(${m.hue},${m.sat},95%,0.5)`);
        grdX.addColorStop(1,'transparent');
        ctx.fillStyle=grdX;
        ctx.fillRect(hx-sx,hy-1.5,sx*2,3);
        const grdY=ctx.createLinearGradient(hx,hy-sy,hx,hy+sy);
        grdY.addColorStop(0,'transparent');
        grdY.addColorStop(0.45,`hsla(${m.hue},${m.sat},95%,0.25)`);
        grdY.addColorStop(0.5,'white');
        grdY.addColorStop(0.55,`hsla(${m.hue},${m.sat},95%,0.25)`);
        grdY.addColorStop(1,'transparent');
        ctx.fillStyle=grdY;
        ctx.fillRect(hx-0.8,hy-sy,1.6,sy*2);
        ctx.restore();
      }
    }
  }

  let lastTime=0;
  function loop(ts){
    const dt=lastTime?(ts-lastTime)/1000:0.016;
    lastTime=ts;
    draw(ts,dt);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>

</body>
</html>
