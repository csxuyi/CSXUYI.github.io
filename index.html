<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星穹祈愿 · 主页</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#080e20;--bg1:#0c142e;--bg2:#111b3a;
  --gold:#D4B87A;--g2:#E8D5A3;--g3:#F5E6CC;--g4:#B89A50;
  --purple:#B08FFF;--p2:#c8b0ff;
  --panel:rgba(12,20,42,0.72);--pborder:rgba(212,184,122,0.32);
  --text:#E8E0D0;--t2:#9999AA;
  --ft:"Noto Serif SC","STSong","SimSun",serif;
  --fu:"Inter","PingFang SC","Microsoft YaHei",sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{
  font-family:var(--fu);background:#05081a;color:var(--text);
  -webkit-font-smoothing:antialiased;
}

canvas#starfield{position:fixed;inset:0;z-index:0;pointer-events:none}

.hero{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;padding:40px 20px;text-align:center;
}

.hero .logo{
  font-family:var(--ft);font-size:3rem;font-weight:900;
  background:linear-gradient(180deg,var(--g3),var(--gold),var(--g4));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:12px;letter-spacing:0.12em;
}
.hero .subtitle{
  font-family:var(--ft);font-size:1rem;color:var(--t2);
  letter-spacing:0.2em;margin-bottom:60px;
}

.portals{
  display:flex;gap:32px;flex-wrap:wrap;justify-content:center;
  max-width:700px;width:100%;
}
.portal{
  flex:1;min-width:260px;max-width:320px;
  padding:40px 28px;border-radius:24px;
  background:rgba(18,22,40,0.65);backdrop-filter:blur(20px) saturate(140%);
  -webkit-backdrop-filter:blur(20px) saturate(140%);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 8px 40px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.03) inset,0 1px 0 rgba(255,255,255,0.04) inset;
  text-decoration:none;color:inherit;
  transition:transform 0.4s cubic-bezier(0.22,1,0.36,1),box-shadow 0.4s ease,border-color 0.4s ease;
  display:flex;flex-direction:column;align-items:center;gap:16px;
}
.portal:hover{
  transform:translateY(-10px);
  border-color:rgba(255,255,255,0.15);
  box-shadow:0 16px 56px rgba(0,0,0,0.55),0 0 0 1px rgba(255,255,255,0.06) inset,0 1px 0 rgba(255,255,255,0.08) inset,0 0 80px rgba(212,184,122,0.08);
}
.portal-icon{
  width:72px;height:72px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.03);
}
.portal.wish .portal-icon{background:radial-gradient(circle,rgba(212,184,122,0.15),transparent);border-color:rgba(212,184,122,0.3)}
.portal.cards .portal-icon{background:radial-gradient(circle,rgba(176,143,255,0.12),transparent);border-color:rgba(176,143,255,0.25)}

.portal h2{font-family:var(--ft);font-size:1.4rem;font-weight:700}
.portal.wish h2{background:linear-gradient(180deg,var(--g3),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.portal.cards h2{background:linear-gradient(180deg,var(--p2),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.portal p{font-size:0.85rem;color:var(--t2);line-height:1.6}

.portal-arrow{
  font-size:0.9rem;color:var(--gold);opacity:0;
  transform:translateX(0);transition:all 0.3s ease;
}
.portal:hover .portal-arrow{opacity:1;transform:translateX(4px)}

.footer{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  z-index:1;font-size:0.75rem;color:var(--t2);
  letter-spacing:0.1em;
}

@media(max-width:600px){
  .hero .logo{font-size:2.2rem}
  .portals{gap:20px}
  .portal{padding:30px 20px}
}
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<main class="hero">
  <h1 class="logo">星 穹 祈 愿</h1>
  <p class="subtitle">— STELLAR WISH —</p>

  <div class="portals">
    <a href="wish.html" class="portal wish">
      <div class="portal-icon">🌠</div>
      <h2>祈 愿</h2>
      <p>踏入星河，抽取命运之卡<br>每张卡牌都承载着星穹的祝福</p>
      <span class="portal-arrow">进入 →</span>
    </a>
    <a href="cards.html" class="portal cards">
      <div class="portal-icon">🂠</div>
      <h2>卡牌图鉴</h2>
      <p>浏览全部收藏，细品每一张<br>卡牌背后的故事与灵魂</p>
      <span class="portal-arrow">进入 →</span>
    </a>
  </div>
</main>

<footer class="footer">© 2026 星穹祈愿 — Stellar Wish</footer>

<script>
(function(){
  const c=document.getElementById('starfield');
  const ctx=c.getContext('2d');
  let w,h,stars=[],meteors=[];

  function resize(){w=c.width=window.innerWidth;h=c.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);

  for(let i=0;i<200;i++){
    stars.push({
      x:Math.random()*w,y:Math.random()*h,
      r:Math.random()*1.6+0.3,
      a:Math.random()*0.7+0.15,
      s:Math.random()*0.003+0.001,
      phase:Math.random()*Math.PI*2
    });
  }

  function spawnMeteor(){
    const angle=-25+Math.random()*16;
    const rad=angle*Math.PI/180;
    const speed=14+Math.random()*22;
    // Gold hue range, occasionally purple
    const hue=Math.random()<0.1?268:Math.random()<0.3?32:46;
    return {
      x:Math.random()*(w*0.7)+w*0.15,
      y:-Math.random()*h*0.35-10,
      vx:Math.cos(rad)*speed,
      vy:-Math.sin(rad)*speed,
      hue:hue,
      life:1,decay:0.0035+Math.random()*0.006,
      trail:[],trailMax:35+Math.floor(Math.random()*25)
    };
  }

  for(let i=0;i<5;i++){
    const m=spawnMeteor();
    m.y=-Math.random()*h*0.7;
    m.life=0.2+Math.random()*0.8;
    meteors.push(m);
  }

  let spawnTimer=0;

  function draw(ts,dt){
    const dts=Math.min(dt,0.1);
    ctx.clearRect(0,0,w,h);

    // ── Static stars ──
    const now=Date.now()*0.001;
    stars.forEach(s=>{
      s.x+=s.s;
      if(s.x>w+5){s.x=-5;s.y=Math.random()*h}
      const alpha=s.a+Math.sin(now+s.phase)*0.2;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(212,184,122,${Math.max(0,alpha)})`;
      ctx.fill();
    });

    // ── Spawn ──
    spawnTimer+=dts;
    if(spawnTimer>0.12+Math.random()*0.35){
      spawnTimer=0;
      meteors.push(spawnMeteor());
    }

    // ── Use additive blending for intense glow ──
    ctx.globalCompositeOperation='lighter';

    for(let i=meteors.length-1;i>=0;i--){
      const m=meteors[i];
      m.x+=m.vx*dts*60;
      m.y+=m.vy*dts*60;
      m.life-=m.decay*dts*60;

      m.trail.push({x:m.x,y:m.y});
      if(m.trail.length>m.trailMax)m.trail.shift();

      if(m.life<=0||m.y>h+150||m.x<-150||m.x>w+150){
        meteors.splice(i,1);continue;
      }

      // ── Trail: bright, tapered ──
      if(m.trail.length>1){
        for(let j=1;j<m.trail.length;j++){
          const t=j/m.trail.length;
          const alpha=t*t*m.life*0.8;
          const lw=t*5+0.5;
          ctx.beginPath();ctx.moveTo(m.trail[j-1].x,m.trail[j-1].y);ctx.lineTo(m.trail[j].x,m.trail[j].y);
          ctx.strokeStyle=`hsla(${m.hue},90%,${75+t*25}%,${alpha})`;
          ctx.lineWidth=lw;ctx.lineCap='round';ctx.stroke();
          // Extra glow layer
          ctx.beginPath();ctx.moveTo(m.trail[j-1].x,m.trail[j-1].y);ctx.lineTo(m.trail[j].x,m.trail[j].y);
          ctx.strokeStyle=`hsla(${m.hue},100%,90%,${alpha*0.3})`;
          ctx.lineWidth=lw+10;ctx.lineCap='round';ctx.stroke();
        }
      }

      // ── Head glow ──
      const a=m.life;
      // Outer halo
      const g3=ctx.createRadialGradient(m.x,m.y,0,m.x,m.y,40);
      g3.addColorStop(0,`hsla(${m.hue},100%,90%,${a*0.5})`);
      g3.addColorStop(0.3,`hsla(${m.hue},100%,80%,${a*0.2})`);
      g3.addColorStop(1,`hsla(${m.hue},100%,60%,0)`);
      ctx.beginPath();ctx.arc(m.x,m.y,40,0,Math.PI*2);
      ctx.fillStyle=g3;ctx.fill();

      // Mid glow
      const g2=ctx.createRadialGradient(m.x,m.y,0,m.x,m.y,16);
      g2.addColorStop(0,`hsla(${m.hue},100%,95%,${a*0.85})`);
      g2.addColorStop(0.4,`hsla(${m.hue},100%,85%,${a*0.4})`);
      g2.addColorStop(1,`hsla(${m.hue},100%,70%,0)`);
      ctx.beginPath();ctx.arc(m.x,m.y,16,0,Math.PI*2);
      ctx.fillStyle=g2;ctx.fill();

      // White-hot core
      const g1=ctx.createRadialGradient(m.x,m.y,0,m.x,m.y,6);
      g1.addColorStop(0,'rgba(255,255,255,1)');
      g1.addColorStop(0.15,`hsla(${m.hue},100%,95%,0.95)`);
      g1.addColorStop(0.5,`hsla(${m.hue},100%,80%,0.4)`);
      g1.addColorStop(1,`hsla(${m.hue},100%,60%,0)`);
      ctx.beginPath();ctx.arc(m.x,m.y,6,0,Math.PI*2);
      ctx.fillStyle=g1;ctx.fill();
    }

    ctx.globalCompositeOperation='source-over';
  }

  let lastTime=0;
  function loop(ts){
    const dt=lastTime?(ts-lastTime)/1000:0.016;
    lastTime=ts;
    draw(ts,dt);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>

</body>
</html>
