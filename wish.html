<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>祈愿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   VARIABLES & RESET
============================================================ */
:root{
  --bg0:#080e20;--bg1:#0c142e;--bg2:#111b3a;
  --gold:#D4B87A;--g2:#E8D5A3;--g3:#F5E6CC;--g4:#B89A50;--g5:#FFE9B0;
  --purple:#B08FFF;--p2:#c8b0ff;--p3:#8a5cff;
  --blue:#5B7A9A;--b2:#8aa8c8;
  --panel:rgba(12,20,42,0.72);--pborder:rgba(212,184,122,0.32);
  --text:#E8E0D0;--t2:#9999AA;--t3:#666680;
  --ft:"Noto Serif SC","STSong","SimSun",serif;
  --fu:"Inter","PingFang SC","Microsoft YaHei",sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{
  font-family:var(--fu);background:#05081a;color:var(--text);
  -webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none;
}

/* ============================================================
   BACKGROUND LAYERS
============================================================ */
#starfield{position:fixed;inset:0;z-index:0;pointer-events:none}
.central-glow{
  position:fixed;pointer-events:none;z-index:0;
  top:50%;left:50%;transform:translate(-50%,-50%);
  width:1000px;height:1000px;border-radius:50%;
  background:radial-gradient(circle,rgba(42,26,74,0.22) 0%,rgba(30,15,50,0.08) 35%,transparent 70%);
  animation:glow-breathe 6s ease-in-out infinite;
}
@keyframes glow-breathe{
  0%,100%{opacity:0.7;transform:translate(-50%,-50%) scale(1)}
  50%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}
}

/* ============================================================
   APP SHELL
============================================================ */
#app{position:relative;z-index:1;width:100%;height:100vh;display:flex;flex-direction:column}

/* ============================================================
   TOP BAR
============================================================ */
.top-bar{
  position:relative;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  margin:10px 16px 0;padding:10px 18px;
  background:var(--panel);backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border:1px solid var(--pborder);border-radius:20px;
  box-shadow:0 4px 24px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.04);
  min-height:48px;
}
.top-left{display:flex;align-items:center;gap:12px}
.back-arrow{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(212,184,122,0.2);color:var(--gold);
  background:rgba(255,255,255,0.02);cursor:pointer;font-size:0.9rem;
  transition:all 0.2s;
}
.back-arrow:hover{background:rgba(212,184,122,0.08);border-color:rgba(212,184,122,0.4)}
.brand-icon{width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.brand-icon::before{
  content:"✦";font-size:1.15rem;
  background:linear-gradient(180deg,var(--g2),var(--gold),var(--g4));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 6px rgba(212,184,122,0.55));
}
.banner-name{
  font-family:var(--ft);font-size:0.98rem;font-weight:600;
  background:linear-gradient(180deg,var(--g2),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-shadow:0 0 12px rgba(212,184,122,0.3),0 2px 4px rgba(0,0,0,0.4);
  letter-spacing:1.5px;
}
.top-right{display:flex;align-items:center;gap:12px}
.res-card{
  display:flex;align-items:center;gap:6px;padding:5px 12px;
  border-radius:14px;background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
}
.res-icon{
  width:18px;height:18px;border-radius:50%;
  background:radial-gradient(circle at 40% 40%,#5b9bd5,#2a5090);
  box-shadow:0 0 6px rgba(91,155,213,0.4);flex-shrink:0;
}
.res-num{
  font-weight:600;font-size:0.85rem;
  background:linear-gradient(180deg,var(--g2),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-shadow:0 0 6px rgba(212,184,122,0.3);
  transition:all 0.25s;
}
.res-num.bump{animation:num-pop 0.4s ease}
@keyframes num-pop{0%,100%{transform:scale(1)}50%{transform:scale(1.3);color:var(--g2)}}
.res-label{font-size:0.62rem;color:var(--t3)}
.btn-exchange{
  padding:5px 12px;border-radius:12px;font-size:0.7rem;
  border:1px solid rgba(212,184,122,0.2);background:rgba(212,184,122,0.05);
  color:var(--gold);cursor:pointer;transition:all 0.2s;font-family:var(--fu);
}
.btn-exchange:hover{background:rgba(212,184,122,0.12);border-color:rgba(212,184,122,0.4)}
.icon-mute{
  width:30px;height:30px;border-radius:50%;cursor:pointer;
  border:1px solid rgba(212,184,122,0.15);background:rgba(255,255,255,0.02);
  color:var(--gold);font-size:0.85rem;
  display:flex;align-items:center;justify-content:center;transition:all 0.2s;
}
.icon-mute:hover{background:rgba(212,184,122,0.08)}

/* ============================================================
   MAIN AREA
============================================================ */
.main-area{flex:1;display:flex;position:relative;overflow:hidden}

/* ============================================================
   LEFT SIDEBAR (CARD POOL TABS)
============================================================ */
.sidebar{
  width:130px;min-width:130px;display:flex;flex-direction:column;
  gap:8px;padding:16px 8px;z-index:5;
  background:linear-gradient(90deg,rgba(8,14,32,0.5),transparent);
}
.sidebar-tab{
  display:flex;align-items:center;gap:8px;
  padding:10px 8px;border-radius:10px;
  border:1px solid transparent;
  background:rgba(255,255,255,0.015);
  color:var(--t3);cursor:pointer;
  font-size:0.72rem;transition:all 0.3s;
  font-family:var(--fu);position:relative;overflow:hidden;
}
.sidebar-tab:hover{background:rgba(255,255,255,0.04);color:var(--t2);transform:translateX(3px)}
.sidebar-tab.active{
  color:var(--gold);background:rgba(212,184,122,0.06);
  border-color:rgba(212,184,122,0.4);
  box-shadow:0 0 16px rgba(212,184,122,0.12),inset 0 0 12px rgba(212,184,122,0.04);
  animation:tab-pulse 2.5s ease-in-out infinite;
}
@keyframes tab-pulse{
  0%,100%{box-shadow:0 0 16px rgba(212,184,122,0.1),inset 0 0 12px rgba(212,184,122,0.04)}
  50%{box-shadow:0 0 24px rgba(212,184,122,0.22),inset 0 0 18px rgba(212,184,122,0.06)}
}
.tab-thumb{
  width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;
  border:1.5px solid rgba(255,255,255,0.08);opacity:0.6;transition:all 0.3s;
  background:#222;
}
.sidebar-tab.active .tab-thumb{opacity:1;border-color:rgba(212,184,122,0.5);box-shadow:0 0 10px rgba(212,184,122,0.25)}
.tab-label{flex:1;line-height:1.3;text-align:left}

/* ============================================================
   CENTER STAGE
============================================================ */
.center-stage{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;position:relative;
}
/* Rotating sacred rings */
.sacred-rings{position:absolute;pointer-events:none;top:50%;left:50%;transform:translate(-50%,-50%)}
.sacred-ring{
  position:absolute;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);
  border:1.5px solid rgba(212,184,122,0.07);
}
.sacred-ring.r1{width:440px;height:440px;animation:ring-rot 35s linear infinite}
.sacred-ring.r2{width:380px;height:380px;border-style:dashed;animation:ring-rot 50s linear infinite reverse;border-color:rgba(176,143,255,0.08)}
.sacred-ring.r3{width:320px;height:320px;animation:ring-rot 25s linear infinite;border-color:rgba(212,184,122,0.06)}
.sacred-ring.r4{width:520px;height:520px;animation:ring-rot 45s linear infinite reverse;border-color:rgba(212,184,122,0.05);border-width:1px}
@keyframes ring-rot{to{transform:translate(-50%,-50%) rotate(360deg)}}
.sacred-ring::before{
  content:"";position:absolute;width:6px;height:6px;border-radius:50%;
  background:var(--gold);box-shadow:0 0 10px var(--gold),0 0 20px rgba(212,184,122,0.5);
  top:-3px;left:50%;margin-left:-3px;
}
.sacred-ring.r2::before{background:var(--purple);box-shadow:0 0 10px var(--purple),0 0 20px rgba(176,143,255,0.5)}

/* Splash art container */
.splash-wrap{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;
  animation:float-up 4s ease-in-out infinite;
}
@keyframes float-up{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}
.splash-frame{
  position:relative;
  padding:8px;border-radius:16px;
  background:rgba(212,184,122,0.025);
  border:1px solid rgba(212,184,122,0.08);
  box-shadow:0 0 60px rgba(100,80,160,0.1);
}
.splash-img{
  display:block;max-width:min(480px,50vw);max-height:min(560px,58vh);
  object-fit:contain;border-radius:10px;
  filter:drop-shadow(0 0 30px rgba(180,150,200,0.18)) drop-shadow(0 10px 20px rgba(0,0,0,0.3));
  transition:filter 0.5s,opacity 0.4s;
}
.splash-img.switching{opacity:0}
/* Dual card spread (常驻) */
.splash-dual{
  display:flex;align-items:center;justify-content:center;
  gap:0;perspective:600px;
}
.splash-img-dual{
  display:block;width:min(200px,24vw);height:auto;aspect-ratio:3/4.4;
  object-fit:cover;border-radius:10px;
  border:2px solid rgba(212,184,122,0.35);
  box-shadow:0 0 20px rgba(180,150,200,0.15),0 8px 24px rgba(0,0,0,0.3);
  transition:transform 0.5s,opacity 0.4s;
}
.splash-img-dual-l{transform:rotate(-8deg) translateX(12px);z-index:1}
.splash-img-dual-r{transform:rotate(6deg) translateX(-12px);z-index:2}
.splash-img-dual.switching .splash-img-dual-l{opacity:0;transform:rotate(-8deg) translateX(12px) translateY(-8px)}
.splash-img-dual.switching .splash-img-dual-r{opacity:0;transform:rotate(6deg) translateX(-12px) translateY(-8px)}
.splash-glow-bottom{
  position:absolute;bottom:5%;left:50%;transform:translateX(-50%);
  width:75%;height:28%;background:radial-gradient(ellipse,rgba(212,184,122,0.14),transparent);
  pointer-events:none;border-radius:50%;
  animation:glow-pulse 3s ease-in-out infinite;
}
@keyframes glow-pulse{
  0%,100%{opacity:0.5;transform:translateX(-50%) scale(1)}
  50%{opacity:1;transform:translateX(-50%) scale(1.15)}
}
/* Floating ambient particles */
.ambient-particles{position:absolute;inset:-30px;pointer-events:none}
.amb-particle{
  position:absolute;border-radius:50%;
  animation:amb-float 4s ease-in-out infinite;
}
.amb-particle.gold{background:var(--gold);box-shadow:0 0 5px var(--gold)}
.amb-particle.purple{background:var(--purple);box-shadow:0 0 5px var(--purple)}
@keyframes amb-float{
  0%,100%{transform:translate(0,0) scale(1);opacity:0.2}
  40%{transform:translate(15px,-25px) scale(2);opacity:0.85}
  70%{transform:translate(-10px,-15px) scale(1.4);opacity:0.5}
}
/* Banner title */
.banner-title-glow{
  margin-top:10px;font-family:var(--ft);font-size:1.25rem;font-weight:700;
  letter-spacing:4px;text-align:center;
  background:linear-gradient(90deg,transparent,var(--g2),var(--gold),var(--g2),transparent);
  background-size:200% 100%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:title-sweep 3s ease-in-out infinite;
  text-shadow:0 0 20px rgba(212,184,122,0.35);
}
@keyframes title-sweep{
  0%,100%{background-position:0% 50%}
  50%{background-position:100% 50%}
}
/* UP character info below banner title */
.up-char-info{
  margin-top:10px;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.up-char-name{
  font-family:var(--ft);font-size:1rem;font-weight:700;
  color:var(--g2);letter-spacing:2px;
}
.up-char-stars{font-size:0.75rem;letter-spacing:2px;color:var(--gold)}
.up-char-desc{
  margin:0;font-size:0.72rem;color:var(--t2);max-width:320px;line-height:1.4;
  font-family:var(--fu);
}
@media(max-width:768px){
  .up-char-name{font-size:0.85rem}
  .up-char-desc{font-size:0.65rem;max-width:240px}
}

/* ============================================================
   BOTTOM BAR
============================================================ */
.bottom-bar{
  position:relative;z-index:10;
  display:flex;align-items:flex-end;justify-content:center;
  gap:24px;padding:0 20px 22px;
  min-height:120px;
  background:linear-gradient(0deg,rgba(8,14,32,0.95),rgba(8,14,32,0.2));
}
.btn-wish-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;position:relative}
/* Pity counter pill (text-only, Genshin-style) */
.pity-pill{
  padding:4px 12px;border-radius:12px;
  background:rgba(8,14,32,0.7);
  border:1px solid rgba(212,184,122,0.18);
  font-size:0.7rem;color:rgba(212,184,122,0.78);letter-spacing:0.5px;
  font-family:var(--fu);white-space:nowrap;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
.pity-pill .pity-num{color:var(--g2);font-weight:700;margin:0 2px}
.pity-pill.warning .pity-num{color:var(--g3);animation:pity-flash 0.8s ease-in-out infinite}
@keyframes pity-flash{0%,100%{text-shadow:0 0 8px rgba(245,230,204,0.8)}50%{text-shadow:0 0 16px rgba(245,230,204,1)}}
/* Gem-style wish button */
.btn-wish{
  position:relative;padding:13px 36px;
  border:none;border-radius:8px;
  background:linear-gradient(180deg,rgba(30,22,60,0.85),rgba(14,10,32,0.95));
  color:var(--g2);font-size:0.95rem;font-weight:600;
  font-family:var(--ft);letter-spacing:2px;
  cursor:pointer;overflow:hidden;outline:none;
  transition:all 0.25s;
  clip-path:polygon(8px 0,calc(100% - 8px) 0,100% 8px,100% calc(100% - 8px),calc(100% - 8px) 100%,8px 100%,0 calc(100% - 8px),0 8px);
}
.btn-wish::before{
  content:"";position:absolute;inset:1px;border-radius:6px;
  background:linear-gradient(180deg,rgba(25,18,55,0.7),rgba(10,8,28,0.9));
  z-index:-1;
}
.btn-wish::after{
  content:"";position:absolute;inset:0;border-radius:6px;padding:1.5px;
  background:linear-gradient(135deg,rgba(212,184,122,0.5),rgba(176,143,255,0.3),rgba(212,184,122,0.2));
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  z-index:1;pointer-events:none;
}
.btn-wish .sweep{
  position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);
  transform:skewX(-25deg);z-index:2;pointer-events:none;
  animation:sweep-move 3.5s ease-in-out infinite;
}
@keyframes sweep-move{0%{left:-100%}100%{left:200%}}
.btn-wish:hover:not(:disabled){
  transform:translateY(-2px);
  box-shadow:0 0 26px rgba(212,184,122,0.35),0 0 50px rgba(176,143,255,0.14);
}
.btn-wish:active:not(:disabled){
  transform:scale(0.96);
  box-shadow:inset 0 3px 8px rgba(0,0,0,0.5);
}
.btn-wish:disabled{opacity:0.35;cursor:not-allowed;filter:grayscale(0.4)}
.btn-wish-x10{padding:13px 52px}
.btn-wish .fate-dot{
  display:inline-block;width:16px;height:16px;border-radius:50%;
  background:radial-gradient(circle at 40% 40%,#5b9bd5,#1a4070);
  box-shadow:0 0 6px rgba(91,155,213,0.4);margin-right:5px;vertical-align:-3px;
}

/* ============================================================
   RIGHT FLOATING BUTTONS
============================================================ */
.right-floats{
  position:absolute;right:14px;bottom:150px;
  display:flex;flex-direction:column;gap:10px;z-index:10;
}
.float-orb{
  width:42px;height:42px;border-radius:50%;
  border:1px solid rgba(212,184,122,0.28);
  background:var(--panel);backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  color:var(--gold);cursor:pointer;font-size:0.95rem;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s;position:relative;
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
}
.float-orb:hover{
  border-color:rgba(212,184,122,0.55);
  box-shadow:0 0 20px rgba(212,184,122,0.3),0 4px 20px rgba(0,0,0,0.4);
  transform:scale(1.08);
}
.float-orb::after{
  content:"";position:absolute;inset:-4px;border-radius:50%;
  border:1px solid rgba(212,184,122,0.12);
  animation:orb-ring 3s ease-in-out infinite;
}
@keyframes orb-ring{
  0%,100%{transform:scale(1);opacity:0.3}
  50%{transform:scale(1.15);opacity:0.6}
}

/* ============================================================
   DETAILS PANEL (Side Drawer)
============================================================ */
#details-overlay{
  position:fixed;inset:0;z-index:48;background:rgba(0,0,0,0.45);
  opacity:0;pointer-events:none;transition:opacity 0.35s;
}
#details-overlay.open{opacity:1;pointer-events:auto}
#details-panel{
  position:fixed;top:0;right:0;bottom:0;z-index:50;
  width:360px;max-width:92vw;
  background:var(--panel);backdrop-filter:blur(24px) saturate(160%);
  -webkit-backdrop-filter:blur(24px) saturate(160%);
  border-left:1px solid var(--pborder);
  box-shadow:-8px 0 40px rgba(0,0,0,0.5);
  transform:translateX(105%);
  transition:transform 0.4s cubic-bezier(0.22,0.61,0.36,1);
  display:flex;flex-direction:column;
}
#details-panel.open{transform:translateX(0)}
.details-inner{padding:20px;overflow-y:auto;flex:1}
.details-inner::-webkit-scrollbar{width:3px}
.details-inner::-webkit-scrollbar-thumb{background:rgba(212,184,122,0.2);border-radius:2px}
.details-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.05);
}
.details-hdr h3{
  font-family:var(--ft);font-size:1rem;
  background:linear-gradient(180deg,var(--g2),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:1px;
}
.details-close{
  width:30px;height:30px;border-radius:50%;
  border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);
  color:var(--t2);cursor:pointer;font-size:0.9rem;
  display:flex;align-items:center;justify-content:center;transition:all 0.2s;
}
.details-close:hover{color:var(--text);border-color:rgba(255,255,255,0.25)}
.details-sec{margin-bottom:18px}
.details-sec h4{
  font-family:var(--ft);font-size:0.8rem;color:var(--t2);
  margin-bottom:8px;letter-spacing:0.5px;
}
.up-mini{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);margin-bottom:4px}
.up-mini-img{width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid transparent}
.up-mini-img.s6{border-color:#FFB8C6;box-shadow:0 0 10px rgba(255,184,198,0.4)}
.up-mini-img.s5{border-color:var(--gold);box-shadow:0 0 8px rgba(212,184,122,0.35)}
.up-mini-img.s4{border-color:var(--purple);box-shadow:0 0 6px rgba(176,143,255,0.3)}
.up-mini-name{font-size:0.78rem}
.up-mini-name.s6{color:#FFB8C6}
.up-mini-name.s5{color:var(--gold)}.up-mini-name.s4{color:var(--purple)}
.prob-table{width:100%;font-size:0.74rem;color:var(--t2);border-collapse:collapse}
.prob-table td{padding:6px 6px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.04)}
.prob-table .gold{color:var(--gold)}
.prob-table .purple{color:var(--purple)}
.hist-list{display:flex;flex-direction:column;gap:4px;max-height:240px;overflow-y:auto}
.hist-list::-webkit-scrollbar{width:3px}
.hist-list::-webkit-scrollbar-thumb{background:rgba(212,184,122,0.2);border-radius:2px}
.hist-row{display:flex;align-items:center;gap:8px;padding:6px 7px;border-radius:5px;background:rgba(255,255,255,0.014);border-left:2px solid transparent}
.hist-row.s6{border-left-color:#FFB8C6;background:rgba(255,184,198,0.06);box-shadow:0 0 12px rgba(255,184,198,0.15)}
.hist-row.s5{border-left-color:var(--gold);background:rgba(212,184,122,0.04)}
.hist-row.s4{border-left-color:var(--purple);background:rgba(176,143,255,0.03)}
.hist-row.s3{border-left-color:var(--blue)}
.hist-thumb{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0}
.hist-ph{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.65rem;flex-shrink:0;background:rgba(255,255,255,0.03)}
.hist-mid{flex:1;min-width:0}
.hist-mid-name{font-size:0.74rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-row.s6 .hist-mid-name{color:#FFB8C6}
.hist-row.s5 .hist-mid-name{color:var(--gold)}
.hist-row.s4 .hist-mid-name{color:var(--purple)}
.hist-mid-time{font-size:0.6rem;color:var(--t3)}
.hist-star{font-size:0.65rem;letter-spacing:1px;flex-shrink:0}
.hist-empty{text-align:center;color:var(--t3);padding:16px 0;font-size:0.78rem;font-style:italic}
.prob-note{font-size:0.62rem;color:var(--t3);padding:6px 4px;line-height:1.5}

/* ============================================================
   MOBILE TABS
============================================================ */
.mobile-tabs{
  display:none;gap:0;overflow-x:auto;padding:6px 8px;
  background:rgba(8,14,32,0.7);border-bottom:1px solid rgba(212,184,122,0.08);
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.mobile-tabs::-webkit-scrollbar{display:none}
.mobile-tab{
  padding:6px 14px;border-radius:14px;font-size:0.72rem;white-space:nowrap;
  border:1px solid transparent;background:rgba(255,255,255,0.015);
  color:var(--t3);cursor:pointer;font-family:var(--fu);flex-shrink:0;margin-right:4px;transition:all 0.2s;
}
.mobile-tab.active{color:var(--gold);border-color:rgba(212,184,122,0.4);background:rgba(212,184,122,0.08)}

/* ============================================================
   ▼▼▼ FULLSCREEN WISH ANIMATION SEQUENCE ▼▼▼
   Stargate → Meteor → Impact → Card Reveal
============================================================ */
#wish-stage{
  position:fixed;inset:0;z-index:90;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity 0.35s;
}
#wish-stage.active{opacity:1;pointer-events:auto;background:radial-gradient(circle at center,rgba(0,0,0,0.4) 0%,rgba(0,0,0,0.92) 70%)}

/* Stargate portal */
.stargate{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  width:800px;height:800px;border-radius:50%;
  pointer-events:none;
}
.stargate.activate{animation:gate-open 2.2s cubic-bezier(0.4,0,0.2,1) forwards}
@keyframes gate-open{
  0%{transform:translate(-50%,-50%) scale(0);opacity:0}
  15%{transform:translate(-50%,-50%) scale(0.15);opacity:1}
  85%{transform:translate(-50%,-50%) scale(1);opacity:1}
  100%{transform:translate(-50%,-50%) scale(1.3);opacity:0}
}
.stargate-core{
  position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle,
    rgba(255,240,200,0.0) 0%,
    rgba(180,140,80,0.5) 30%,
    rgba(80,40,140,0.3) 55%,
    rgba(20,10,50,0.0) 75%);
}
.stargate-ring{
  position:absolute;top:50%;left:50%;border-radius:50%;
  transform:translate(-50%,-50%);
}
.gr1{
  width:90%;height:90%;
  border:2px solid rgba(212,184,122,0.6);
  box-shadow:0 0 60px rgba(212,184,122,0.5),inset 0 0 60px rgba(212,184,122,0.3);
  animation:gate-rot 3s linear infinite;
}
.gr1::before,.gr1::after{
  content:"";position:absolute;top:50%;left:50%;
  width:14px;height:14px;border-radius:50%;
  background:var(--g3);box-shadow:0 0 20px var(--gold),0 0 40px var(--g3);
}
.gr1::before{transform:translate(-50%,-50%) translateX(45%)}
.gr1::after{transform:translate(-50%,-50%) translateX(-45%)}
.gr2{
  width:70%;height:70%;
  border:1.5px dashed rgba(176,143,255,0.5);
  animation:gate-rot 4s linear infinite reverse;
}
.gr3{
  width:50%;height:50%;
  border:2px solid rgba(255,240,200,0.7);
  box-shadow:0 0 40px rgba(255,240,200,0.5);
  animation:gate-rot 2.5s linear infinite;
}
.gr4{
  width:30%;height:30%;
  background:radial-gradient(circle,rgba(255,240,200,0.6),rgba(212,184,122,0.1) 60%,transparent);
  filter:blur(8px);
  animation:gate-pulse 1.2s ease-in-out infinite;
}
@keyframes gate-rot{to{transform:translate(-50%,-50%) rotate(360deg)}}
@keyframes gate-pulse{
  0%,100%{transform:translate(-50%,-50%) scale(0.9);opacity:0.6}
  50%{transform:translate(-50%,-50%) scale(1.15);opacity:1}
}

/* Meteor flying from depth */
.meteor{
  position:absolute;top:50%;left:50%;
  width:8px;height:8px;border-radius:50%;
  transform:translate(-50%,-50%) scale(0);
  opacity:0;pointer-events:none;
  z-index:5;
}
.meteor.fly{animation:meteor-fly 1.4s cubic-bezier(0.55,0,0.4,1) forwards}
.meteor.streak-3{
  background:radial-gradient(circle,#cfd9e8,#5b7a9a);
  box-shadow:0 0 30px #8aa8c8,0 0 60px #5b7a9a;
}
.meteor.streak-4{
  background:radial-gradient(circle,#e0c8ff,#b08fff);
  box-shadow:0 0 40px #c8b0ff,0 0 80px #b08fff,0 0 120px rgba(176,143,255,0.5);
}
.meteor.streak-5{
  background:radial-gradient(circle,#fff5d4,#ffd66b);
  box-shadow:0 0 60px #ffe9b0,0 0 120px #d4b87a,0 0 180px rgba(212,184,122,0.6);
}
.meteor.streak-6{
  background:radial-gradient(circle,#fff,#ffb8c6);
  box-shadow:0 0 80px #ffd4dc,0 0 150px #ffb8c6,0 0 220px rgba(255,184,198,0.6);
}
@keyframes meteor-fly{
  0%{transform:translate(-50%,-50%) translate(-40vw,-30vh) scale(0.05);opacity:0;filter:blur(2px)}
  20%{opacity:1;filter:blur(0)}
  60%{transform:translate(-50%,-50%) translate(-12vw,-9vh) scale(0.8);opacity:1;filter:blur(0)}
  85%{transform:translate(-50%,-50%) translate(-2vw,-2vh) scale(2);opacity:1}
  100%{transform:translate(-50%,-50%) translate(0,0) scale(5);opacity:0;filter:blur(6px)}
}
/* Meteor trail */
.meteor-trail{
  position:absolute;top:50%;left:50%;
  width:200px;height:4px;
  transform-origin:right center;
  transform:translate(-50%,-50%) translate(-40vw,-30vh) rotate(35deg) scaleX(0);
  opacity:0;pointer-events:none;z-index:4;
  border-radius:4px;
}
.meteor-trail.streak-3{background:linear-gradient(90deg,transparent,#8aa8c8,#cfd9e8);box-shadow:0 0 15px #8aa8c8}
.meteor-trail.streak-4{background:linear-gradient(90deg,transparent,#c8b0ff,#e0c8ff);box-shadow:0 0 25px #c8b0ff}
.meteor-trail.streak-5{background:linear-gradient(90deg,transparent,#ffd66b,#fff5d4);box-shadow:0 0 35px #ffd66b}
.meteor-trail.streak-6{background:linear-gradient(90deg,transparent,#ffb8c6,#fff);box-shadow:0 0 45px #ffb8c6}
.meteor-trail.fly{animation:trail-fly 1.4s cubic-bezier(0.55,0,0.4,1) forwards}
@keyframes trail-fly{
  0%{transform:translate(-50%,-50%) translate(-40vw,-30vh) rotate(35deg) scaleX(0);opacity:0}
  25%{opacity:1}
  60%{transform:translate(-50%,-50%) translate(-12vw,-9vh) rotate(35deg) scaleX(1.5);opacity:1}
  85%{transform:translate(-50%,-50%) translate(-2vw,-2vh) rotate(35deg) scaleX(0.5);opacity:0.5}
  100%{transform:translate(-50%,-50%) translate(0,0) rotate(35deg) scaleX(0);opacity:0}
}

/* Impact flash */
.impact-flash{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,1) 0%,rgba(255,240,200,0.8) 25%,rgba(255,200,100,0.4) 50%,transparent 75%);
  pointer-events:none;mix-blend-mode:screen;z-index:6;opacity:0;
}
.impact-flash.burst{animation:impact-burst 0.7s cubic-bezier(0.2,0.9,0.4,1) forwards}
.impact-flash.burst-5{animation:impact-burst-5 0.9s cubic-bezier(0.2,0.9,0.4,1) forwards}
.impact-flash.burst-6{animation:impact-burst-6 1.1s cubic-bezier(0.2,0.9,0.4,1) forwards}
@keyframes impact-burst{
  0%{transform:translate(-50%,-50%) scale(0);opacity:0}
  20%{transform:translate(-50%,-50%) scale(1.2);opacity:1}
  100%{transform:translate(-50%,-50%) scale(3.5);opacity:0}
}
@keyframes impact-burst-5{
  0%{transform:translate(-50%,-50%) scale(0);opacity:0}
  15%{transform:translate(-50%,-50%) scale(1.5);opacity:1}
  100%{transform:translate(-50%,-50%) scale(6);opacity:0}
}
@keyframes impact-burst-6{
  0%{transform:translate(-50%,-50%) scale(0);opacity:0}
  10%{transform:translate(-50%,-50%) scale(2);opacity:1}
  100%{transform:translate(-50%,-50%) scale(8);opacity:0}
}

/* Shockwave rings */
.shockwave{
  position:absolute;top:50%;left:50%;
  width:60px;height:60px;border-radius:50%;
  transform:translate(-50%,-50%) scale(0);
  border:2px solid rgba(212,184,122,0.7);
  box-shadow:0 0 25px rgba(212,184,122,0.5);
  pointer-events:none;opacity:0;z-index:7;
}
.shockwave.burst{animation:shockwave-out 1.1s cubic-bezier(0.2,0.9,0.4,1) forwards}
@keyframes shockwave-out{
  0%{transform:translate(-50%,-50%) scale(0);opacity:1}
  100%{transform:translate(-50%,-50%) scale(30);opacity:0;border-width:0.5px}
}

/* Full-screen white flash (5-star) */
#fullscreen-flash{
  position:fixed;inset:0;z-index:97;pointer-events:none;opacity:0;
  background:radial-gradient(circle,rgba(255,250,230,1) 0%,rgba(255,230,160,0.7) 40%,rgba(255,200,100,0.2) 70%,transparent 100%);
  transition:opacity 0.08s;
}
#fullscreen-flash.flash{animation:fs-flash 0.5s ease-out forwards}
@keyframes fs-flash{
  0%{opacity:0}
  15%{opacity:1}
  100%{opacity:0}
}

/* 5-star LIGHT PILLAR — full screen height */
.light-pillar{
  position:fixed;top:0;bottom:0;left:50%;
  width:240px;transform:translateX(-50%) scaleY(0);
  transform-origin:center;
  background:linear-gradient(to bottom,
    rgba(255,230,160,0) 0%,
    rgba(255,230,160,0.55) 30%,
    rgba(255,240,200,0.9) 50%,
    rgba(255,230,160,0.55) 70%,
    rgba(255,230,160,0) 100%);
  mix-blend-mode:screen;
  filter:blur(2px);
  pointer-events:none;z-index:96;opacity:0;
}
.light-pillar.rise{animation:pillar-rise 1.6s cubic-bezier(0.2,0.8,0.3,1) forwards}
@keyframes pillar-rise{
  0%{transform:translateX(-50%) scaleY(0) scaleX(0.2);opacity:0}
  30%{transform:translateX(-50%) scaleY(1) scaleX(0.5);opacity:1}
  70%{transform:translateX(-50%) scaleY(1) scaleX(1.4);opacity:0.85}
  100%{transform:translateX(-50%) scaleY(1) scaleX(2);opacity:0}
}
/* Inner narrow brighter beam */
.light-pillar::before{
  content:"";position:absolute;top:0;bottom:0;left:50%;
  width:50px;transform:translateX(-50%);
  background:linear-gradient(to bottom,transparent,rgba(255,255,250,1) 50%,transparent);
  filter:blur(1px);
}

/* Lens flare (5-star) */
.lens-flare{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  width:1400px;height:1400px;border-radius:50%;
  background:radial-gradient(circle,
    rgba(255,250,230,0.7) 0%,
    rgba(255,230,160,0.35) 12%,
    rgba(255,200,100,0.15) 28%,
    rgba(212,184,122,0.05) 50%,
    transparent 70%);
  pointer-events:none;z-index:95;opacity:0;
  mix-blend-mode:screen;
}
.lens-flare.show{animation:flare-show 2.2s cubic-bezier(0.2,0.8,0.3,1) forwards}
@keyframes flare-show{
  0%{transform:translate(-50%,-50%) scale(0);opacity:0}
  20%{transform:translate(-50%,-50%) scale(1);opacity:1}
  100%{transform:translate(-50%,-50%) scale(1.6);opacity:0}
}

/* ============================================================
   3D CARDS — Materialization & Flip
============================================================ */
#card-stage{
  position:fixed;inset:0;z-index:100;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
  perspective:1800px;
}
.card-deck{
  position:relative;
  display:flex;align-items:center;justify-content:center;
  transform-style:preserve-3d;
  width:100%;max-width:1180px;padding:20px;
  flex-wrap:wrap;gap:14px;
}
.card-deck.single{justify-content:center}
.card-deck.multi{
  display:grid;
  grid-template-columns:repeat(5,130px);
  gap:14px 14px;
  max-width:none;width:auto;
  justify-content:center;
}

/* Card wrap (perspective container per card) */
.card-3d{
  position:relative;
  width:170px;aspect-ratio:3/4.4;
  perspective:1400px;
  transform-style:preserve-3d;
  opacity:0;
}
.card-deck.single .card-3d{width:280px}
.card-deck.multi .card-3d{width:130px}

/* Materialization: card spins in from nothing with multi-axis rotation */
.card-3d.materialize{animation:card-materialize 1.1s cubic-bezier(0.34,1.5,0.64,1) forwards}
@keyframes card-materialize{
  0%{
    transform:translateY(-60vh) translateZ(-1200px) rotateY(720deg) rotateX(180deg) scale(0.1);
    opacity:0;
    filter:blur(8px) brightness(2);
  }
  35%{
    transform:translateY(-15vh) translateZ(-400px) rotateY(360deg) rotateX(60deg) scale(0.7);
    opacity:1;
    filter:blur(2px) brightness(1.4);
  }
  70%{
    transform:translateY(2vh) translateZ(40px) rotateY(0deg) rotateX(-10deg) scale(1.05);
    opacity:1;
    filter:blur(0) brightness(1.1);
  }
  100%{
    transform:translateY(0) translateZ(0) rotateY(0deg) rotateX(0deg) scale(1);
    opacity:1;
    filter:blur(0) brightness(1);
  }
}

/* Inner element holds front/back faces */
.card-3d-inner{
  position:relative;width:100%;height:100%;
  transform-style:preserve-3d;
  transition:transform 0.9s cubic-bezier(0.4,0.1,0.2,1);
}
.card-3d.flipped .card-3d-inner{transform:rotateY(180deg)}
.card-face{
  position:absolute;inset:0;border-radius:12px;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  overflow:hidden;
}

/* CARD BACK — ornate starry design */
.card-back{
  background:
    radial-gradient(circle at 50% 30%,rgba(212,184,122,0.18),transparent 65%),
    linear-gradient(160deg,#0f1530 0%,#1c1448 50%,#0a0a25 100%);
  border:2px solid rgba(212,184,122,0.55);
  box-shadow:
    0 0 30px rgba(212,184,122,0.35),
    inset 0 0 30px rgba(176,143,255,0.12);
  display:flex;align-items:center;justify-content:center;
}
/* Corner ornaments */
.card-back::before,.card-back::after{
  content:"";position:absolute;width:30px;height:30px;
  border:2px solid rgba(212,184,122,0.7);
  filter:drop-shadow(0 0 4px rgba(212,184,122,0.5));
}
.card-back::before{top:8px;left:8px;border-right:none;border-bottom:none;border-top-left-radius:8px}
.card-back::after{bottom:8px;right:8px;border-left:none;border-top:none;border-bottom-right-radius:8px}
/* Central emblem */
.card-back-emblem{
  position:relative;width:65%;aspect-ratio:1;
  display:flex;align-items:center;justify-content:center;
}
.card-back-emblem::before{
  content:"";position:absolute;inset:0;border-radius:50%;
  border:1.5px solid rgba(212,184,122,0.45);
  animation:cb-rot 8s linear infinite;
}
.card-back-emblem::after{
  content:"";position:absolute;inset:14%;border-radius:50%;
  border:1.5px dashed rgba(176,143,255,0.45);
  animation:cb-rot 12s linear infinite reverse;
}
.card-back-star{
  position:relative;z-index:1;
  font-size:2.2rem;line-height:1;
  background:linear-gradient(180deg,var(--g3),var(--gold),var(--g4));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 10px rgba(212,184,122,0.6));
}
@keyframes cb-rot{to{transform:rotate(360deg)}}
/* Tiny glints on the back */
.card-back-glint{
  position:absolute;width:3px;height:3px;border-radius:50%;
  background:var(--g3);box-shadow:0 0 6px var(--g3);
  animation:glint-twinkle 2s ease-in-out infinite;
}
@keyframes glint-twinkle{0%,100%{opacity:0.2;transform:scale(0.5)}50%{opacity:1;transform:scale(1.4)}}

/* CARD FRONT */
.card-front{
  transform:rotateY(180deg);
  display:flex;flex-direction:column;align-items:stretch;
  padding:6px;
}
.card-front.s5{
  background:
    radial-gradient(ellipse at top,rgba(212,184,122,0.18),transparent 70%),
    linear-gradient(180deg,#251606 0%,#180c02 100%);
  border:2px solid var(--gold);
  box-shadow:
    0 0 40px rgba(212,184,122,0.55),
    inset 0 0 25px rgba(212,184,122,0.18);
}
.card-front.s4{
  background:
    radial-gradient(ellipse at top,rgba(176,143,255,0.18),transparent 70%),
    linear-gradient(180deg,#180c2a 0%,#0c0518 100%);
  border:2px solid var(--purple);
  box-shadow:
    0 0 30px rgba(176,143,255,0.4),
    inset 0 0 20px rgba(176,143,255,0.15);
}
.card-front.s3{
  background:linear-gradient(180deg,#0c1422 0%,#060a14 100%);
  border:2px solid var(--blue);
  box-shadow:0 0 16px rgba(91,122,154,0.3);
}
.card-front.s6{
  background:
    radial-gradient(ellipse at top,rgba(255,184,198,0.25),transparent 70%),
    linear-gradient(180deg,#2a1018 0%,#1a0810 100%);
  border:2px solid #FFB8C6;
  box-shadow:
    0 0 50px rgba(255,184,198,0.6),
    0 0 80px rgba(255,210,230,0.3),
    inset 0 0 30px rgba(255,184,198,0.2);
  animation:s6-border-glow 2s ease-in-out infinite;
}
@keyframes s6-border-glow{
  0%,100%{border-color:#FFB8C6;box-shadow:0 0 50px rgba(255,184,198,0.6),0 0 80px rgba(255,210,230,0.3)}
  50%{border-color:#FFE0E8;box-shadow:0 0 70px rgba(255,200,220,0.8),0 0 100px rgba(255,220,240,0.5)}
}
/* Rarity badge */
.card-rarity-badge{
  position:absolute;top:8px;left:8px;z-index:3;
  padding:2px 8px;border-radius:8px;
  font-size:0.62rem;font-weight:700;letter-spacing:1px;font-family:var(--ft);
}
.s5 .card-rarity-badge{background:linear-gradient(135deg,var(--gold),#6a4818);color:#fff;text-shadow:0 0 4px rgba(255,220,150,0.6)}
.s4 .card-rarity-badge{background:linear-gradient(135deg,var(--purple),#3a1860);color:#fff}
.s3 .card-rarity-badge{background:#344a58;color:#aab8c0}
.s6 .card-rarity-badge{background:linear-gradient(135deg,#FFB8C6,#8a3048);color:#fff;text-shadow:0 0 6px rgba(255,200,220,0.7);animation:s6-badge-shine 1.5s ease-in-out infinite}
@keyframes s6-badge-shine{0%,100%{box-shadow:0 0 8px rgba(255,184,198,0.5)}50%{box-shadow:0 0 20px rgba(255,220,240,0.9)}}
/* Image area */
.card-img-area{
  flex:1;width:100%;border-radius:6px;overflow:hidden;
  position:relative;background:rgba(0,0,0,0.3);
  display:flex;align-items:center;justify-content:center;
}
.card-img-area img{width:100%;height:100%;object-fit:cover;display:block}
.card-img-fallback{font-size:2.5rem;color:rgba(212,184,122,0.5)}
.card-deck.single .card-img-fallback{font-size:4rem}
/* Glow inside frame for 5/4 */
.card-front.s5 .card-img-area::after{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 50%,rgba(212,184,122,0.18) 100%);
}
.card-front.s4 .card-img-area::after{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 50%,rgba(176,143,255,0.15) 100%);
}
.card-front.s6 .card-img-area::after{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 50%,rgba(255,184,198,0.22) 100%);
}
/* Name + stars footer */
.card-info{padding:6px 4px 2px;text-align:center}
.card-name{
  font-family:var(--ft);font-weight:700;
  font-size:0.78rem;line-height:1.2;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.card-deck.single .card-name{font-size:1.1rem}
.s5 .card-name{
  background:linear-gradient(180deg,var(--g3),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-shadow:0 0 8px rgba(212,184,122,0.4);
}
.s4 .card-name{
  background:linear-gradient(180deg,var(--p2),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.s3 .card-name{color:#a8c0d4}
.s6 .card-name{
  background:linear-gradient(180deg,#fff,#FFB8C6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-shadow:0 0 12px rgba(255,184,198,0.6);
}
.card-stars{margin-top:2px;letter-spacing:1.5px;font-size:0.65rem}
.card-deck.single .card-stars{font-size:0.95rem;margin-top:6px}
.s5 .card-stars{color:var(--gold);text-shadow:0 0 6px rgba(212,184,122,0.5)}
.s4 .card-stars{color:var(--purple)}
.s3 .card-stars{color:var(--blue)}
.s6 .card-stars{color:#FFB8C6;text-shadow:0 0 10px rgba(255,184,198,0.7)}
.card-desc{
  margin-top:3px;font-size:0.58rem;color:var(--t2);line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card-deck.single .card-desc{font-size:0.7rem;margin-top:6px;-webkit-line-clamp:3}
.card-deck.multi .card-desc{font-size:0.5rem;-webkit-line-clamp:1}

/* 5★ overlay glow on flipped card */
.card-3d.flipped.s5-card::after{
  content:"";position:absolute;inset:-12px;border-radius:18px;
  background:radial-gradient(ellipse,rgba(212,184,122,0.5),transparent 70%);
  pointer-events:none;z-index:-1;
  animation:five-aura 2s ease-in-out infinite;
}
.card-3d.flipped.s4-card::after{
  content:"";position:absolute;inset:-8px;border-radius:16px;
  background:radial-gradient(ellipse,rgba(176,143,255,0.35),transparent 70%);
  pointer-events:none;z-index:-1;
  animation:four-aura 2.5s ease-in-out infinite;
}
@keyframes five-aura{0%,100%{opacity:0.7;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
@keyframes four-aura{0%,100%{opacity:0.5}50%{opacity:0.8}}
.card-3d.flipped.s6-card::after{
  content:"";position:absolute;inset:-16px;border-radius:20px;
  background:radial-gradient(ellipse,rgba(255,184,198,0.55),transparent 70%);
  pointer-events:none;z-index:-1;
  animation:six-aura 1.8s ease-in-out infinite;
}
@keyframes six-aura{0%,100%{opacity:0.6;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}

/* 4★ lightning sparks on reveal */
.card-3d.s4-card.flipped .lightning-spark{display:block}
.lightning-spark{
  display:none;
  position:absolute;width:2px;height:30px;
  background:linear-gradient(180deg,transparent,#e0c8ff,#b08fff,transparent);
  filter:blur(0.5px);box-shadow:0 0 8px var(--purple);
  pointer-events:none;
  animation:spark-flash 0.6s ease-out forwards;
}

/* Result UI */
.result-controls{
  position:fixed;bottom:36px;left:50%;transform:translateX(-50%);
  display:flex;gap:16px;z-index:120;opacity:0;
  pointer-events:none;transition:opacity 0.4s;
}
.result-controls.show{opacity:1;pointer-events:auto}
.btn-result{
  padding:9px 28px;border-radius:8px;
  border:1px solid rgba(212,184,122,0.5);
  background:rgba(8,14,32,0.85);backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  color:var(--g2);font-family:var(--ft);font-size:0.85rem;letter-spacing:2px;
  cursor:pointer;transition:all 0.2s;
}
.btn-result:hover{
  background:rgba(212,184,122,0.12);border-color:var(--gold);
  box-shadow:0 0 18px rgba(212,184,122,0.3);
}
.btn-result.primary{background:linear-gradient(135deg,rgba(212,184,122,0.25),rgba(176,143,255,0.15));color:var(--g3)}

/* Skip button (top-right) */
.btn-skip{
  position:fixed;top:24px;right:24px;z-index:130;
  padding:6px 14px;border-radius:14px;
  border:1px solid rgba(212,184,122,0.3);
  background:rgba(8,14,32,0.7);backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  color:var(--g2);font-size:0.78rem;cursor:pointer;font-family:var(--fu);
  opacity:0;pointer-events:none;transition:all 0.3s;
}
.btn-skip.show{opacity:1;pointer-events:auto}
.btn-skip:hover{border-color:var(--gold);color:var(--g3)}

/* ============================================================
   GOLD DROPS (5★)
============================================================ */
.gold-drop{
  position:fixed;pointer-events:none;z-index:99;border-radius:50%;
  background:radial-gradient(circle,#fff5d4,var(--g2));
  box-shadow:0 0 8px var(--g3),0 0 16px rgba(212,184,122,0.6);
  animation:drop-fall linear forwards;
}
@keyframes drop-fall{
  0%{transform:translateY(-120vh) rotate(0deg);opacity:1}
  80%{opacity:0.8}
  100%{transform:translateY(120vh) rotate(720deg);opacity:0}
}

/* Screen shake */
.shake{animation:shake 0.45s ease-out}
@keyframes shake{
  0%,100%{transform:translate(0)}
  15%{transform:translate(-5px,3px)}
  30%{transform:translate(4px,-4px)}
  45%{transform:translate(-3px,5px)}
  60%{transform:translate(3px,-2px)}
  75%{transform:translate(-2px,1px)}
}

/* ============================================================
   PARTICLE CANVAS
============================================================ */
#pfx-canvas{position:fixed;inset:0;z-index:5;pointer-events:none}

/* ============================================================
   TOAST
============================================================ */
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:200;
  padding:8px 20px;border-radius:20px;
  background:rgba(18,24,50,0.92);border:1px solid var(--pborder);
  color:var(--text);font-size:0.78rem;pointer-events:none;font-family:var(--fu);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  animation:toast-in 0.3s ease,toast-out 0.3s ease 2.2s forwards;
}
@keyframes toast-in{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toast-out{from{opacity:1}to{opacity:0}}

/* ============================================================
   RESPONSIVE
============================================================ */
@media(max-width:768px){
  .top-bar{margin:6px 8px 0;padding:8px 12px;min-height:40px;border-radius:14px}
  .banner-name{font-size:0.82rem;letter-spacing:1px}
  .res-card{padding:3px 8px}.res-num{font-size:0.72rem}.res-label{font-size:0.55rem}
  .sidebar{display:none}
  .mobile-tabs{display:flex}
  .splash-img{max-width:65vw;max-height:40vh}
  .splash-img-dual{width:min(130px,28vw)}
  .sacred-ring.r1{width:280px;height:280px}
  .sacred-ring.r2{width:240px;height:240px}
  .sacred-ring.r3{width:200px;height:200px}
  .sacred-ring.r4{width:320px;height:320px}
  .bottom-bar{gap:12px;padding:0 10px 14px;min-height:100px}
  .btn-wish{padding:10px 22px;font-size:0.8rem}.btn-wish-x10{padding:10px 34px}
  .right-floats{bottom:120px;right:6px;gap:6px}
  .float-orb{width:34px;height:34px;font-size:0.8rem}
  #details-panel{width:100vw;max-width:100vw}
  .card-deck.single .card-3d{width:200px}
  .card-deck.multi .card-3d{width:auto}
  .card-deck.multi{grid-template-columns:repeat(5,minmax(0,1fr));gap:6px;width:96vw;padding:8px}
  .card-name{font-size:0.58rem}
  .card-stars{font-size:0.55rem}
  .stargate{width:100vw;height:100vw;max-width:600px;max-height:600px}
  .light-pillar{width:140px}
  .lens-flare{width:140vw;height:140vw}
  .banner-title-glow{font-size:1rem;letter-spacing:2px}
  .btn-result{padding:8px 18px;font-size:0.75rem}
}
@media(min-width:769px){.mobile-tabs{display:none}}

/* ============================================================
   ACCESSIBILITY
============================================================ */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important}
}
:focus-visible{outline:2px solid var(--purple);outline-offset:2px}

/* ============================================================
   MINIGAME — HAMMER WHACK
============================================================ */
.icon-minigame{
  width:30px;height:30px;border-radius:50%;cursor:pointer;
  border:1px solid rgba(212,184,122,0.15);background:rgba(255,255,255,0.02);
  color:var(--gold);font-size:0.85rem;
  display:flex;align-items:center;justify-content:center;transition:all 0.2s;
  position:relative;
}
.icon-minigame:hover{background:rgba(212,184,122,0.08);border-color:rgba(212,184,122,0.4)}
.icon-minigame::after{
  content:"";position:absolute;top:-2px;right:-2px;
  width:8px;height:8px;border-radius:50%;
  background:var(--g3);box-shadow:0 0 4px var(--gold);
  animation:mg-dot-pulse 2s ease-in-out infinite;
}
@keyframes mg-dot-pulse{0%,100%{opacity:0.4}50%{opacity:1}}

#minigame-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(2,2,10,0.93);
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;
  transition:opacity 0.35s;
}
#minigame-overlay.open{opacity:1;pointer-events:auto}

.mg-top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;
  background:rgba(12,20,42,0.8);backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(212,184,122,0.15);
  z-index:10;
}
.mg-timer{
  font-family:var(--ft);font-size:1.2rem;font-weight:700;
  color:var(--g2);letter-spacing:1px;min-width:70px;
}
.mg-timer.urgent{color:#ff6b6b;animation:mg-timer-flash 0.5s ease-in-out infinite}
@keyframes mg-timer-flash{0%,100%{opacity:1}50%{opacity:0.4}}
.mg-score-display{
  font-family:var(--ft);font-size:0.95rem;
  color:var(--g2);letter-spacing:0.5px;
}
.mg-score-display span{color:var(--g3);font-weight:700;font-size:1.1rem}
.mg-close-btn{
  width:32px;height:32px;border-radius:50%;
  border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);
  color:var(--t2);cursor:pointer;font-size:0.9rem;
  display:flex;align-items:center;justify-content:center;transition:all 0.2s;
  font-family:var(--fu);
}
.mg-close-btn:hover{color:var(--text);border-color:rgba(255,255,255,0.25)}

.mg-play-area{flex:1;position:relative;overflow:hidden;cursor:none}
.mg-character{
  position:absolute;width:120px;height:120px;
  transform:translate(-50%,-50%) scale(0);
  transition:transform 0.3s cubic-bezier(0.34,1.5,0.64,1);
  pointer-events:none;z-index:5;
}
.mg-character.show{transform:translate(-50%,-50%) scale(1)}
.mg-character.hit{transform:translate(-50%,-50%) scale(0.7)!important;transition:transform 0.08s ease-in!important}
.mg-character img{
  width:100%;height:100%;object-fit:cover;border-radius:50%;
  border:3px solid rgba(212,184,122,0.6);
  box-shadow:0 0 30px rgba(212,184,122,0.35),0 0 60px rgba(180,140,80,0.15);
}
.mg-character.hit img{border-color:var(--g3);box-shadow:0 0 40px rgba(255,220,140,0.7)}

#mg-hammer{
  position:fixed;pointer-events:none;z-index:210;display:none;
  font-size:3rem;
  transform:translate(-20%,-80%) rotate(-30deg);
  filter:drop-shadow(0 4px 8px rgba(0,0,0,0.5));
  transition:transform 0.05s ease-out;
}
#mg-hammer.swing{transform:translate(-20%,-80%) rotate(20deg);transition:transform 0.08s ease-in}

.mg-score-pop{
  position:absolute;pointer-events:none;z-index:15;
  font-family:var(--ft);font-weight:900;
  font-size:1.4rem;
  color:var(--g3);
  text-shadow:0 0 10px rgba(212,184,122,0.6);
  animation:mg-pop-up 1s ease-out forwards;
}
@keyframes mg-pop-up{0%{transform:translateY(0) scale(0.5);opacity:1}100%{transform:translateY(-80px) scale(1.2);opacity:0}}

.mg-miss{
  position:absolute;pointer-events:none;z-index:15;
  font-family:var(--fu);font-weight:600;
  font-size:0.85rem;color:var(--t3);
  animation:mg-miss-fade 0.6s ease-out forwards;
}
@keyframes mg-miss-fade{0%{transform:translateY(0);opacity:0.8}100%{transform:translateY(-30px);opacity:0}}

.mg-gameover{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  text-align:center;z-index:20;
  transition:transform 0.4s cubic-bezier(0.34,1.5,0.64,1);
  background:rgba(8,14,32,0.9);padding:32px 40px;border-radius:20px;
  border:1px solid rgba(212,184,122,0.3);
  box-shadow:0 0 60px rgba(0,0,0,0.5);
}
.mg-gameover.show{transform:translate(-50%,-50%) scale(1)}
.mg-gameover h2{
  font-family:var(--ft);font-size:2rem;
  background:linear-gradient(180deg,var(--g3),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:8px;
}
.mg-gameover .mg-total{font-size:1.3rem;color:var(--g2);margin-bottom:16px}
.mg-gameover .mg-total span{color:var(--g3);font-weight:700}
.mg-btn-replay{
  padding:10px 28px;border-radius:8px;
  border:1px solid rgba(212,184,122,0.5);
  background:linear-gradient(135deg,rgba(212,184,122,0.2),rgba(176,143,255,0.1));
  color:var(--g2);font-family:var(--ft);font-size:0.9rem;letter-spacing:2px;
  cursor:pointer;transition:all 0.2s;
}
.mg-btn-replay:hover{
  background:rgba(212,184,122,0.2);border-color:var(--gold);
  box-shadow:0 0 18px rgba(212,184,122,0.3);
}

@media(max-width:768px){
  #mg-hammer{font-size:2.2rem}
  .mg-character{width:90px;height:90px}
  .mg-gameover{padding:24px 28px}
  .mg-gameover h2{font-size:1.4rem}
}
</style>

<body>

<!-- Background layers -->
<canvas id="starfield"></canvas>
<canvas id="pfx-canvas"></canvas>
<div class="central-glow"></div>

<!-- Full-screen effects layers -->
<div id="fullscreen-flash"></div>

<!-- Main App -->
<div id="app">
  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-left">
      <button class="back-arrow" title="返回">←</button>
      <div class="brand-icon"></div>
      <span class="banner-name" id="banner-name">角色活动祈愿</span>
    </div>
    <div class="top-right">
      <div class="res-card">
        <div class="res-icon"></div>
        <span class="res-num" id="fate-num">5</span>
        <span class="res-label" id="fate-label">纠缠之缘</span>
      </div>
      <button class="btn-exchange">星辉兑换</button>
      <button class="icon-minigame" id="btn-minigame" title="锤子游戏">🔨</button>
      <button class="icon-mute" id="btn-mute" title="音效">🔊</button>
    </div>
  </div>

  <!-- MOBILE TABS -->
  <div class="mobile-tabs" id="mobile-tabs" role="tablist"></div>

  <!-- MAIN -->
  <div class="main-area">
    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar" role="tablist"></div>

    <!-- CENTER -->
    <div class="center-stage" id="center-stage">
      <div class="sacred-rings">
        <div class="sacred-ring r1"></div>
        <div class="sacred-ring r2"></div>
        <div class="sacred-ring r3"></div>
        <div class="sacred-ring r4"></div>
      </div>
      <div class="splash-wrap" id="splash-wrap">
        <div class="splash-frame" id="splash-frame">
          <div class="splash-glow-bottom"></div>
          <img class="splash-img" id="splash-img" src="" alt="卡池封面" />
          <div class="splash-dual" id="splash-dual" style="display:none">
            <img class="splash-img-dual splash-img-dual-l" id="splash-dual-l" src="" alt="" />
            <img class="splash-img-dual splash-img-dual-r" id="splash-dual-r" src="" alt="" />
          </div>
          <div class="ambient-particles" id="ambient-particles"></div>
        </div>
        <div class="banner-title-glow" id="banner-title-glow"></div>
        <div class="up-char-info" id="up-char-info">
          <span class="up-char-name" id="up-char-name"></span>
          <span class="up-char-stars" id="up-char-stars"></span>
          <p class="up-char-desc" id="up-char-desc"></p>
        </div>
      </div>
    </div>

    <!-- RIGHT FLOATS -->
    <div class="right-floats">
      <button class="float-orb" id="btn-details" aria-label="详情" title="详情">?</button>

    </div>
  </div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <button class="btn-wish" id="btn-single">
      <span class="sweep"></span><span class="fate-dot"></span>祈愿1次
    </button>
    <div class="btn-wish-wrap">
      <div class="pity-pill" id="pity-pill">5★保底 <span class="pity-num" id="pity-rem">90</span>次 · 6★保底 <span class="pity-num" id="pity-6-rem">300</span>次</div>
      <button class="btn-wish btn-wish-x10" id="btn-ten">
        <span class="sweep"></span><span class="fate-dot"></span>祈愿10次
      </button>
    </div>
  </div>
</div>

<!-- DETAILS PANEL -->
<div id="details-overlay"></div>
<div id="details-panel" role="dialog" aria-label="详情" aria-modal="true">
  <div class="details-hdr">
    <h3 id="d-title">卡池详情</h3>
    <button class="details-close" id="details-close">✕</button>
  </div>
  <div class="details-inner">
    <div class="details-sec"><h4>UP 物品</h4><div id="d-up-list"></div></div>

        <tr><td>5★ 基础概率</td><td class="gold">0.60%</td></tr>

        <tr><td>4★ 基础概率</td><td class="purple">5.10%</td></tr>
        <tr><td>4★ 含保底综合</td><td class="purple">13.00%</td></tr>
        <tr><td>5★ 保底</td><td>90抽必出</td></tr>
        <tr><td>4★ 保底</td><td>10抽必出</td></tr>

    </div>
    <div class="details-sec"><h4>祈愿记录</h4><div class="hist-list" id="d-hist"></div></div>

<!-- ▼ MINIGAME OVERLAY -->
<div id="minigame-overlay">
  <div class="mg-top-bar">
    <span class="mg-timer" id="mg-timer">⏱ 15s</span>
    <span class="mg-score-display">获得 <span id="mg-earned">0</span> 纠缠之缘</span>
    <button class="mg-close-btn" id="mg-close">✕</button>
  </div>
  <div class="mg-play-area" id="mg-play-area">
    <div class="mg-character" id="mg-character">
      <img id="mg-char-img" src="" alt="" onerror="this.style.display='none'" />
    </div>
    <div class="mg-gameover" id="mg-gameover">
      <h2>时间到！</h2>
      <div class="mg-total">获得 <span id="mg-total">0</span> 纠缠之缘</div>
      <button class="mg-btn-replay" id="mg-replay">再来一次</button>
    </div>

<div id="mg-hammer">🔨</div>

<!-- ▼ FULLSCREEN WISH ANIMATION STAGE -->
<div id="wish-stage">

  <div class="stargate" id="stargate">
    <div class="stargate-core"></div>
    <div class="stargate-ring gr4"></div>
    <div class="stargate-ring gr3"></div>
    <div class="stargate-ring gr2"></div>
    <div class="stargate-ring gr1"></div>
  </div>

  <div class="meteor-trail" id="meteor-trail"></div>
  <div class="meteor" id="meteor"></div>
  <!-- Impact flash + shockwaves -->
  <div class="impact-flash" id="impact-flash"></div>
  <div class="shockwave" id="shockwave-1"></div>
  <div class="shockwave" id="shockwave-2" style="animation-delay:0.15s"></div>

<div class="light-pillar" id="light-pillar"></div>

  <div class="card-deck" id="card-deck"></div>
</div>

<!-- Result controls -->
<div class="result-controls" id="result-controls">
  <button class="btn-result" id="btn-again">再次祈愿</button>

(function(){

const ST={6:{c:'#FFB8C6',l:'6★',cl:'s6'},5:{c:'#D4B87A',l:'5★',cl:'s5'},4:{c:'#B08FFF',l:'4★',cl:'s4'},3:{c:'#5B7A9A',l:'3★',cl:'s3'}};

/* Cards — preserved from original */

    up5:null,pool5:[C5[0],C5[2]],up4:[],pool4:C4,

];

/* State */
let S={bn:0,total:0,p5:[0,0,0],p4:[0,0,0],p6:[0,0,0],guar:[false,false,false],hist:[],muted:false};

/* DOM shortcuts */
const Q=s=>document.querySelector(s);
const sf=Q('#starfield'),sfx=sf.getContext('2d');
const pc=Q('#pfx-canvas'),px=pc.getContext('2d');
const dp=Q('#details-panel'),dbo=Q('#details-overlay');
const wishStage=Q('#wish-stage'),cardDeck=Q('#card-deck');
const stargate=Q('#stargate'),meteor=Q('#meteor'),trail=Q('#meteor-trail');
const flash=Q('#impact-flash'),fsf=Q('#fullscreen-flash');
const pillar=Q('#light-pillar'),flare=Q('#lens-flare');

const resCtl=Q('#result-controls'),btnSkip=Q('#btn-skip');

/* ============================================================
   STARFIELD with nebulae & shooting stars
============================================================ */
let stars=[],shootingStars=[];
function initSF(){
  sf.width=window.innerWidth;sf.height=window.innerHeight;
  stars=[];
  for(let i=0;i<160;i++)stars.push({
    x:Math.random()*sf.width,y:Math.random()*sf.height,
    r:Math.random()*1.3+0.3,s:Math.random()*0.008+0.002,
    o:Math.random()*Math.PI*2,h:28+Math.random()*40,layer:Math.floor(Math.random()*3)
  });
  shootingStars=[];
}
function spawnShootingStar(){
  if(Math.random()<0.018&&shootingStars.length<2){
    shootingStars.push({
      x:Math.random()*sf.width,y:Math.random()*sf.height*0.5,
      vx:3+Math.random()*5,vy:1+Math.random()*3,
      life:1,max:1,len:40+Math.random()*80
    });
  }
}
function drawSF(t){
  sfx.clearRect(0,0,sf.width,sf.height);
  // Nebula layers
  const nebs=[
    {x:sf.width*0.2,y:sf.height*0.3,r:280,c:'rgba(60,30,100,0.05)',dx:0.1,dy:0.05},
    {x:sf.width*0.78,y:sf.height*0.65,r:220,c:'rgba(100,60,30,0.04)',dx:-0.08,dy:-0.04},
    {x:sf.width*0.5,y:sf.height*0.5,r:340,c:'rgba(40,20,80,0.05)',dx:0.05,dy:-0.03},
  ];
  for(const n of nebs){
    const g=sfx.createRadialGradient(n.x+n.dx*t*0.01,n.y+n.dy*t*0.01,0,n.x,n.y,n.r);
    g.addColorStop(0,n.c);g.addColorStop(1,'transparent');
    sfx.fillStyle=g;sfx.beginPath();sfx.arc(n.x,n.y,n.r,0,Math.PI*2);sfx.fill();
  }
  // Stars
  for(const s of stars){
    const a=0.1+0.32*(Math.sin(t*s.s+s.o)*0.5+0.5)*(s.layer===0?1:s.layer===1?0.6:0.3);
    sfx.beginPath();sfx.arc(s.x,s.y,s.r,0,Math.PI*2);
    sfx.fillStyle=`hsla(${s.h},30%,${72+s.layer*8}%,${a})`;sfx.fill();
  }
  // Shooting stars
  for(let i=shootingStars.length-1;i>=0;i--){
    const ss=shootingStars[i];ss.x+=ss.vx;ss.y+=ss.vy;ss.life-=0.015;
    if(ss.life<=0){shootingStars.splice(i,1);continue}
    const grad=sfx.createLinearGradient(ss.x,ss.y,ss.x-ss.len*0.7,ss.y-ss.len*0.3);
    grad.addColorStop(0,`rgba(255,255,255,${ss.life})`);grad.addColorStop(1,'rgba(255,255,255,0)');
    sfx.strokeStyle=grad;sfx.lineWidth=1.5;sfx.beginPath();
    sfx.moveTo(ss.x,ss.y);sfx.lineTo(ss.x-ss.len*0.7,ss.y-ss.len*0.3);sfx.stroke();
  }
  spawnShootingStar();
}

/* ============================================================
   PARTICLE SYSTEM
============================================================ */
let pts=[];
function rPC(){pc.width=window.innerWidth;pc.height=window.innerHeight}
function spP(x,y,n,color,spd,life){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*spd;
    pts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:life+Math.random()*life*0.5,max:life*1.5,color,size:Math.random()*2.2+1});
  }
}
function upP(dt){
  for(let i=pts.length-1;i>=0;i--){
    const p=pts[i];p.life-=dt;
    if(p.life<=0){pts.splice(i,1);continue}
    p.x+=p.vx*dt*60;p.y+=p.vy*dt*60;p.vx*=0.97;p.vy*=0.97;
  }
}
function drP(){
  px.clearRect(0,0,pc.width,pc.height);
  for(const p of pts){
    const a=p.life/p.max;
    px.beginPath();px.arc(p.x,p.y,p.size,0,Math.PI*2);
    px.fillStyle=p.color.replace('1)',`${a})`).replace('rgb','rgba');px.fill();
  }
}

/* ============================================================
   AMBIENT PARTICLES (around splash)
============================================================ */
function buildAmbient(){

/* ============================================================

/* ============================================================
   DRAW LOGIC
============================================================ */
function gR5(){const p=S.p5[S.bn];if(p>=P5-1)return 1;if(p>=SP)return Math.min(R5+(p-SP+1)*SI,1);return R5}
function gR4(){return S.p4[S.bn]>=P4-1?1:R4}
function draw1(){
  const i=S.bn,b=BN[i];let r,card;
  const p5=b.pool5||C5;
  const p4=b.pool4||C4;
  if(Math.random()<gR5()){
    r=5;
    if(b.up5&&(S.guar[i]||Math.random()<0.5)){card=b.up5;S.guar[i]=false}
    else{const o=p5.filter(c=>!b.up5||c.id!==b.up5.id);card=o[Math.floor(Math.random()*o.length)];if(b.up5)S.guar[i]=true}
  }
  else if(Math.random()<gR4()){
    r=4;
    if(b.up4&&b.up4.length&&Math.random()<0.5)card=b.up4[Math.floor(Math.random()*b.up4.length)];
    else card=p4[Math.floor(Math.random()*p4.length)];
  }
  else{r=3;card=C3[Math.floor(Math.random()*C3.length)]}
  if(r===5)S.p5[i]=0;else S.p5[i]++;
  if(r===4)S.p4[i]=0;else S.p4[i]++;
  S.p6[i]++;S.total++;return{card,rarity:r};
}

/* ============================================================
   SOUND (Web Audio API)
============================================================ */
let audioCtx=null;
function ensureAudio(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}return audioCtx}
function playTone(freq,dur,type='sine',vol=0.08){
  if(S.muted)return;
  const c=ensureAudio();if(!c)return;
  try{
    const o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type=type;o.frequency.setValueAtTime(freq,c.currentTime);
    g.gain.setValueAtTime(vol,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
    o.start();o.stop(c.currentTime+dur);
  }catch(e){}
}
function playSweep(f1,f2,dur,type='sine',vol=0.08){
  if(S.muted)return;
  const c=ensureAudio();if(!c)return;
  try{
    const o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type=type;
    o.frequency.setValueAtTime(f1,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(f2,c.currentTime+dur);
    g.gain.setValueAtTime(vol,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
    o.start();o.stop(c.currentTime+dur);
  }catch(e){}
}
function sndButton(){playTone(880,0.08,'sine',0.05);playTone(1320,0.06,'sine',0.04)}
function sndGate(){playSweep(80,240,0.5,'sine',0.10);playSweep(200,140,0.5,'triangle',0.06)}
function sndImpact(){playSweep(800,80,0.25,'sawtooth',0.12)}
function sndFlip(){playTone(1200,0.05,'square',0.03);playTone(700,0.04,'square',0.02)}
function snd3(){playTone(620,0.12,'sine',0.04)}
function snd4(){playTone(660,0.10,'triangle',0.07);setTimeout(()=>playTone(880,0.12,'triangle',0.07),60)}
function snd5(){
  playTone(523,0.2,'sine',0.10);
  setTimeout(()=>playTone(659,0.2,'sine',0.10),120);
  setTimeout(()=>playTone(784,0.25,'sine',0.10),240);
  setTimeout(()=>playTone(1047,0.35,'sine',0.10),380);
}
function snd6(){
  playTone(784,0.25,'sine',0.12);
  setTimeout(()=>playTone(1047,0.25,'sine',0.12),150);
  setTimeout(()=>playTone(1319,0.3,'sine',0.12),300);
  setTimeout(()=>playTone(1568,0.4,'sine',0.12),450);
  setTimeout(()=>playTone(1047,0.3,'sine',0.10),700);
