<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X[DAILY] · xLab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   X[DAILY] · VARIABLES
============================================================ */
:root{
  --bg0:#080e20;--gold:#D4B87A;--g2:#E8D5A3;--g3:#F5E6CC;--g4:#B89A50;
  --purple:#B08FFF;--p2:#c8b0ff;
  --text:#E8E0D0;--t2:#9999AA;--t3:#666680;
  --panel:rgba(14,18,32,0.55);--pborder:rgba(212,184,122,0.28);
  --xline:rgba(212,184,122,0.22);--xline2:rgba(255,255,255,0.10);
  --xfont-mono:"JetBrains Mono","SF Mono","Menlo","Cascadia Code",ui-monospace,monospace;
  --xfont-disp:"Cinzel","Noto Serif SC",serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow-x:hidden}
body{
  font-family:var(--xfont-mono);background:#05081a;color:var(--text);
  -webkit-font-smoothing:antialiased;min-height:100vh;
}
canvas#starfield{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ============================================================
   TOP BAR
============================================================ */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:20;
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:10px 22px;
  background:rgba(8,12,22,0.42);backdrop-filter:blur(14px) saturate(140%);
  -webkit-backdrop-filter:blur(14px) saturate(140%);
  border-bottom:1px solid var(--xline2);
}
.top-bar .back-arrow{
  font-family:var(--xfont-mono);font-size:.85rem;
  color:var(--gold);text-decoration:none;
  display:flex;align-items:center;gap:6px;
  background:rgba(212,184,122,0.06);border:1px solid var(--xline);
  border-radius:6px;padding:7px 12px;transition:all .25s ease;
}
.top-bar .back-arrow:hover{border-color:var(--gold);background:rgba(212,184,122,0.12)}
.top-bar .brand{
  font-family:var(--xfont-mono);font-size:.7rem;letter-spacing:.32em;
  color:var(--gold);border:1px solid var(--xline);padding:3px 8px;
  border-radius:4px;background:rgba(212,184,122,0.06);
}
.top-bar .banner-name{
  font-family:var(--xfont-mono);font-size:.82rem;letter-spacing:.06em;
  background:linear-gradient(180deg,var(--g3),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.top-bar .banner-name::before{content:'X[ ';color:#7aa9ff;-webkit-text-fill-color:#7aa9ff}
.top-bar .banner-name::after{content:' ]';color:#7aa9ff;-webkit-text-fill-color:#7aa9ff}

/* ============================================================
   BANNER RIBBON
============================================================ */
.banner-ribbon{
  position:fixed;top:51px;left:0;right:0;z-index:19;
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:6px 22px;
  background:linear-gradient(180deg,rgba(14,18,32,0.5),rgba(14,18,32,0.15));
  border-bottom:1px solid var(--xline2);backdrop-filter:blur(10px);
  font-family:var(--xfont-mono);font-size:.7rem;letter-spacing:.12em;color:var(--t2);
}
.banner-ribbon .br-left{display:flex;align-items:center;gap:12px}
.banner-ribbon .br-tag{
  padding:2px 8px;border:1px solid #66D9B1;border-radius:3px;
  color:#66D9B1;font-weight:600;letter-spacing:.18em;background:rgba(102,217,177,0.06);
}
.banner-ribbon .br-name{color:var(--text);letter-spacing:.06em}
.banner-ribbon .br-timer{display:flex;align-items:center;gap:8px}
.banner-ribbon .br-timer-num{color:#66D9B1;font-weight:700;font-variant-numeric:tabular-nums;font-size:.78rem}

/* ============================================================
   MAIN LAYOUT
============================================================ */
.page{
  position:relative;z-index:1;
  padding:104px 28px 40px;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
}

/* Stats panel — top strip */
.stats-strip{
  display:flex;align-items:center;justify-content:center;gap:24px;
  padding:18px 28px;margin-bottom:28px;
  background:var(--panel);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid var(--xline2);border-radius:14px;
  flex-wrap:wrap;
}
.stat-cell{text-align:center;min-width:80px}
.stat-cell .sv{
  font-family:var(--xfont-mono);font-size:1.7rem;font-weight:700;
  background:linear-gradient(180deg,var(--g3),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1.15;
}
.stat-cell .sl{
  font-family:var(--xfont-mono);font-size:.65rem;letter-spacing:.18em;
  color:var(--t2);margin-top:4px;
}
.stats-divider{width:1px;height:40px;background:var(--xline2)}

/* Week total */
.week-total{
  margin-bottom:32px;font-family:var(--xfont-mono);font-size:.75rem;
  letter-spacing:.12em;color:var(--t2);
  text-align:center;
}
.week-total b{color:var(--g3);font-weight:600}

/* ============================================================
   DAY CARDS — horizontal row
============================================================ */
.days-row{
  display:flex;gap:14px;justify-content:center;flex-wrap:wrap;
  margin-bottom:32px;max-width:900px;width:100%;
}
.day-card{
  flex:1;min-width:100px;max-width:120px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  padding:18px 10px 14px;border-radius:14px;cursor:default;
  background:var(--panel);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid var(--xline2);
  transition:all .35s cubic-bezier(.22,1,.36,1);
  position:relative;overflow:hidden;
}
.day-card .dc-num{
  font-family:var(--xfont-mono);font-size:.75rem;font-weight:700;
  letter-spacing:.12em;
  background:linear-gradient(180deg,var(--g3),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.day-card .dc-dot{
  width:52px;height:52px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--xfont-disp);font-size:1.35rem;font-weight:700;
  color:var(--t3);background:rgba(255,255,255,0.02);
  border:2px solid rgba(255,255,255,0.08);
  transition:all .4s ease;position:relative;
}
.day-card .dc-reward{
  font-family:var(--xfont-mono);font-size:.62rem;letter-spacing:.08em;
  color:var(--t2);text-align:center;line-height:1.4;
  white-space:nowrap;
}
.day-card .dc-label{
  font-family:var(--xfont-mono);font-size:.62rem;letter-spacing:.16em;
  color:var(--t3);
}

/* — checked — */
.day-card.checked .dc-dot{
  background:radial-gradient(circle,rgba(212,184,122,0.2),rgba(18,22,40,0.7));
  border-color:rgba(212,184,122,0.55);color:var(--gold);
  box-shadow:0 0 28px rgba(212,184,122,0.25),0 0 0 1px rgba(212,184,122,0.08) inset;
}
.day-card.checked .dc-dot::after{
  content:'✓';position:absolute;top:-4px;right:-4px;
  width:18px;height:18px;border-radius:50%;
  background:var(--gold);color:#05081a;font-size:.6rem;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--xfont-mono);
}
.day-card.checked .dc-reward{color:var(--g2)}
.day-card.checked .dc-label{color:var(--g2)}

/* — today — */
.day-card.today{
  border-color:rgba(102,217,177,0.55);
  box-shadow:0 0 32px rgba(102,217,177,0.2),0 4px 18px rgba(0,0,0,0.4);
  transform:translateY(-6px);cursor:pointer;
}
.day-card.today:hover{
  transform:translateY(-10px);
  box-shadow:0 0 48px rgba(102,217,177,0.35),0 8px 28px rgba(0,0,0,0.5);
}
.day-card.today .dc-dot{
  border-color:#66D9B1;color:#66D9B1;
  animation:pulse-today 1.8s ease-in-out infinite;
  box-shadow:0 0 32px rgba(102,217,177,0.45),0 0 0 2px rgba(102,217,177,0.15) inset;
}
@keyframes pulse-today{
  0%,100%{box-shadow:0 0 32px rgba(102,217,177,0.45),0 0 0 2px rgba(102,217,177,0.15) inset}
  50%{box-shadow:0 0 52px rgba(102,217,177,0.7),0 0 0 4px rgba(102,217,177,0.3) inset}
}
.day-card.today .dc-label{color:#66D9B1!important}
.day-card.today .dc-reward{color:#AAFFD8}

/* — bonus badge for day 7 — */
.day-card[data-day="7"] .dc-dot::before{
  content:'BONUS';position:absolute;top:-12px;left:50%;
  transform:translateX(-50%);
  font-family:var(--xfont-mono);font-size:.45rem;letter-spacing:.22em;
  color:#05081a;background:var(--gold);padding:2px 5px;border-radius:3px;
  font-weight:700;
}

/* — already signed today — */
.day-card.today.checked{
  border-color:rgba(212,184,122,0.45);
  box-shadow:0 0 28px rgba(212,184,122,0.2);
  cursor:default;
}
.day-card.today.checked .dc-dot{
  border-color:var(--gold);color:var(--gold);
  animation:none;
  box-shadow:0 0 28px rgba(212,184,122,0.25),0 0 0 1px rgba(212,184,122,0.08) inset;
}

/* — shimmer sweep on today — */
.day-card.today:not(.checked)::before{
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:linear-gradient(45deg,transparent 40%,rgba(255,255,255,0.06) 50%,transparent 60%);
  animation:dc-shimmer 2.4s ease-in-out infinite;
}
@keyframes dc-shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* ============================================================
   SIGN BUTTON AREA
============================================================ */
.sign-area{display:flex;align-items:center;gap:16px}
.sign-btn{
  padding:15px 60px;border-radius:10px;
  font-family:var(--xfont-mono);font-size:.95rem;font-weight:600;
  letter-spacing:.16em;
  background:linear-gradient(180deg,rgba(102,217,177,0.22),rgba(102,217,177,0.06));
  border:1px solid rgba(102,217,177,0.5);color:#AAFFD8;
  cursor:pointer;transition:all .35s ease;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  position:relative;overflow:hidden;
}
.sign-btn::before{content:'▸  ';color:#66D9B1;font-weight:700}
.sign-btn:hover{
  background:linear-gradient(180deg,rgba(102,217,177,0.35),rgba(102,217,177,0.12));
  border-color:#66D9B1;box-shadow:0 0 48px rgba(102,217,177,0.3);
  transform:translateY(-2px);
}
.sign-btn:active{transform:scale(.96)}
.sign-btn.done{
  opacity:.45;cursor:not-allowed;pointer-events:none;
  border-color:var(--xline2);background:rgba(255,255,255,0.03);color:var(--t2);
}
.sign-btn::after{
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:linear-gradient(45deg,transparent 40%,rgba(102,217,177,0.08) 50%,transparent 60%);
  animation:dc-shimmer 3s ease-in-out infinite;
}

.missed-hint{
  font-family:var(--xfont-mono);font-size:.7rem;letter-spacing:.08em;
  color:#FF7878;opacity:0;transition:opacity .35s ease;
}
.missed-hint.show{opacity:1}

/* ============================================================
   REWARD TOAST
============================================================ */
.reward-overlay{
  position:fixed;inset:0;z-index:200;pointer-events:none;display:flex;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,0);transition:background .4s ease;
}
.reward-overlay.show{background:rgba(0,0,0,0.45)}
.reward-toast{
  padding:32px 44px;border-radius:18px;
  background:var(--panel);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid var(--xline);box-shadow:0 24px 60px rgba(0,0,0,.6),0 0 80px rgba(212,184,122,.18);
  text-align:center;
  transform:scale(.8);opacity:0;
  transition:transform .5s cubic-bezier(.22,1,.36,1),opacity .4s ease;
}
.reward-overlay.show .reward-toast{transform:scale(1);opacity:1}
.reward-toast .ri{font-size:3rem;margin-bottom:6px}
.reward-toast .rt{
  font-family:var(--xfont-disp);font-size:1.2rem;font-weight:600;
  background:linear-gradient(180deg,var(--g3),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:4px;
}
.reward-toast .ra{
  font-family:var(--xfont-mono);font-size:1.8rem;font-weight:700;color:var(--g3);
}
.reward-toast .rh{
  font-size:.72rem;color:var(--t2);margin-top:10px;
  font-family:var(--xfont-mono);
}
.reward-toast .rd{font-size:.7rem;color:#66D9B1;margin-top:4px;font-family:var(--xfont-mono)}

.footer{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  z-index:1;font-size:.72rem;color:var(--t2);letter-spacing:.1em;
  font-family:var(--xfont-mono);
}

/* ============================================================
   RESPONSIVE
============================================================ */
@media(max-width:760px){
  .days-row{gap:8px}
  .day-card{min-width:70px;max-width:90px;padding:12px 6px 10px;gap:6px}
  .day-card .dc-dot{width:40px;height:40px;font-size:1.05rem}
  .day-card .dc-reward{font-size:.55rem}
  .day-card .dc-label{font-size:.55rem}
  .stats-strip{gap:12px;padding:12px 16px}
  .stat-cell .sv{font-size:1.3rem}
  .sign-btn{padding:13px 34px;font-size:.82rem}
  .top-bar{padding:8px 14px}
  .banner-ribbon{padding:5px 12px;font-size:.62rem}
  .day-card[data-day="7"] .dc-dot::before{font-size:.38rem;top:-10px}
}
@media(max-width:500px){
  .days-row{display:grid;grid-template-columns:repeat(4,1fr)}
  .day-card{min-width:auto;max-width:none}
  .day-card:nth-child(7){grid-column:1/5;max-width:160px;margin:0 auto}
}
</style>
</head>

<canvas id="starfield"></canvas>

<!-- TOP BAR -->
<div class="top-bar">

      <div class="sv" id="sv-streak">🔥 0</div>

    </div>
    <div class="stats-divider"></div>
    <div class="stat-cell">
      <div class="sv" id="sv-total">0</div>
      <div class="sl">累计签到</div>

<script>
(function(){
'use strict';

/* ============================================================
   CONSTANTS
============================================================ */
const REWARDS = [
  { icon:'🌠', name:'纠缠之缘', amount:1, key:'fate' },
  { icon:'✨', name:'相遇之缘', amount:2, key:'fate' },
  { icon:'🌠', name:'纠缠之缘', amount:3, key:'fate' },
  { icon:'✨', name:'相遇之缘', amount:4, key:'fate' },
  { icon:'🌠', name:'纠缠之缘', amount:5, key:'fate' },
  { icon:'✨', name:'相遇之缘', amount:6, key:'fate' },
  { icon:'🌠', name:'纠缠之缘', amount:10, key:'fate' },
];
const DAY_LABELS = ['MON','TUE','WED','THU','FRI','SAT','SUN'];

let state = {
  lastDate: '',
  streak: 0,        // completed days this week (0..7)
  totalSign: 0,
  totalEarned: 0,
  curWeekStart: '', // Monday of current sign-week
};

/* ============================================================
   DATE HELPERS
============================================================ */
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function yesterdayStr(dateStr) {
  const d = dateStr ? new Date(dateStr) : new Date();
  d.setDate(d.getDate() - 1);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function getMonday(date) {
  const d = new Date(date);
  const day = d.getDay(); // 0=Sun
  d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function dayOfWeek(dateStr) {
  const d = new Date(dateStr);
  const dow = d.getDay();
  return dow === 0 ? 6 : dow - 1; // Mon=0
}

/* ============================================================
   PERSISTENCE
============================================================ */
function loadState() {
  try {
    const d = JSON.parse(localStorage.getItem('wish_daily_v2'));
    if (d) {
      state.lastDate     = d.ld || '';
      state.streak       = d.sk || 0;
      state.totalSign    = d.ts || 0;
      state.totalEarned  = d.te || 0;
      state.curWeekStart = d.ws || '';
    }
  } catch(e) {}
}
function saveState() {
  try {
    localStorage.setItem('wish_daily_v2', JSON.stringify({
      ld: state.lastDate,
      sk: state.streak,
      ts: state.totalSign,
      te: state.totalEarned,
      ws: state.curWeekStart,
    }));
    if(window.SyncVault) SyncVault.autoSync();
  } catch(e) {}
}

/* ============================================================
   DELIVER REWARD TO WISH PAGE
============================================================ */
function creditReward(reward) {
  // Update wish_genshin_v5 fate count
  try {
    const raw = localStorage.getItem('wish_genshin_v5');
    if (raw) {
      const d = JSON.parse(raw);
      // Increment fate count — wish.html reads it from #fate-num textContent
      // so we can't directly set it here without the page being loaded.
      // Instead, set a pending reward that wish.html will pick up.
    }
    // Stack pending rewards
    const queue = JSON.parse(localStorage.getItem('wish_daily_queue') || '[]');
    queue.push({ name:reward.name, amount:reward.amount, key:reward.key, date:todayStr() });
    localStorage.setItem('wish_daily_queue', JSON.stringify(queue));
    if(window.SyncVault) SyncVault.autoSync();
  } catch(e) {}
}

/* ============================================================
   RIBBON COUNTDOWN
============================================================ */
function updateRibbon() {
  const num = document.getElementById('br-timer-num');
  const name = document.getElementById('br-name');
  if (!num || !name) return;
  const now = new Date();
  // Next Monday
  const monday = now.getDay() === 1 ? now : (() => {
    const d = new Date(now);
    d.setDate(d.getDate() + (8 - (d.getDay() || 7)));
    d.setHours(0,0,0,0);
    return d;
  })();
  const diff = monday - now;
  if (diff <= 0) { num.textContent = '重置中...'; return; }
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  num.textContent = d + 'd ' + String(h).padStart(2,'0') + 'h ' + String(m).padStart(2,'0') + 'm';
  // Week number
  const weekNum = Math.ceil((new Date(now.getFullYear(), 0, 1).getTime() - now.getTime()) / (7*86400000) * -1) || 1;
  const dow = dayOfWeek(todayStr());
  name.innerHTML = '第 <b>' + weekNum + '</b> 周 · <b>周' + DAY_LABELS[dow] + '</b>';
  setTimeout(updateRibbon, 30000);
}

/* ============================================================
   RENDER
============================================================ */
function render() {
  const today = todayStr();
  const signed = state.lastDate === today;
  const dow = dayOfWeek(today);

  // Determine week start (Monday)
  const thisMonday = getMonday(today);
  // If curWeekStart doesn't match this Monday, weekly reset
  if (state.curWeekStart !== thisMonday) {
    state.curWeekStart = thisMonday;
    state.streak = 0;
    state.lastDate = ''; // force unsign this week
  }

  // Check continuity
  let missedDay = false;
  if (state.lastDate) {
    const lastDate = new Date(state.lastDate);
    const nowDate = new Date(today);
    const gap = Math.floor((nowDate - lastDate) / 86400000);
    if (gap > 1) {
      // More than 1 day gap => reset streak
      // But only reset if lastDate was this week
      if (state.lastDate >= thisMonday) {
        // partially signed week, then skipped
        state.streak = 0;
        missedDay = true;
      }
    }
  }

  document.getElementById('missed-hint').classList.toggle('show', missedDay);

  // Render day cards
  const row = document.getElementById('days-row');
  row.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const card = document.createElement('div');
    card.className = 'day-card';
    card.dataset.day = String(i+1);

    // State
    const thisDate = new Date(thisMonday);
    thisDate.setDate(thisDate.getDate() + i);
    const ds = thisDate.getFullYear() + '-' +
      String(thisDate.getMonth()+1).padStart(2,'0') + '-' +
      String(thisDate.getDate()).padStart(2,'0');

    // Checked if signed on or after this date
    const isChecked = state.lastDate !== '' && state.streak > 0 && i < state.streak;
    // Today: is this the current day and not yet signed
    const isToday = ds === today && !signed && ds >= thisMonday;

    if (isChecked) card.classList.add('checked');
    if (isToday) card.classList.add('today');
    if (isToday && signed) { card.classList.add('today','checked'); }

    card.innerHTML =
      '<div class="dc-num">DAY ' + String(i+1).padStart(2,'0') + '</div>' +
      '<div class="dc-dot">' + (i+1) + '</div>' +
      '<div class="dc-reward">' + REWARDS[i].icon + ' ' + REWARDS[i].name + ' ×' + REWARDS[i].amount + '</div>' +
      '<div class="dc-label">' + DAY_LABELS[i] + '</div>';

    if (isToday) {
      card.addEventListener('click', doSign);
    }
    row.appendChild(card);
  }

  // Stats
  document.getElementById('sv-streak').innerHTML = '🔥 ' + state.streak;
  document.getElementById('sv-total').textContent = state.totalSign;
  document.getElementById('sv-week').textContent = state.streak + '/7';
  document.getElementById('sv-earned').textContent = state.totalEarned;

  // Week total
  let weekTotal = 0;
  for (let i = 0; i < state.streak; i++) weekTotal += REWARDS[i].amount;
  document.getElementById('week-total').innerHTML =
    '本周已领取：<b>' + (weekTotal > 0 ? REWARDS[0].name + ' ×' + weekTotal : '—') + '</b>';

  // Button
  const btn = document.getElementById('sign-btn');
  if (signed) {
    btn.className = 'sign-btn done';
    btn.textContent = '今日已签 ✓';
  } else {
    btn.className = 'sign-btn';
    btn.textContent = '▸ 签到领取';
  }

  saveState();
  updateRibbon();
}

/* ============================================================
   SIGN
============================================================ */
function doSign() {
  const today = todayStr();
  const thisMonday = getMonday(today);

  // Weekly reset
  if (state.curWeekStart !== thisMonday) {
    state.curWeekStart = thisMonday;
    state.streak = 0;
  }

  // Check already signed
  if (state.lastDate === today) return;

  // Check yesterday continuity
  const prevDay = state.lastDate;
  if (prevDay) {
    const prev = new Date(prevDay);
    const now = new Date(today);
    const gap = Math.floor((now - prev) / 86400000);
    if (gap === 1) {
      // Continuation: streak++
      state.streak = Math.min(state.streak + 1, 7);
    } else if (gap > 1) {
      // Break: reset
      state.streak = 1;
    }
  } else {
    // First sign this week
    state.streak = 1;
  }

  state.lastDate = today;
  state.totalSign++;

  const reward = REWARDS[Math.min(state.streak - 1, 6)];
  state.totalEarned += reward.amount;
  creditReward(reward);

  // Show toast
  const overlay = document.getElementById('reward-overlay');
  document.getElementById('rt-icon').textContent = state.streak === 7 ? '🌟' : reward.icon;
  document.getElementById('rt-title').textContent = state.streak === 7 ? '🎉 满签奖励！' : '签到成功';
  document.getElementById('rt-amount').textContent = reward.icon + ' ' + reward.name + ' ×' + reward.amount;
  document.getElementById('rt-day').textContent = 'DAY ' + state.streak + ' / 7';
  document.getElementById('rt-hint').textContent = state.streak === 7 ? '本周满签！下周重置' : '连续 ' + state.streak + ' 天 · 已同步至祈愿页面';
  overlay.classList.add('show');
  setTimeout(() => overlay.classList.remove('show'), 2800);

  render();
}

document.getElementById('sign-btn').addEventListener('click', doSign);

// Init
loadState();
render();
})();
</script>
