<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>X[CARDS] · xLab</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Italiana&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a0608;
    --vellum: #f3ead6;
    --vellum-dim: #c9bd9d;
    --gold: #d4af6e;
    --gold-bright: #f0d28a;
    --gold-deep: #8a6a3a;
    --gold-edge: #b58a4a;
    --crimson: #8b1a2b;
    --crimson-deep: #4a0d18;
    --shadow: rgba(0,0,0,0.55);
    --pink: #FFB8C6;
    --purple: #B08FFF;
    --blue: #5B7A9A;
    --card-w: 220px;
    --card-h: 320px;
    --card-t: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--ink);
    color: var(--vellum);
    font-family: 'Cormorant Garamond', serif;
    cursor: none;
  }

  .stage {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 40%, #1a0e10 0%, #0a0608 55%, #050203 100%);
    overflow: hidden;
  }
  .grain {
    position: fixed; inset: -50%; pointer-events: none;
    opacity: 0.08; mix-blend-mode: overlay; z-index: 100;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    animation: drift 8s steps(6) infinite;
  }
  @keyframes drift {
    0%,100%{transform:translate(0,0)}20%{transform:translate(-3%,2%)}40%{transform:translate(2%,-3%)}60%{transform:translate(-2%,-2%)}80%{transform:translate(3%,3%)}
  }
  .vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 90;
    background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.75) 100%);
  }
  .spotlight {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
    background: radial-gradient(ellipse 600px 800px at 50% 50%, rgba(240,210,138,0.06) 0%, transparent 60%);
    opacity: 0; transition: opacity 0.8s ease;
  }
  body.has-active .spotlight { opacity: 1; }

  .deco {
    position: fixed; pointer-events: none; z-index: 50;
    color: var(--gold-deep); opacity: 0.55;
  }
  .deco.tl{top:28px;left:28px}.deco.tr{top:28px;right:28px;transform:scaleX(-1)}
  .deco.bl{bottom:28px;left:28px;transform:scaleY(-1)}.deco.br{bottom:28px;right:28px;transform:scale(-1,-1)}

  .masthead {
    position: fixed; top: 28px; left: 50%; transform: translateX(-50%);
    text-align: center; z-index: 60; pointer-events: none;
    transition: opacity 0.5s ease;
  }
  body.has-active .masthead { opacity: 0.3; }
  .masthead .eyebrow {
    font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.55em;
    color: var(--gold); margin-bottom: 4px; text-transform: uppercase;
  }
  .masthead .title {
    font-family: 'Italiana', serif; font-size: 34px; letter-spacing: 0.18em;
    color: var(--vellum); line-height: 1;
  }
  .masthead .rule {
    width: 80px; height: 1px; margin: 10px auto;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .masthead .sub {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 13px; color: var(--vellum-dim); letter-spacing: 0.08em;
  }

  /* Nav */
  .nav-btns {
    position: fixed; top: 32px; right: 28px; z-index: 110;
    display: flex; gap: 10px;
  }
  .nav-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(14,12,10,0.65); backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: var(--gold); font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease; text-decoration: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4),0 0 0 1px rgba(255,255,255,0.02) inset;
  }
  .nav-btn:hover {
    background: rgba(212,175,110,0.1);
    border-color: rgba(255,255,255,0.14); color: var(--gold-bright);
    box-shadow: 0 6px 24px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.04) inset;
    transform: translateY(-1px);
  }

  /* Page arrows */
  .page-arrow {
    position: fixed; top: 50%; transform: translateY(-50%); z-index: 110;
    width: 44px; height: 44px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.07);
    background: rgba(14,12,10,0.6); backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    color: var(--gold); font-size: 1.3rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.45),0 0 0 1px rgba(255,255,255,0.02) inset;
  }
  .page-arrow:hover {
    background: rgba(212,175,110,0.1);
    border-color: rgba(255,255,255,0.13); color: var(--gold-bright);
    box-shadow: 0 8px 28px rgba(0,0,0,0.55),0 0 0 1px rgba(255,255,255,0.04) inset;
    transform: translateY(-50%) scale(1.05);
  }
  .page-arrow:active { transform: translateY(-50%) scale(0.92) }
  .page-arrow.left { left: 24px; }
  .page-arrow.right { right: 24px; }
  .page-arrow.hidden { opacity: 0; pointer-events: none }

  /* Page dots */
  .page-dots {
    position: fixed; bottom: 52px; left: 50%; transform: translateX(-50%);
    z-index: 110; display: flex; gap: 8px;
  }
  .page-dot {
    width: 8px; height: 8px; border-radius: 50%;
    border: 1px solid rgba(212,175,110,0.35);
    background: transparent; cursor: pointer;
    transition: all 0.3s ease;
  }
  .page-dot.active { background: var(--gold); border-color: var(--gold) }
  .page-dot:hover { border-color: rgba(212,175,110,0.7) }

  .caption {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 60; font-family: 'Cinzel', serif; font-size: 10px;
    letter-spacing: 0.4em; color: var(--gold-deep); text-transform: uppercase;
    pointer-events: none; transition: opacity 0.5s ease;
  }
  body.has-active .caption { opacity: 0.2; }

  .info {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    z-index: 60; text-align: center; pointer-events: none;
    opacity: 0; transition: opacity 0.5s ease, transform 0.6s cubic-bezier(0.16,1,0.3,1);
  }
  body.has-active .info { opacity: 1; transform: translateX(-50%) translateY(0); }
  .info .rank {
    font-family: 'Italiana', serif; font-size: 20px;
    color: var(--gold-bright); letter-spacing: 0.2em; margin-bottom: 4px;
  }
  .info .suit {
    font-family: 'Cinzel', serif; font-size: 9px;
    color: var(--vellum-dim); letter-spacing: 0.4em; text-transform: uppercase;
  }

  /* 3D Scene */
  .scene {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    perspective: 2000px; perspective-origin: 50% 50%; z-index: 10;
  }
  .fan {
    position: relative;
    width: var(--card-w); height: var(--card-h);
    transform-style: preserve-3d; will-change: transform;
  }

  /* Card */
  .card {
    position: absolute; top: 0; left: 0;
    width: var(--card-w); height: var(--card-h);
    transform-style: preserve-3d;
    transition: transform 0.95s cubic-bezier(0.22, 1, 0.36, 1), filter 0.6s ease, opacity 0.5s ease;
    cursor: none; will-change: transform;
  }
  .card.ghost { opacity: 0; pointer-events: none }

  .card-flip {
    position: absolute; inset: 0; transform-style: preserve-3d;
    transition: transform 0.95s cubic-bezier(0.22, 1, 0.36, 1);
    will-change: transform;
  }
  .card.flipped .card-flip { transform: rotateY(180deg); }

  .face {
    position: absolute; inset: 0; border-radius: 14px; overflow: hidden;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.75), 0 20px 30px -15px rgba(0,0,0,0.5), 0 0 0 1px rgba(212,175,110,0.18);
    transition: box-shadow 0.6s ease;
  }
  .face.back  { transform: translateZ(var(--card-t)); }
  .face.front { transform: rotateY(180deg) translateZ(var(--card-t)); }

  .edge {
    position: absolute; top: 0; width: calc(var(--card-t) * 2); height: 100%;
    background: linear-gradient(to right, #3a2818 0%, #b58a4a 40%, #f0d28a 50%, #b58a4a 60%, #3a2818 100%);
    box-shadow: inset 0 0 4px rgba(0,0,0,0.6);
  }
  .edge.right { right: calc(var(--card-t) * -1); transform-origin: left center; transform: rotateY(90deg); }
  .edge.left  { left: calc(var(--card-t) * -1); transform-origin: right center; transform: rotateY(-90deg); }

  body.has-active .card:not(.flipped):not(.ghost) {
    filter: brightness(0.55) saturate(0.7) blur(0.3px);
  }

  /* Back design */
  .back { background: radial-gradient(ellipse at 50% 35%, #8a1d2c 0%, #4a0d18 55%, #1f0509 100%); }
  .back-lattice {
    position: absolute; inset: 16px; border-radius: 6px;
    background-image:
      repeating-linear-gradient(45deg, rgba(212,175,110,0.22) 0, rgba(212,175,110,0.22) 1px, transparent 1px, transparent 16px),
      repeating-linear-gradient(-45deg, rgba(212,175,110,0.22) 0, rgba(212,175,110,0.22) 1px, transparent 1px, transparent 16px);
  }
  .back-frame { position: absolute; inset: 10px; border: 1.2px solid rgba(212,175,110,0.85); border-radius: 8px; }
  .back-frame::after { content:'';position:absolute;inset:5px;border:0.5px solid rgba(212,175,110,0.55);border-radius:4px }
  .back-corner { position: absolute; width: 28px; height: 28px; color: var(--gold); }
  .back-corner.tl{top:14px;left:14px}.back-corner.tr{top:14px;right:14px;transform:scaleX(-1)}
  .back-corner.bl{bottom:14px;left:14px;transform:scaleY(-1)}.back-corner.br{bottom:14px;right:14px;transform:scale(-1,-1)}
  .back-medallion {
    position: absolute; top: 50%; left: 50%; width: 110px; height: 160px;
    transform: translate(-50%, -50%); border-radius: 50%;
    background: radial-gradient(ellipse at 50% 35%, #2a0a10 0%, #1f0509 70%);
    border: 1.5px solid var(--gold);
    box-shadow: inset 0 0 30px rgba(0,0,0,0.6), 0 0 25px rgba(212,175,110,0.15);
    display: flex; align-items: center; justify-content: center;
  }
  .back-medallion::before { content:'';position:absolute;inset:5px;border:0.5px solid rgba(212,175,110,0.6);border-radius:50% }
  .back-medallion .monogram {
    font-family: 'Italiana', serif; font-size: 58px;
    color: var(--gold-bright); text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    line-height: 1; margin-top: -6px;
  }
  .back-medallion .crown { position:absolute;top:16px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--gold);letter-spacing:0.1em }
  .back-medallion .year { position:absolute;bottom:18px;left:50%;transform:translateX(-50%);font-family:'Cinzel',serif;font-size:8px;color:var(--gold);letter-spacing:0.25em }

  /* Front */
  .front { background: #1a1a1a; }
  .front-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .front-fallback { position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:4rem;color:rgba(255,255,255,0.12) }
  .front-overlay {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 2;
    padding: 20px 14px 14px;
    background: linear-gradient(transparent 0%, rgba(0,0,0,0.25) 30%, rgba(0,0,0,0.7) 70%);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .front-name { font-family:'Cinzel',serif;font-size:1rem;font-weight:600;letter-spacing:0.06em;margin-bottom:2px }
  .front-stars { font-size:0.7rem;letter-spacing:0.15em;margin-bottom:4px }
  .front-desc { font-family:'Cormorant Garamond',serif;font-size:0.7rem;font-style:italic;color:var(--vellum-dim);line-height:1.3;letter-spacing:0.03em }

  .front.s6 .front-name{color:var(--pink)}.front.s6 .front-stars{color:var(--pink)}
  .front.s5 .front-name{color:var(--gold-bright)}.front.s5 .front-stars{color:var(--gold)}
  .front.s4 .front-name{color:#c8b0ff}.front.s4 .front-stars{color:var(--purple)}
  .front.s3 .front-name{color:#8aa8c8}.front.s3 .front-stars{color:var(--blue)}

  .card.s6.flipped .face{box-shadow:0 60px 100px -20px rgba(0,0,0,0.85),0 30px 50px -15px rgba(255,184,198,0.35),0 0 0 1px rgba(255,184,198,0.45),0 0 80px -10px rgba(255,184,198,0.3)}
  .card.s5.flipped .face{box-shadow:0 60px 100px -20px rgba(0,0,0,0.85),0 30px 50px -15px rgba(212,175,110,0.35),0 0 0 1px rgba(240,210,138,0.45),0 0 80px -10px rgba(240,210,138,0.35)}
  .card.s4.flipped .face{box-shadow:0 60px 100px -20px rgba(0,0,0,0.85),0 30px 50px -15px rgba(176,143,255,0.25),0 0 0 1px rgba(176,143,255,0.35),0 0 80px -10px rgba(176,143,255,0.2)}
  .card.s3.flipped .face{box-shadow:0 60px 100px -20px rgba(0,0,0,0.85),0 30px 50px -15px rgba(91,122,154,0.25),0 0 0 1px rgba(91,122,154,0.35),0 0 80px -10px rgba(91,122,154,0.15)}

  .shine {
    position: absolute; inset: 0; border-radius: 14px; pointer-events: none;
    background: linear-gradient(105deg, transparent 30%, rgba(255,240,200,0.0) 45%, rgba(255,240,200,0.5) 50%, rgba(255,240,200,0.0) 55%, transparent 70%);
    opacity: 0; transition: opacity 0.4s ease; mix-blend-mode: overlay; z-index: 5;
  }
  .card.flipped .shine { opacity: 1; animation: shineSweep 1.4s ease-out 0.4s; }
  @keyframes shineSweep { 0%{transform:translateX(-100%)}100%{transform:translateX(100%)} }

  @keyframes drift-fan { 0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(0,-6px,0)} }
  .fan-float { animation: drift-fan 6s ease-in-out infinite; }

  /* Custom cursor */
  .cursor {
    position: fixed; width: 28px; height: 28px;
    border: 1px solid var(--gold); border-radius: 50%;
    pointer-events: none; transform: translate(-50%, -50%); z-index: 9999;
    transition: width 0.3s, height 0.3s, border-color 0.3s, opacity 0.3s;
    mix-blend-mode: difference;
  }
  .cursor::after { content:'';position:absolute;top:50%;left:50%;width:3px;height:3px;background:var(--gold-bright);border-radius:50%;transform:translate(-50%,-50%) }
  .cursor.over-card { width: 56px; height: 56px; border-color: var(--gold-bright); }

  .legend {
    position: fixed; right: 28px; bottom: 28px; z-index: 60;
    font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.3em;
    color: var(--vellum-dim); text-align: right; pointer-events: none; opacity: 0.7;
  }
  .legend span { color: var(--gold); }

  /* ===== [MYSTERY] locked 6★ card (创世神未抽到) ===== */
  .front-locked{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 50% 40%,#1a0e18 0%,#0a040f 60%,#000 100%);
    border-radius:18px;overflow:hidden;
  }
  .front-locked::before{
    content:'';position:absolute;inset:0;
    background:repeating-conic-gradient(from 0deg at 50% 50%,
      transparent 0deg,
      rgba(255,184,198,.04) 3deg,
      transparent 6deg,
      rgba(255,184,198,.04) 9deg);
    animation:lk-spin 12s linear infinite;
  }
  @keyframes lk-spin{to{transform:rotate(360deg)}}
  .locked-glyph{
    position:relative;z-index:1;
    font-family:"Cinzel","Noto Serif SC",serif;
    font-size:4.5rem;line-height:1;
    background:linear-gradient(180deg,rgba(255,200,220,.45),rgba(255,160,190,.18));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    filter:drop-shadow(0 0 20px rgba(255,184,198,.4));
    animation:lk-pulse 3s ease-in-out infinite;
  }
  @keyframes lk-pulse{0%,100%{opacity:.7}50%{opacity:1}}
  .locked-label{
    position:relative;z-index:1;
    font-family:"JetBrains Mono",ui-monospace,monospace;
    font-size:.6rem;letter-spacing:.32em;color:rgba(255,184,198,.5);
    margin-top:12px;
  }

  /* ===== [GEEK] Hex radar floating panel ===== */
  .radar-panel{
    position:fixed;right:18px;top:18px;z-index:60;
    width:230px;padding:14px 14px 10px;
    background:rgba(14,18,32,.55);
    backdrop-filter:blur(18px) saturate(140%);
    -webkit-backdrop-filter:blur(18px) saturate(140%);
    border:1px solid rgba(212,184,122,.22);border-radius:14px;
    box-shadow:0 18px 50px rgba(0,0,0,.5);
    color:#E8E0D0;font-family:"JetBrains Mono","SF Mono",ui-monospace,monospace;
    transform:translateX(110%);opacity:0;
    transition:transform .45s cubic-bezier(.22,1,.36,1),opacity .35s ease;
    pointer-events:none;
  }
  .radar-panel.show{transform:translateX(0);opacity:1}
  .radar-panel .rp-name{
    font-family:"Cinzel","Noto Serif SC",serif;font-size:.95rem;font-weight:600;
    color:var(--gold-bright,#F5E6CC);letter-spacing:.06em;margin-bottom:2px;
  }
  .radar-panel .rp-rarity{font-size:.7rem;color:#9999AA;margin-bottom:8px;letter-spacing:.18em}
  .radar-panel svg{display:block;width:100%;height:auto}
  .radar-panel .rp-stats{
    display:grid;grid-template-columns:1fr 1fr;gap:4px 10px;
    font-size:.62rem;margin-top:6px;color:#c8c4b0;letter-spacing:.08em;
  }
  .radar-panel .rp-stats b{color:var(--gold,#D4B87A);font-weight:600}

  /* ============================================================
     ▼ XLAB · CARDS LAYOUT REWORK ▼
     - 卡牌放大 (220→280)
     - 扇形距离同比放大，整体下移
     - 卡面玻璃化 + 金色细描边 + 仪式化光晕
     - Masthead 切换为 X[CARDS] 终端风
     - Caption / nav 微调，去掉俗套的"hover 揭示"
  ============================================================ */
  :root{
    --card-w:280px;
    --card-h:408px;
    --card-t:7px;
  }
  /* fan 整体上移让 info 浮窗有空间 */
  .scene{align-items:center !important;padding-bottom:60px}
  /* face 加更深的双层阴影 + 内金边 */
  .face{
    box-shadow:
      0 50px 80px -25px rgba(0,0,0,0.85),
      0 30px 50px -20px rgba(0,0,0,0.55),
      0 0 0 1px rgba(212,175,110,0.22),
      0 0 0 2px rgba(0,0,0,0.4) inset !important;
    border-radius:18px !important;
  }
  /* front 加内金细线 + 顶部亮光带 */
  .front::before{
    content:'';position:absolute;inset:0;border-radius:18px;pointer-events:none;z-index:3;
    border:1px solid rgba(245,230,204,0.18);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.10) inset,
      0 0 60px -10px rgba(212,175,110,0.18) inset;
  }
  .front::after{
    content:'';position:absolute;left:8%;right:8%;top:6%;height:38%;
    background:linear-gradient(180deg,rgba(255,255,255,0.18),transparent);
    border-radius:14px 14px 50% 50%/14px 14px 100% 100%;
    pointer-events:none;mix-blend-mode:overlay;z-index:3;
    opacity:.4;
  }
  /* overlay 加大留更多角色 */
  .front-overlay{padding:22px 18px 16px !important}
  .front-name{font-size:1.18rem !important;letter-spacing:.08em !important}
  .front-stars{font-size:.78rem !important;letter-spacing:.22em !important;margin-bottom:6px !important}
  .front-desc{font-size:.78rem !important;line-height:1.55 !important}

  /* back medallion 比例放大 */
  .back-medallion{width:130px !important;height:188px !important}
  .back-medallion .monogram{font-size:68px !important}

  /* 5★/6★ flipped 时光晕加强 */
  .card.s6.flipped .face{
    box-shadow:
      0 70px 120px -25px rgba(0,0,0,0.9),
      0 40px 60px -18px rgba(255,184,198,0.4),
      0 0 0 1.5px rgba(255,184,198,0.55),
      0 0 100px -8px rgba(255,184,198,0.45) !important;
  }
  .card.s5.flipped .face{
    box-shadow:
      0 70px 120px -25px rgba(0,0,0,0.9),
      0 40px 60px -18px rgba(212,175,110,0.42),
      0 0 0 1.5px rgba(240,210,138,0.55),
      0 0 100px -8px rgba(240,210,138,0.45) !important;
  }
  .card.s4.flipped .face{
    box-shadow:
      0 65px 110px -22px rgba(0,0,0,0.85),

// ── Back face SVG template ──

    <svg class="back-corner bl" viewBox="0 0 28 28" fill="none"><path d="M2 14 L26 14 M14 2 L14 26" stroke="currentColor" stroke-width="0.6"/><path d="M5 5 L23 23 M23 5 L5 23" stroke="currentColor" stroke-width="0.4"/><circle cx="14" cy="14" r="3" fill="none" stroke="currentColor" stroke-width="0.6"/><circle cx="14" cy="14" r="1.5" fill="currentColor"/></svg>
    <svg class="back-corner br" viewBox="0 0 28 28" fill="none"><path d="M2 14 L26 14 M14 2 L14 26" stroke="currentColor" stroke-width="0.6"/><path d="M5 5 L23 23 M23 5 L5 23" stroke="currentColor" stroke-width="0.4"/><circle cx="14" cy="14" r="3" fill="none" stroke="currentColor" stroke-width="0.6"/><circle cx="14" cy="14" r="1.5" fill="currentColor"/></svg>

// ── Render cards for current page ──
let cards=[];
let activeIdx=null;

function renderPage(page){

// ── Default fan positions (centered around mid card) ──
function defaultFanTransform(i,total){
  if(total===1)return ['translate3d(0,0,40px) rotateY(0) rotateZ(0)'][i];
  if(total===2)return [
    'translate3d(-120px,0,-10px) rotateY(6deg) rotateZ(-6deg)',
    'translate3d(120px,0,-10px) rotateY(-6deg) rotateZ(6deg)'
  ][i];
  if(total===3)return [
    'translate3d(-300px,0,-60px) rotateY(10deg) rotateZ(-14deg)',
    'translate3d(0,0,50px) rotateY(0) rotateZ(0)',
    'translate3d(300px,0,-60px) rotateY(-10deg) rotateZ(14deg)'
  ][i];
  if(total===4)return [
    'translate3d(-380px,0,-90px) rotateY(13deg) rotateZ(-18deg)',
    'translate3d(-130px,0,-10px) rotateY(5deg) rotateZ(-6deg)',
    'translate3d(130px,0,-10px) rotateY(-5deg) rotateZ(6deg)',
    'translate3d(380px,0,-90px) rotateY(-13deg) rotateZ(18deg)'
  ][i];
  return [
    'translate3d(-460px,0,-110px) rotateY(15deg) rotateZ(-22deg)',
    'translate3d(-230px,0,-30px) rotateY(8deg) rotateZ(-11deg)',
    'translate3d(0,0,50px) rotateY(0) rotateZ(0)',
    'translate3d(230px,0,-30px) rotateY(-8deg) rotateZ(11deg)',
    'translate3d(460px,0,-110px) rotateY(-15deg) rotateZ(22deg)'
  ][i];
}

function applyDefaultPositions(){
  const visible=cards.filter(c=>!c.classList.contains('ghost'));
  visible.forEach((c,i)=>c.style.transform=defaultFanTransform(i,visible.length));
}

// ── Tunnel transform (same as original) ──
function tunnelTransform(i,act,total){
  if(i===act){
    return 'translate3d(0,-30px,280px) rotateY(0deg) rotateZ(0) scale(1.08)';
  }
  const delta=i-act;
  const sign=delta>0?1:-1;
  const dist=Math.abs(delta);
  const x=sign*(260+(dist-1)*70);
  const z=-120-(dist-1)*210;
  const y=(dist-1)*6;
  const rotY=-sign*(80+(dist-1)*3);
  const scale=Math.max(0.32,0.72-(dist-1)*0.11);
  return `translate3d(${x}px,${y}px,${z}px) rotateY(${rotY}deg) scale(${scale})`;
}

// ── Activate / Reset ──
function activate(idx){
  if(activeIdx===idx)return;
  activeIdx=idx;
  body.classList.add('has-active');
  const visible=cards.filter(c=>!c.classList.contains('ghost'));
  cards.forEach((c,i)=>{
    if(c.classList.contains('ghost'))return;
    c.style.transform=tunnelTransform(i,idx,visible.length);
    c.classList.toggle('flipped',i===idx);
  });
  const c=cards[idx];
  infoRank.textContent=c.dataset.name;
  infoSuit.textContent=c.dataset.stars+' · '+c.dataset.desc;
  document.getElementById('legend-rarity').textContent=c.dataset.rarity+'★';
  showRadar(c.dataset.name,+c.dataset.rarity);
}

/* ===== [GEEK] Hex radar — deterministic per-name "stats" ===== */
function hashSeed(s){let h=2166136261>>>0;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function rng(seed){let x=seed||1;return ()=>{x^=x<<13;x^=x>>>17;x^=x<<5;return ((x>>>0)%10000)/10000;};}
const RADAR_AXES=['颜值','战力','抽象','沙比','欧气','整活'];
function computeStats(name,rarity){
  const r=rng(hashSeed(name)+rarity*131);
  const base=rarity===6?88:rarity===5?78:rarity===4?66:50;
  return RADAR_AXES.map(()=>Math.min(100,Math.max(20,Math.round(base+(r()-0.4)*40))));
}
function showRadar(name,rarity){
  const panel=document.getElementById('radar-panel');
  document.getElementById('rp-name').textContent=name;
  document.getElementById('rp-rarity').textContent=rarity+'★ ATTRIBUTES';
  const vals=computeStats(name,rarity);
  const cx=100,cy=100,R=72;
  const N=RADAR_AXES.length;
  const ang=i=>-Math.PI/2+i*Math.PI*2/N;
  // build grid
  let svg='';
  for(let g=1;g<=4;g++){
    const r=R*g/4;
    const pts=[];
    for(let i=0;i<N;i++) pts.push((cx+Math.cos(ang(i))*r).toFixed(1)+','+(cy+Math.sin(ang(i))*r).toFixed(1));
    svg+=`<polygon points="${pts.join(' ')}" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>`;
  }
  for(let i=0;i<N;i++){
    svg+=`<line x1="${cx}" y1="${cy}" x2="${(cx+Math.cos(ang(i))*R).toFixed(1)}" y2="${(cy+Math.sin(ang(i))*R).toFixed(1)}" stroke="rgba(255,255,255,0.06)"/>`;
  }
  // data polygon
  const dpts=vals.map((v,i)=>{
    const r=R*v/100;
    return (cx+Math.cos(ang(i))*r).toFixed(1)+','+(cy+Math.sin(ang(i))*r).toFixed(1);
  });
  const fill=rarity===6?'rgba(255,184,198,0.32)':rarity===5?'rgba(212,184,122,0.32)':rarity===4?'rgba(176,143,255,0.28)':'rgba(140,170,210,0.25)';
  const stroke=rarity===6?'#FFB8C6':rarity===5?'#D4B87A':rarity===4?'#B08FFF':'#8CA9CB';
  svg+=`<polygon points="${dpts.join(' ')}" fill="${fill}" stroke="${stroke}" stroke-width="1.5" />`;
  vals.forEach((v,i)=>{
    const r=R*v/100;
    const x=(cx+Math.cos(ang(i))*r).toFixed(1);
    const y=(cy+Math.sin(ang(i))*r).toFixed(1);
    svg+=`<circle cx="${x}" cy="${y}" r="2.5" fill="${stroke}"/>`;
    // labels
    const lr=R+14;
    const lx=(cx+Math.cos(ang(i))*lr).toFixed(1);
    const ly=(cy+Math.sin(ang(i))*lr+3).toFixed(1);
    svg+=`<text x="${lx}" y="${ly}" font-family="JetBrains Mono,monospace" font-size="9" fill="#9999AA" text-anchor="middle">${RADAR_AXES[i]}</text>`;
  });
  document.getElementById('rp-svg').innerHTML=svg;
  document.getElementById('rp-stats').innerHTML=RADAR_AXES.map((a,i)=>`<span>${a} <b>${vals[i]}</b></span>`).join('');
  panel.classList.add('show');
}
function hideRadar(){document.getElementById('radar-panel').classList.remove('show');}

function resetAll(){
  activeIdx=null;
  body.classList.remove('has-active');
  cards.forEach(c=>{c.classList.remove('flipped')});
  applyDefaultPositions();
  hideRadar();
}

function bindCardEvents(){
  cards.forEach((card)=>{
    const idx=parseInt(card.dataset.i,10);
    if(card.classList.contains('ghost'))return;
    // Remove old listeners by cloning (simple approach)
    const fresh=card.cloneNode(true);
    card.parentNode.replaceChild(fresh,card);
    cards[idx]=fresh;
    fresh.addEventListener('mouseenter',()=>{
      cursor.classList.add('over-card');
      // [GEEK] 防误触：hover 220ms 后才激活，期间离开则取消
      clearTimeout(fresh._hoverT);
      fresh._hoverT=setTimeout(()=>{ if(activeIdx!==idx) activate(idx); },220);
    });
    fresh.addEventListener('mouseleave',()=>{
      cursor.classList.remove('over-card');
      clearTimeout(fresh._hoverT);
    });
    fresh.addEventListener('click',()=>{
      clearTimeout(fresh._hoverT);
      if(activeIdx===idx)resetAll();
      else{activate(idx);cursor.classList.add('over-card')}
    });
  });
}

function goToPage(page){
  if(page===currentPage)return;
  currentPage=page;
  // Fade out then render
  fan.style.opacity='0';
  fan.style.transition='opacity 0.3s ease';
  setTimeout(()=>{
    renderPage(page);
    fan.style.opacity='1';
    setTimeout(()=>{fan.style.transition=''},350);
  },300);
}

// ── Parallax / cursor ──
let targetX=0,targetY=0,currentX=0,currentY=0;
let cursorX=window.innerWidth/2,cursorY=window.innerHeight/2;
let cursorVX=cursorX,cursorVY=cursorY;

window.addEventListener('mousemove',e=>{
  targetX=(e.clientX/window.innerWidth)*2-1;
  targetY=(e.clientY/window.innerHeight)*2-1;
  cursorX=e.clientX;cursorY=e.clientY;
});

function tick(){
  currentX+=(targetX-currentX)*0.025;
  currentY+=(targetY-currentY)*0.025;
  cursorVX+=(cursorX-cursorVX)*0.12;
  cursorVY+=(cursorY-cursorVY)*0.12;
  const damp=activeIdx===null?0.55:0.18;
  fan.style.transform=`translate3d(${currentX*4*damp}px,${currentY*2*damp}px,0) rotateY(${currentX*4.5*damp}deg) rotateX(${-currentY*2.8*damp}deg)`;
  cursor.style.transform=`translate(${cursorVX}px,${cursorVY}px) translate(-50%,-50%)`;
  requestAnimationFrame(tick);
}
tick();

let leaveTimer=null;
fan.addEventListener('mouseleave',()=>{leaveTimer=setTimeout(resetAll,500)});
fan.addEventListener('mouseenter',()=>{if(leaveTimer){clearTimeout(leaveTimer);leaveTimer=null}});
document.addEventListener('mouseleave',()=>cursor.style.opacity='0');
document.addEventListener('mouseenter',()=>cursor.style.opacity='1');

// ── Init ──
renderPage(0);
</script>
