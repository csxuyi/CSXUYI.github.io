<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>占卜家</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Marcellus&display=swap" rel="stylesheet">
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Marcellus","Georgia","Times New Roman","Songti SC",serif;
  background:#0a0806;
  overflow-x:hidden;
  color:#d4c5a0;
  min-height:100vh;
}

/* ===== Page Border (Tarot Frame) ===== */
#page-frame{
  position:fixed;
  inset:12px;
  z-index:0;
  pointer-events:none;
  border:2px solid rgba(180,150,100,0.35);
  box-shadow:inset 0 0 80px rgba(180,140,80,0.06);
}
#page-frame::before{
  content:"";
  position:absolute;
  inset:6px;
  border:1px solid rgba(180,150,100,0.18);
}

/* Corner ornaments */
.corner{
  position:fixed;
  z-index:1;
  pointer-events:none;
  width:48px;
  height:48px;
  opacity:0.5;
}
.corner::before,.corner::after{
  content:"";
  position:absolute;
  background:linear-gradient(135deg,rgba(200,160,80,0.6),transparent);
}
.corner-tl{top:18px;left:18px}
.corner-tr{top:18px;right:18px}
.corner-bl{bottom:18px;left:18px}
.corner-br{bottom:18px;right:18px}
.corner-tl::before,.corner-br::before{top:0;left:0;width:100%;height:2px}
.corner-tl::after,.corner-br::after{top:0;left:0;width:2px;height:100%}
.corner-tr::before,.corner-bl::before{top:0;right:0;width:100%;height:2px}
.corner-tr::after,.corner-bl::after{top:0;right:0;width:2px;height:100%}

/* Corner diamonds */
.corner-diamond{
  position:absolute;
  width:8px;height:8px;
  background:rgba(200,160,80,0.7);
  transform:rotate(45deg);
  box-shadow:0 0 8px rgba(200,160,80,0.4);
}
.corner-tl .corner-diamond{top:0;left:0}
.corner-tr .corner-diamond{top:0;right:0}
.corner-bl .corner-diamond{bottom:0;left:0}
.corner-br .corner-diamond{bottom:0;right:0}

/* Side ornaments - filigree dots */
.side-ornament{
  position:fixed;
  z-index:1;
  pointer-events:none;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:40px;
  opacity:0.25;
}
.side-left{left:10px;top:50%;transform:translateY(-50%)}
.side-right{right:10px;top:50%;transform:translateY(-50%)}
.side-dot{
  width:4px;height:4px;
  border-radius:50%;
  background:#c8a85a;
  box-shadow:0 0 6px rgba(200,160,80,0.5);
}
.side-dot.small{width:2px;height:2px}

/* Border shimmer animation */
@keyframes border-shimmer{
  0%{background-position:0% 0%}
  100%{background-position:200% 0%}
}
@keyframes frame-glow{
  0%,100%{box-shadow:inset 0 0 80px rgba(180,140,80,0.06),0 0 20px rgba(200,160,80,0.05)}
  50%{box-shadow:inset 0 0 80px rgba(180,140,80,0.1),0 0 30px rgba(200,160,80,0.1)}
}
@keyframes diamond-pulse{
  0%,100%{transform:rotate(45deg) scale(1);opacity:0.7}
  50%{transform:rotate(45deg) scale(1.4);opacity:1}
}
@keyframes side-dot-glow{
  0%,100%{opacity:0.2}
  50%{opacity:0.45}
}
#page-frame{
  animation:frame-glow 4s ease-in-out infinite;
}
.corner-diamond{
  animation:diamond-pulse 3s ease-in-out infinite;
}
.corner-tl .corner-diamond{animation-delay:0s}
.corner-tr .corner-diamond{animation-delay:0.75s}
.corner-bl .corner-diamond{animation-delay:1.5s}
.corner-br .corner-diamond{animation-delay:2.25s}
.side-ornament{animation:side-dot-glow 4s ease-in-out infinite}
.side-left{animation-delay:0s}
.side-right{animation-delay:2s}

/* ===== Starfield Canvas ===== */
#starfield{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
}

/* ===== Particle Canvas ===== */
#particles{
  position:fixed;
  inset:0;
  z-index:10;
  pointer-events:none;
}

/* ===== Main App ===== */
#app{
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

/* ===== Header ===== */
header{
  text-align:center;
  padding:30px 0 10px;
  position:relative;
}
/* Decorative line above title */
.header-ornament-top{
  width:200px;
  height:1px;
  margin:0 auto 16px;
  background:linear-gradient(90deg,transparent,rgba(200,160,80,0.5),transparent);
  position:relative;
}
.header-ornament-top::after{
  content:"◆";
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:0.5rem;
  color:rgba(200,160,80,0.6);
  background:#0a0806;
  padding:0 8px;
}
header h1{
  font-family:"Ma Shan Zheng","STKaiti","KaiTi",cursive;
  font-size:3.4rem;
  font-weight:400;
  background:linear-gradient(180deg,#f0d78c 0%,#c8a050 40%,#a07830 70%,#c8a050 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 2px 6px rgba(180,140,60,0.4));
  margin-bottom:2px;
  letter-spacing:6px;
}
header .subtitle{
  font-family:"Ma Shan Zheng","STKaiti","KaiTi",cursive;
  font-size:1.1rem;
  color:rgba(200,170,120,0.5);
  letter-spacing:4px;
}
/* Decorative line below subtitle */
.header-ornament-bottom{
  width:120px;
  height:1px;
  margin:12px auto 0;
  background:linear-gradient(90deg,transparent,rgba(200,160,80,0.4),transparent);
}

/* ===== Draw Counter ===== */
#draw-counter{
  position:relative;
  z-index:3;
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:rgba(30,20,10,0.6);
  border:1px solid rgba(180,150,100,0.2);
  border-radius:20px;
  padding:5px 20px;
  font-size:0.85rem;
  color:rgba(200,170,130,0.7);
  margin-bottom:10px;
}
#draw-counter .cnt{
  font-size:1.3rem;
  font-weight:700;
  color:#d4b060;
}

/* ===== Scene Area ===== */
#scene-wrapper{
  position:relative;
  width:520px;
  height:520px;
  margin:0 auto;
  z-index:2;
}
#scene{
  width:100%;
  height:100%;
  perspective:800px;
  perspective-origin:50% 45%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Ring container */
#ring{
  position:relative;
  width:440px;
  height:440px;
  transform-style:preserve-3d;
  will-change:transform;
}

/* Individual card slot in the ring */
.card-slot{
  position:absolute;
  top:50%;left:50%;
  width:110px;
  height:154px;
  margin-left:-55px;
  margin-top:-77px;
  transform-style:preserve-3d;
  transition:filter 0.5s,box-shadow 0.5s;
  border-radius:6px;
}
.card-slot.highlight{
  filter:brightness(1.6);
  z-index:5;
}

/* Card Back - Tarot Style */
.card-slot .slot-back{
  position:absolute;
  inset:0;
  border-radius:6px;
  backface-visibility:hidden;
  background:linear-gradient(135deg,#1a1018,#0d0a14);
  border:2px solid rgba(180,150,100,0.35);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
}
/* Outer frame on card back */
.card-slot .slot-back::before{
  content:"";
  position:absolute;
  inset:5px;
  border-radius:3px;
  border:1px solid rgba(180,150,100,0.2);
}
/* Inner frame */
.card-slot .slot-back::after{
  content:"";
  position:absolute;
  inset:10px;
  border-radius:2px;
  border:1px solid rgba(180,150,100,0.1);
}
/* Tarot eye/sun symbol */
.slot-symbol{
  position:relative;
  z-index:1;
  width:36px;
  height:36px;
  border-radius:50%;
  border:1.5px solid rgba(200,160,80,0.4);
  display:flex;
  align-items:center;
  justify-content:center;
}
.slot-symbol::before{
  content:"";
  width:12px;height:12px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(220,180,100,0.6),transparent);
}
.slot-symbol::after{
  content:"";
  position:absolute;
  width:28px;height:28px;
  border-radius:50%;
  border:1px solid rgba(200,160,80,0.15);
}
/* Tarot corner marks */
.slot-corners{
  position:absolute;
  inset:0;
  z-index:1;
  pointer-events:none;
}
.slot-corner{
  position:absolute;
  width:12px;height:12px;
  border-color:rgba(200,160,80,0.3);
  border-style:solid;
  border-width:0;
}
.slot-corner.tl{top:8px;left:8px;border-top-width:1px;border-left-width:1px}
.slot-corner.tr{top:8px;right:8px;border-top-width:1px;border-right-width:1px}
.slot-corner.bl{bottom:8px;left:8px;border-bottom-width:1px;border-left-width:1px}
.slot-corner.br{bottom:8px;right:8px;border-bottom-width:1px;border-right-width:1px}

/* Rarity glow on slot */
.card-slot .slot-glow{
  position:absolute;
  inset:-6px;
  border-radius:10px;
  opacity:0;
  transition:opacity 0.5s;
  pointer-events:none;
  z-index:-1;
}
.card-slot.highlight .slot-glow{opacity:1}

/* ===== Center Button Zone ===== */
#btn-zone{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:20;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
}

/* Magic circles */
.magic-ring{
  position:absolute;
  border-radius:50%;
  border:1px solid rgba(200,160,80,0.18);
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
}
.magic-ring.r1{
  width:200px;height:200px;
  animation:spin-ring 15s linear infinite;
  border-color:rgba(200,160,80,0.2);
}
.magic-ring.r2{
  width:224px;height:224px;
  animation:spin-ring 22s linear infinite reverse;
  border-style:dashed;
  border-color:rgba(180,140,80,0.12);
}
.magic-ring.r3{
  width:176px;height:176px;
  animation:spin-ring 10s linear infinite;
  border-color:rgba(220,180,120,0.1);
}
@keyframes spin-ring{to{transform:translate(-50%,-50%) rotate(360deg)}}

/* Runic dots on magic rings */
.magic-ring::before{
  content:"";
  position:absolute;
  width:5px;height:5px;
  border-radius:50%;
  background:#d4b060;
  box-shadow:0 0 8px #d4b060,0 0 16px rgba(200,160,80,0.5);
  top:-2.5px;left:50%;
  margin-left:-2.5px;
}
.magic-ring.r2::before{
  background:#a080c0;
  box-shadow:0 0 8px #a080c0,0 0 16px rgba(160,128,192,0.4);
}

/* Draw buttons */
.btn-draw{
  position:relative;
  z-index:2;
  border-radius:50%;
  border:1.5px solid rgba(200,160,80,0.4);
  cursor:pointer;
  font-weight:700;
  color:#e8d5a0;
  transition:transform 0.15s,box-shadow 0.15s;
  outline:none;
  letter-spacing:2px;
  font-family:"Marcellus","Georgia",serif;
}
.btn-draw:hover:not(:disabled){transform:scale(1.08)}
.btn-draw:active:not(:disabled){transform:scale(0.94)}
.btn-draw:disabled{opacity:0.4;cursor:not-allowed}

#btn-single{
  width:96px;height:96px;
  font-size:1rem;
  background:radial-gradient(circle at 40% 40%,#3a2840,#1a1020 60%,#0d0812);
  box-shadow:0 0 30px rgba(180,140,80,0.3),0 0 60px rgba(160,120,60,0.15),inset 0 1px 3px rgba(255,220,180,0.1);
}
#btn-single:hover:not(:disabled){
  box-shadow:0 0 40px rgba(200,160,80,0.5),0 0 80px rgba(180,140,80,0.25),inset 0 1px 3px rgba(255,220,180,0.15);
}

#btn-ten{
  width:68px;height:68px;
  font-size:0.78rem;
  background:radial-gradient(circle at 40% 40%,#4a2030,#2a1020 60%,#150810);
  border-color:rgba(200,120,140,0.4);
  box-shadow:0 0 20px rgba(200,120,140,0.25),0 0 40px rgba(180,100,120,0.12),inset 0 1px 3px rgba(255,200,200,0.1);
}
#btn-ten:hover:not(:disabled){
  box-shadow:0 0 30px rgba(220,140,160,0.4),0 0 60px rgba(200,120,140,0.2),inset 0 1px 3px rgba(255,200,200,0.15);
}

.btn-label{
  font-size:0.7rem;
  color:rgba(200,170,130,0.4);
  text-align:center;
  position:relative;
  z-index:2;
  font-family:"Marcellus","Georgia",serif;
}

/* ===== Result Overlay ===== */
#result-overlay{
  position:fixed;
  inset:0;
  z-index:50;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.3s;
  background:rgba(5,3,2,0.75);
  padding:60px 20px;
  overflow-y:auto;
}
#result-overlay.active{
  opacity:1;
  pointer-events:auto;
}

/* Grid container for result cards */
#result-grid{
  display:flex;
  flex-wrap:wrap;
  gap:18px;
  justify-content:center;
  align-items:flex-start;
  max-width:900px;
  width:100%;
}
/* Single card mode: center a large card */
#result-grid.single{justify-content:center}
#result-grid.single .result-card-wrap{width:240px}
#result-grid.multi{justify-content:center}

/* Each card wrapper */
.result-card-wrap{
  width:140px;
  perspective:800px;
  animation:result-card-in 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
#result-grid.single .result-card-wrap{animation-delay:0s}
#result-grid.multi .result-card-wrap:nth-child(1){animation-delay:0s}
#result-grid.multi .result-card-wrap:nth-child(2){animation-delay:0.05s}
#result-grid.multi .result-card-wrap:nth-child(3){animation-delay:0.1s}
#result-grid.multi .result-card-wrap:nth-child(4){animation-delay:0.15s}
#result-grid.multi .result-card-wrap:nth-child(5){animation-delay:0.2s}
#result-grid.multi .result-card-wrap:nth-child(6){animation-delay:0.08s}
#result-grid.multi .result-card-wrap:nth-child(7){animation-delay:0.13s}
#result-grid.multi .result-card-wrap:nth-child(8){animation-delay:0.18s}
#result-grid.multi .result-card-wrap:nth-child(9){animation-delay:0.23s}
#result-grid.multi .result-card-wrap:nth-child(10){animation-delay:0.28s}
@keyframes result-card-in{
  from{opacity:0;transform:translateY(40px) scale(0.6)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* Inner flip container */
.result-card-inner{
  position:relative;
  width:100%;
  aspect-ratio:3/4;
  transform-style:preserve-3d;
  transition:transform 0.7s cubic-bezier(0.4,0,0.2,1);
}
.result-card-inner.flipped{transform:rotateY(180deg)}

/* Card faces */
.result-face{
  position:absolute;
  inset:0;
  backface-visibility:hidden;
  border-radius:10px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* Back face - tarot design */
.result-face-back{
  background:linear-gradient(135deg,#1a1018,#0d0a14);
  border:2px solid rgba(200,160,80,0.4);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 6px 30px rgba(0,0,0,0.5);
}
.result-back-inner{text-align:center}
.result-back-symbol{
  width:40px;height:40px;
  margin:0 auto 10px;
  border-radius:50%;
  border:1.5px solid rgba(200,160,80,0.45);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}
.result-back-symbol::before{
  content:"";
  width:14px;height:14px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(220,180,100,0.7),transparent);
}
.result-back-symbol::after{
  content:"";
  position:absolute;
  width:32px;height:32px;
  border-radius:50%;
  border:1px solid rgba(200,160,80,0.2);
}
.result-back-text{
  color:rgba(200,160,80,0.5);
  font-size:0.65rem;
  letter-spacing:2px;
}

/* Front face */
.result-face-front{
  transform:rotateY(180deg);
  background:#1a1a2e;
  border:2px solid #555;
  padding:10px;
  text-align:center;
}
.result-img-area{
  flex:1;
  width:100%;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:8px;
  min-height:0;
  overflow:hidden;
}
.result-img-area img{
  width:100%;height:100%;object-fit:cover;border-radius:6px;
}
.result-emoji{font-size:3rem}
#result-grid.single .result-emoji{font-size:5rem}

.result-card-name{
  font-weight:700;
  font-size:0.82rem;
  margin-bottom:2px;
  font-family:"Marcellus","Georgia",serif;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:100%;
}
#result-grid.single .result-card-name{font-size:1.15rem}

.result-card-desc{
  font-size:0.65rem;
  color:rgba(200,180,150,0.7);
  line-height:1.3;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
#result-grid.single .result-card-desc{font-size:0.8rem;-webkit-line-clamp:3}

.result-rarity-badge{
  position:absolute;
  top:8px;right:8px;
  font-size:0.6rem;
  font-weight:700;
  padding:2px 7px;
  border-radius:8px;
  z-index:2;
  letter-spacing:1px;
  font-family:"Marcellus","Georgia",serif;
}
#result-grid.single .result-rarity-badge{font-size:0.72rem;padding:3px 10px}

/* Rarity styles */
.res-N{border-color:#555;background:linear-gradient(180deg,#222,#1a1a1a)}.res-N .result-img-area{background:linear-gradient(135deg,#333,#444)}.res-N .result-card-name{color:#999}
.res-R{border-color:#3a7bc8;background:linear-gradient(180deg,#0d1a2e,#151520);box-shadow:0 0 16px rgba(58,123,200,0.25)}.res-R .result-img-area{background:linear-gradient(135deg,#0a2a50,#154878)}.res-R .result-card-name{color:#6098d8}
.res-SR{border-color:#8b5cb8;background:linear-gradient(180deg,#1a0e28,#18151e);box-shadow:0 0 20px rgba(139,92,184,0.3)}.res-SR .result-img-area{background:linear-gradient(135deg,#2a1050,#4a2080)}.res-SR .result-card-name{color:#b890d8}
.res-SSR{border-color:#c8a040;background:linear-gradient(180deg,#1f1508,#18100a);box-shadow:0 0 26px rgba(200,160,64,0.4)}.res-SSR .result-img-area{background:linear-gradient(135deg,#3a2810,#5a4020)}.res-SSR .result-card-name{color:#d4b860}
.res-UR{
  border:2px solid transparent;
  background:linear-gradient(180deg,#150828,#0a0510);
  box-shadow:0 0 32px rgba(200,140,220,0.5),0 0 64px rgba(160,100,200,0.25);
}
.res-UR::before{
  content:"";position:absolute;inset:-2px;border-radius:11px;
  background:linear-gradient(135deg,#d090e0,#c8a040,#60c0c0,#a060d0,#d090e0);
  background-size:300% 300%;z-index:-1;
  animation:rainbow-border 2s linear infinite;
}
.res-UR .result-img-area{background:linear-gradient(135deg,#150828,#2a1050)}
.res-UR .result-card-name{
  background:linear-gradient(135deg,#d090d8,#d4b860,#80d0d0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

.badge-N{background:#555;color:#ccc}
.badge-R{background:#1a5088;color:#d0e0f8}
.badge-SR{background:#5a2890;color:#e8d0f8}
.badge-SSR{background:#8a6818;color:#f8e8c0}
.badge-UR{background:linear-gradient(135deg,#c080d0,#c8a040);color:#fff;animation:rainbow-badge 2s linear infinite}

@keyframes rainbow-border{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes rainbow-badge{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}

.result-close-hint{
  margin-top:28px;
  color:rgba(200,160,120,0.35);
  font-size:0.75rem;
  text-align:center;
}

/* ===== History Section ===== */
#history-section{
  position:relative;
  z-index:2;
  width:100%;
  max-width:700px;
  margin:30px auto 40px;
}
/* Ornamented section title */
.section-title-wrap{
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:16px;
}
.section-title-line{
  flex:1;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(200,160,80,0.25),transparent);
}
.section-title{

<script>
(function(){
/* ========== RARITY CONFIG ========== */
const RARITY={
  UR:{label:"传说",rate:0.01,color:"#d090d8",emoji:"🌈",glow:"rgba(200,140,220,0.7)"},
  SSR:{label:"极稀有",rate:0.02,color:"#d4b860",emoji:"👑",glow:"rgba(200,160,64,0.6)"},
  SR:{label:"超稀有",rate:0.1,color:"#b890d8",emoji:"💎",glow:"rgba(139,92,184,0.5)"},
  R:{label:"稀有",rate:0.37,color:"#6098d8",emoji:"💠",glow:"rgba(58,123,200,0.4)"},
  N:{label:"普通",rate:0.50,color:"#999",emoji:"⬜",glow:"rgba(150,150,150,0.2)"},
};
const DRAW_ORDER=["UR","SSR","SR","R","N"];

/* ========== CARD POOL ========== */
const CARD_POOL=[
  {id:50, name: "柔情猫娘", rarity: "N", image: "image/zzh.jpg", description: "可爱的柔情猫娘，使用起来便捷的杯子" },
  {id:51, name: "阳志是给", rarity: "N", image: "image/lyz.jpg", description: "神秘爆炸头，随机刷新在金工，绿色外星人的使者" },
  {id:52, name: "老巩", rarity: "N", image: "image/gzj.jpg", description: "浙大詹姆斯" },
  {id:53, name: "西装老巩", rarity: "SR", image: "image/gzj2.jpg", description: "西装老巩，豪到你了吗" },
  {id:54, name: "空翻也", rarity: "R", image: "image/kfy.jpg", description: "蔡徐坤拥护者，普京同位体" },
  {id:55, name: "带毛魔丸", rarity: "R", image: "image/lyz2.jpg", description: "带毛魔丸，拥有强大的力量" },
  {id:56, name: "奶察", rarity: "N", image: "image/nc.jpg", description: "可爱的奶察，带来温暖和关怀" },
  {id:57, name: "二奶", rarity: "N", image: "image/nz.jpg", description: "真男人不露二奶" },
  {id:58, name: "小苗o", rarity: "SSR", image: "image/xiaomiao.jpg", description: "小苗想去哪就去哪" },
  {id:59, name: "阴成冰", rarity: "SR", image: "image/ycb.jpg", description: "阴成冰，拥有强大的力量" },
  {id:60, name: "郑灵杰", rarity: "SSR", image: "image/zlj.jpg", description: "郑灵杰，伟大的同义词" },
  {id:61, name: "窄型魔丸", rarity: "N", image: "image/zzh2.jpg", description: "窄型魔丸，使人绷不住" },
  {id:62, name: "食精玫瑰", rarity: "SSR", image: "image/zzh3.jpg", description: "食精玫瑰，我要出嫁了" },
  {id:63, name: "SHIT", rarity: "N", image: "image/SHIT.jpg", description: "没什么意义，降低你的抽卡概率" },
];

/* ========== STATE ========== */
const RING_COUNT=10;
let ringCards=[];
let ringAngle=0;
let ringSpeed=0.12;
let targetRingSpeed=0.12;
let isDrawing=false;
let state={totalDraws:0,counts:{N:0,R:0,SR:0,SSR:0,UR:0},history:[],filter:"全部"};

/* ========== DOM REFS ========== */
const ringEl=document.getElementById("ring");
const resultOverlay=document.getElementById("result-overlay");
const resultGrid=document.getElementById("result-grid");
const btnSingle=document.getElementById("btn-single");
const btnTen=document.getElementById("btn-ten");
const totalCountEl=document.getElementById("total-count");
const particleCanvas=document.getElementById("particles");
const particleCtx=particleCanvas.getContext("2d");
const starCanvas=document.getElementById("starfield");
const starCtx=starCanvas.getContext("2d");
const urFlash=document.getElementById("ur-flash");

/* ========== STARFIELD ========== */
let stars=[];
function initStars(){
  starCanvas.width=window.innerWidth;
  starCanvas.height=window.innerHeight;
  stars=[];
  for(let i=0;i<120;i++){
    stars.push({
      x:Math.random()*starCanvas.width,
      y:Math.random()*starCanvas.height,
      r:Math.random()*1.5+0.4,
      twinkleSpeed:Math.random()*0.015+0.004,
      twinkleOffset:Math.random()*Math.PI*2,
      hue:30+Math.random()*30
    });
  }
}
function drawStars(time){
  starCtx.clearRect(0,0,starCanvas.width,starCanvas.height);
  for(const s of stars){
    const alpha=0.2+0.35*(Math.sin(time*s.twinkleSpeed+s.twinkleOffset)*0.5+0.5);
    starCtx.beginPath();
    starCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
    starCtx.fillStyle=`hsla(${s.hue},40%,75%,${alpha})`;
    starCtx.fill();
  }
}
window.addEventListener("resize",initStars);

/* ========== PARTICLE SYSTEM ========== */
let particles=[];
function resizePCanvas(){
  particleCanvas.width=window.innerWidth;
  particleCanvas.height=window.innerHeight;
}
resizePCanvas();
window.addEventListener("resize",resizePCanvas);

function spawnParticles(x,y,count,color,spread,life){
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=Math.random()*spread;
    particles.push({
      x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
      life:life+Math.random()*life*0.5,maxLife:life*1.5,color,size:Math.random()*2.5+1
    });
  }
}
function spawnRingBurst(color,count){
  const cx=window.innerWidth/2,cy=window.innerHeight/2;
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const dist=80+Math.random()*180;
    particles.push({
      x:cx+Math.cos(angle)*dist,y:cy+Math.sin(angle)*dist,
      vx:Math.cos(angle+Math.PI/2)*3,vy:Math.sin(angle+Math.PI/2)*3,
      life:1+Math.random(),maxLife:1.5,color,size:Math.random()*2+1
    });
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.life-=dt;
    if(p.life<=0){particles.splice(i,1);continue}
    p.x+=p.vx*dt*60;p.y+=p.vy*dt*60;
    p.vx*=0.97;p.vy*=0.97;
  }
}
function drawParticles(){
  particleCtx.clearRect(0,0,particleCanvas.width,particleCanvas.height);
  for(const p of particles){
    const alpha=p.life/p.maxLife;
    particleCtx.beginPath();
    particleCtx.arc(p.x,p.y,p.size,0,Math.PI*2);
    particleCtx.fillStyle=p.color.replace("1)",`${alpha})`).replace("rgb","rgba");
    particleCtx.fill();
    particleCtx.beginPath();
    particleCtx.arc(p.x,p.y,p.size*2.5,0,Math.PI*2);
    particleCtx.fillStyle=p.color.replace("1)",`${alpha*0.18})`).replace("rgb","rgba");
    particleCtx.fill();
  }
}

/* ========== RING (Z-axis rotation) ========== */
function pickRingCards(){
  const shuffled=[...CARD_POOL].sort(()=>Math.random()-0.5);
  return shuffled.slice(0,RING_COUNT);
}

function getRingRadius(){
  const w=window.innerWidth;
  if(w<=380)return 90;
  if(w<=600)return 105;
  return 165;
}

function buildRing(){
  ringCards=pickRingCards();
  ringEl.innerHTML="";
  const radius=getRingRadius();
  for(let i=0;i<RING_COUNT;i++){
    const card=ringCards[i];
    const cfg=RARITY[card.rarity];
    const angle=(i/RING_COUNT)*360;

    const slot=document.createElement("div");
    slot.className="card-slot";
    slot.dataset.index=i;
    // Position on circle, face outward (tangent), with subtle 3D tilt
    slot.style.transform=`
      rotate(${angle}deg)
      translateY(${-radius}px)
      rotate(90deg)
      perspective(600px)
      rotateY(12deg)
    `;

    slot.innerHTML=`
      <div class="slot-back">
        <div class="slot-symbol"></div>
        <div class="slot-corners">
          <div class="slot-corner tl"></div>
          <div class="slot-corner tr"></div>
          <div class="slot-corner bl"></div>
          <div class="slot-corner br"></div>
        </div>
      </div>
      <div class="slot-glow" style="box-shadow:0 0 24px ${cfg.glow},0 0 48px ${cfg.glow}"></div>
    `;
    ringEl.appendChild(slot);
  }
}

function updateRingPositions(){
  const radius=getRingRadius();
  const slots=ringEl.querySelectorAll(".card-slot");
  slots.forEach(s=>{
    const i=parseInt(s.dataset.index);
    const angle=(i/RING_COUNT)*360;
    s.style.transform=`
      rotate(${angle}deg)
      translateY(${-radius}px)
      rotate(90deg)
      perspective(600px)
      rotateY(12deg)
    `;
  });
}

/* ========== DRAW LOGIC ========== */
function drawCard(){
  const roll=Math.random();
  let cum=0;
  for(const r of DRAW_ORDER){
    cum+=RARITY[r].rate;
    if(roll<cum){
      const pool=CARD_POOL.filter(c=>c.rarity===r);
      if(pool.length>0)return pool[Math.floor(Math.random()*pool.length)];
    }
  }
  const nPool=CARD_POOL.filter(c=>c.rarity==="N");
  return nPool.length>0?nPool[Math.floor(Math.random()*nPool.length)]:CARD_POOL[0];
}
function recordDraw(card){
  state.totalDraws++;
  state.counts[card.rarity]++;
  state.history.unshift({card,time:Date.now()});
  if(state.history.length>500)state.history.length=500;
}

/* ========== RESULT DISPLAY ========== */
function buildResultCardHTML(card){
  const cfg=RARITY[card.rarity];
  const imgHTML=card.image
    ?`<img src="${card.image}" alt="${card.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span class="result-emoji" style="display:none">${cfg.emoji}</span>`
    :`<span class="result-emoji">${cfg.emoji}</span>`;
  return`
    <div class="result-card-wrap">
      <div class="result-card-inner">
        <div class="result-face result-face-back">
          <div class="result-back-inner">
            <div class="result-back-symbol"></div>
            <div class="result-back-text">F A T E</div>
          </div>
        </div>
        <div class="result-face result-face-front res-${card.rarity}">
          <span class="result-rarity-badge badge-${card.rarity}">${card.rarity} ${cfg.label}</span>
          <div class="result-img-area">${imgHTML}</div>
          <div class="result-card-name">${card.name}</div>
          <div class="result-card-desc">${card.description}</div>
        </div>
      </div>
    </div>`;
}

function showResults(cards){
  const isSingle=cards.length===1;
  resultGrid.className=isSingle?"single":"multi";
  resultGrid.innerHTML=cards.map(c=>buildResultCardHTML(c)).join("");
  resultOverlay.classList.add("active");

  // Flip cards after a short delay
  const innerCards=resultGrid.querySelectorAll(".result-card-inner");
  innerCards.forEach((inner,i)=>{
    setTimeout(()=>{
      inner.classList.add("flipped");
    },350+i*60);
  });

  // Particle effects
  const cx=window.innerWidth/2,cy=window.innerHeight/2;
  setTimeout(()=>{
    for(const card of cards){
      const cfg=RARITY[card.rarity];
      spawnParticles(cx+Math.random()*200-100,cy+Math.random()*200-100,20,cfg.color.replace(")","").replace("rgba(","rgb")+")",6,1.2);
    }
  },400);

  // UR check
  const hasUR=cards.some(c=>c.rarity==="UR");
  if(hasUR){
    setTimeout(()=>{
      urFlash.classList.add("active");
      spawnParticles(cx,cy,100,"rgb(220,180,200)",14,2);
      spawnParticles(cx,cy,80,"rgb(200,160,64)",12,2);
      setTimeout(()=>urFlash.classList.remove("active"),500);
    },400);
  }
}

function hideResult(){
  resultOverlay.classList.remove("active");
  resultGrid.innerHTML="";
}

/* ========== ANIMATION LOOP ========== */
let lastTime=0;

function animate(time){
  const dt=Math.min((time-lastTime)/1000,0.1);
  lastTime=time;

  // Smooth ring speed transition
  ringSpeed+=(targetRingSpeed-ringSpeed)*Math.min(dt*3,1);
  ringAngle+=ringSpeed*dt*60;
  ringEl.style.transform=`rotate(${ringAngle}deg)`;

  updateParticles(dt);
  drawParticles();
  drawStars(time);
  requestAnimationFrame(animate);
}

/* ========== DRAW ACTIONS ========== */
function performDraw(count){
  if(isDrawing||CARD_POOL.length===0)return;
  isDrawing=true;
  updateButtons(true);

  const results=[];
  for(let i=0;i<count;i++)results.push(drawCard());

  // Record all draws
  for(const card of results)recordDraw(card);

  // Speed up ring
  targetRingSpeed=10;
  spawnRingBurst("rgb(200,160,80)",40);

  // After spinning, reveal all cards at once
  const spinDuration=count===1?1800:2800;
  setTimeout(()=>{
    targetRingSpeed=0.12;
    showResults(results);
    updateUI();
    spawnRingBurst("rgb(200,160,80)",60);
    // Extra burst for rare cards
    for(const card of results){
      if(card.rarity==="SSR"||card.rarity==="UR"){
        spawnRingBurst(RARITY[card.rarity].glow.replace(")","").replace("rgba(","rgb")+")",30);
      }
    }
    setTimeout(()=>{
      isDrawing=false;
      updateButtons(false);
      buildRing();
    },800);
  },spinDuration);
}

function updateButtons(disabled){
  btnSingle.disabled=disabled;
  btnTen.disabled=disabled;
}

function updateUI(){
  totalCountEl.textContent=state.totalDraws;
  renderHistory();
  saveState();
}

/* ========== HISTORY ========== */
function renderFilters(){
  const container=document.getElementById("history-filters");
  container.innerHTML=["全部","UR","SSR","SR","R","N"].map(f=>{
    const active=state.filter===f?" active":"";
    const label=f==="全部"?"全部":`${f} ${RARITY[f].label}`;
    const cnt=f==="全部"?state.history.length:state.counts[f];
    return`<button class="filter-btn${active}" data-filter="${f}">${label} (${cnt})</button>`;
  }).join("");
}

function buildMiniCard(card){
  const cfg=RARITY[card.rarity];
  const imgHTML=card.image
    ?`<img src="${card.image}" alt="${card.name}" style="width:100%;height:100%;object-fit:cover;border-radius:4px" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span class="mini-emoji" style="display:none">${cfg.emoji}</span>`
    :`<span class="mini-emoji">${cfg.emoji}</span>`;
  return`<div class="mini-card mini-${card.rarity}"><div class="mini-img mimg-${card.rarity}">${imgHTML}</div><div class="mini-name">${card.name}</div><div class="mini-rarity" style="color:${cfg.color}">${card.rarity} ${cfg.label}</div></div>`;
}

function renderHistory(){
  const grid=document.getElementById("history-grid");
  let entries=state.history;
  if(state.filter!=="全部")entries=entries.filter(e=>e.card.rarity===state.filter);
  const display=entries.slice(0,100);
  grid.innerHTML=display.length===0
    ?'<div class="history-empty">—— 命运之轮尚未转动，静待有缘人 ——</div>'
    :display.map(e=>buildMiniCard(e.card)).join("");
  renderFilters();
}

/* ========== PERSISTENCE ========== */
function loadState(){
  try{
    const s=localStorage.getItem("gacha_tarot_v3");
    if(s){const p=JSON.parse(s);state.totalDraws=p.totalDraws||0;state.counts=p.counts||{N:0,R:0,SR:0,SSR:0,UR:0};state.history=p.history||[]}
  }catch(e){}
}
function saveState(){
  try{
    localStorage.setItem("gacha_tarot_v3",JSON.stringify({totalDraws:state.totalDraws,counts:state.counts,history:state.history.slice(-500)}));
  }catch(e){}
}

/* ========== EVENTS ========== */
btnSingle.addEventListener("click",()=>performDraw(1));
btnTen.addEventListener("click",()=>performDraw(10));

document.getElementById("history-filters").addEventListener("click",e=>{
  if(e.target.classList.contains("filter-btn")){
    state.filter=e.target.dataset.filter;
    renderHistory();
  }
});

resultOverlay.addEventListener("click",e=>{
  if(e.target===resultOverlay||e.target.closest(".result-card-wrap"))hideResult();
});
document.addEventListener("keydown",e=>{if(e.key==="Escape")hideResult()});
window.addEventListener("resize",updateRingPositions);

/* ========== INIT ========== */
function init(){
  initStars();
  loadState();
  buildRing();
  totalCountEl.textContent=state.totalDraws;
  renderHistory();
  requestAnimationFrame(animate);
}
init();
})();
</script>

    a.textContent='';a.appendChild(img);a.style.display='inline-flex';a.style.alignItems='center';a.style.justifyContent='center';a.style.padding='0';a.style.flexShrink='0';
    n.textContent=gh.login;
    return;
  }
  var p;try{p=JSON.parse(localStorage.getItem('xlab-profile'));}catch(e){}

  var av={stellar:'✦',moon:'☾',comet:'☄',nova:'✧',galaxy:'◈',astronaut:'◆'};
  a.textContent=av[p.avatar]||'✦';n.textContent=p.name;
})();
