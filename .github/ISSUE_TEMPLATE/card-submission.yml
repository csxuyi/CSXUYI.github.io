name: 🃏 卡牌投稿
description: 提交新卡牌到 星穹祈愿 投稿池，等待审核后加入抽卡池
title: "[投稿] "
labels: ["submission"]
body:
  - type: markdown
    attributes:
      value: "### 提交后等待管理员审核。审核通过后卡牌将加入抽卡池。"
  - type: input
    id: name
    attributes:
      label: 角色名称
      placeholder: "例如：星穹旅人"
    validations:
      required: true
  - type: dropdown
    id: rarity
    attributes:
      label: 稀有度
      options:
        - "3★"
        - "4★"
        - "5★"
        - "6★"
    validations:
      required: true
  - type: input
    id: image
    attributes:
      label: 图片 URL
      description: 卡牌图片的直链地址（需能公开访问，推荐用图床）
      placeholder: "https://example.com/image.jpg"
    validations:
      required: true
  - type: textarea
    id: desc
    attributes:
      label: 卡牌描述
      description: 简短的描述文字，将显示在卡牌背面
      placeholder: "例如：来自星海的旅人，怀揣着对未知的渴望..."
    validations:
      required: true
  - type: input
    id: author
    attributes:
      label: 投稿人（选填）
      placeholder: "你的名字"
    validations:
      required: false
