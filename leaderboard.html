<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X[LEADERBOARD] · xLab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#D4B87A;--g2:#E8D5A3;--g3:#F5E6CC;--g4:#B89A50;
  --purple:#B08FFF;--text:#E8E0D0;--t2:#9999AA;--t3:#666680;
  --ft:"Noto Serif SC","STSong","SimSun",serif;
  --fu:"Inter","PingFang SC","Microsoft YaHei",sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow-x:hidden}
body{
  font-family:var(--fu);background:#05081a;color:var(--text);
  -webkit-font-smoothing:antialiased;min-height:100vh;
}
canvas#starfield{position:fixed;inset:0;z-index:0;pointer-events:none}

.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:20;
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:10px 22px;
  background:rgba(8,12,22,0.42);backdrop-filter:blur(14px) saturate(140%);
  -webkit-backdrop-filter:blur(14px) saturate(140%);
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.back-arrow{
  font-family:"JetBrains Mono",monospace;font-size:.82rem;
  color:var(--gold);text-decoration:none;
  display:flex;align-items:center;gap:6px;
  background:rgba(212,184,122,0.06);border:1px solid rgba(212,184,122,0.22);
  border-radius:6px;padding:7px 12px;transition:all .25s;
}
.back-arrow:hover{border-color:var(--gold);background:rgba(212,184,122,0.12)}
.banner-title{
  font-family:"JetBrains Mono",monospace;font-size:.82rem;letter-spacing:.06em;
  background:linear-gradient(180deg,var(--g3),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.banner-title::before{content:'X[ ';color:#7aa9ff;-webkit-text-fill-color:#7aa9ff}
.banner-title::after{content:' ]';color:#7aa9ff;-webkit-text-fill-color:#7aa9ff}

.page{
  position:relative;z-index:1;
  padding:80px 20px 40px;
  max-width:700px;margin:0 auto;
}
.page-title{
  font-family:var(--ft);font-size:2rem;font-weight:900;text-align:center;
  background:linear-gradient(180deg,var(--g3),var(--gold),var(--g4));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:8px;letter-spacing:0.1em;
}
.page-subtitle{text-align:center;font-size:0.82rem;color:var(--t2);margin-bottom:32px}

.glass-card{
  border-radius:20px;padding:24px;
  background:rgba(18,22,40,0.40);backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-top:1px solid rgba(255,255,255,0.10);
  border-left:1px solid rgba(255,255,255,0.06);
  border-right:1px solid rgba(255,255,255,0.03);
  border-bottom:1px solid rgba(255,255,255,0.01);
  box-shadow:0 12px 40px rgba(0,0,0,0.4);
}

.lb-table{width:100%;border-collapse:collapse}
.lb-table th{
  text-align:left;padding:10px 8px;font-size:0.68rem;color:var(--t2);
  letter-spacing:0.1em;font-family:"JetBrains Mono",monospace;
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.lb-table td{padding:10px 8px;font-size:0.8rem;border-bottom:1px solid rgba(255,255,255,0.04)}
.lb-table tr:hover td{background:rgba(255,255,255,0.02)}
.lb-rank{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:0.9rem;width:40px}
.lb-rank.gold{color:var(--gold)}.lb-rank.silver{color:#c0c0c0}.lb-rank.bronze{color:#cd7f32}
.lb-avatar{width:28px;height:28px;border-radius:50%}
.lb-name{font-weight:600}
.lb-stat{text-align:center;font-family:"JetBrains Mono",monospace;font-size:0.72rem;color:var(--t2)}
.lb-stat.big{font-size:0.85rem;color:var(--g2)}
.loading{text-align:center;padding:40px;color:var(--t2)}
.error{text-align:center;padding:40px;color:#ff9098}

@media(max-width:480px){
  .page-title{font-size:1.5rem}
  .glass-card{padding:16px 10px}
  .lb-table th,.lb-table td{padding:8px 4px;font-size:0.7rem}
  .lb-stat{font-size:0.65rem}.lb-stat.big{font-size:0.75rem}
}
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<!-- Auth guard -->
<script>
if(!localStorage.getItem('xlab-profile')&&!sessionStorage.getItem('gh_token')){location.replace('login.html')}
</script>

<div class="top-bar">
  <a href="index.html" class="back-arrow">← 主页</a>
  <span class="banner-title">LEADERBOARD</span>
  <div></div>
</div>

<main class="page">
  <h1 class="page-title">答题排行榜</h1>
  <p class="page-subtitle">— TOP 20 · 云端同步 —</p>

  <div class="glass-card">
    <div class="loading" id="lb-loading">正在加载排行榜...</div>
    <div class="error" id="lb-error" style="display:none">加载失败，请稍后重试</div>
    <table class="lb-table" id="lb-table" style="display:none">
      <thead><tr>
        <th>#</th><th></th><th>用户</th><th>答题</th><th>正确</th><th>准确率</th><th>最高分</th>
      </tr></thead>
      <tbody id="lb-tbody"></tbody>
    </table>
  </div>
</main>

<script>
(function(){
var c=document.getElementById('starfield');
var ctx=c.getContext('2d');
var w,h,stars=[];
function resize(){w=c.width=innerWidth;h=c.height=innerHeight}
resize();addEventListener('resize',resize);
for(var i=0;i<80;i++)stars.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,s:Math.random()*.3+.3});
function draw(t){ctx.clearRect(0,0,w,h);var tw=.6+.4*Math.sin(t*.001);stars.forEach(function(s){var sy=h>w?.9:1;ctx.beginPath();ctx.arc(s.x,s.y*w/h*window.innerHeight/(window.innerWidth||1)*sy,s.r,0,Math.PI*2);ctx.fillStyle='rgba(255,225,160,'+(s.s*tw)+')';ctx.fill()});requestAnimationFrame(draw)}
requestAnimationFrame(draw);
})();
</script>

<script>
var WORKER_URL='https://xlab-auth.xlab-stellarvault.workers.dev';

fetch(WORKER_URL+'/api/leaderboard')
.then(function(r){return r.json()})
.then(function(data){
  document.getElementById('lb-loading').style.display='none';
  var entries=data.entries||[];
  if(!entries.length){
    document.getElementById('lb-loading').style.display='block';
    document.getElementById('lb-loading').textContent='还没有人上榜，快去答题吧！';
    return;
  }
  document.getElementById('lb-table').style.display='';
  var html='';
  entries.forEach(function(e,i){
    var rank=i+1;
    var rc=rank===1?'gold':rank===2?'silver':rank===3?'bronze':'';
    html+='<tr>';
    html+='<td class="lb-rank '+rc+'">'+(rank<=3?['🥇','🥈','🥉'][i]:rank)+'</td>';
    html+='<td><img class="lb-avatar" src="'+e.avatar+'" onerror="this.style.display=\'none\'" alt=""></td>';
    html+='<td class="lb-name">'+e.login+'</td>';
    html+='<td class="lb-stat big">'+e.totalQ+'</td>';
    html+='<td class="lb-stat">'+e.totalC+'</td>';
    html+='<td class="lb-stat">'+e.accuracy+'%</td>';
    html+='<td class="lb-stat">'+e.highScore+'/10</td>';
    html+='</tr>';
  });
  document.getElementById('lb-tbody').innerHTML=html;
})
.catch(function(){
  document.getElementById('lb-loading').style.display='none';
  document.getElementById('lb-error').style.display='';
});
</script>

<script src="assets/page-transition.js"></script>
</body>
</html>
