<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X[AUTH] · xLab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   VARIABLES & RESET
============================================================ */
:root{
  --gold:#D4B87A;--g2:#E8D5A3;--g3:#F5E6CC;--g4:#B89A50;
  --purple:#B08FFF;--p2:#c8b0ff;
  --text:#E8E0D0;--t2:#9999AA;--t3:#666680;
  --ft:"Noto Serif SC","STSong","SimSun",serif;
  --fu:"Inter","PingFang SC","Microsoft YaHei",sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#05081a;color:var(--text);
  font-family:var(--fu);
  -webkit-font-smoothing:antialiased;
}

/* ============================================================
   STAR CANVAS
============================================================ */
#star-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ============================================================
   VIGNETTE
============================================================ */
.vignette{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse at 50% 40%, transparent 30%, rgba(0,0,0,0.55) 100%);
}

/* ============================================================
   HERO LAYOUT
============================================================ */
.hero{
  position:relative;z-index:2;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 20px;text-align:center;
}

/* Brand tag */
.brand{
  font-family:"JetBrains Mono",ui-monospace,monospace;font-size:0.7rem;
  letter-spacing:0.32em;color:var(--gold);opacity:0.9;
  border:1px solid rgba(212,184,122,0.35);
  padding:4px 10px;border-radius:4px;margin-bottom:14px;
  background:rgba(212,184,122,0.06);
}

/* Logo */
.logo{
  font-family:"JetBrains Mono","SF Mono","Menlo",ui-monospace,monospace;
  font-size:clamp(1.6rem,3.8vw,2.6rem);font-weight:700;
  background:linear-gradient(180deg,var(--g3),var(--gold),var(--g4));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:4px;letter-spacing:0.02em;
  text-shadow:0 0 80px rgba(212,184,122,0.3);
  white-space:nowrap;
}
.logo .lb{color:#7aa9ff;-webkit-text-fill-color:#7aa9ff;opacity:.85}
.logo .cur{
  display:inline-block;width:0.55ch;height:1em;background:var(--gold);
  margin-left:4px;vertical-align:-0.12em;
  animation:cur-blink 1.05s steps(1) infinite;
}
@keyframes cur-blink{50%{opacity:0}}

/* Subtitle */
.subtag{
  font-family:"JetBrains Mono",ui-monospace,monospace;
  font-size:0.76rem;color:var(--t2);letter-spacing:0.16em;
  margin-bottom:32px;opacity:0.8;
}

/* ============================================================
   LOGIN CARD — Frosted Glass
============================================================ */
.login-card{
  width:min(440px,92vw);
  padding:36px 28px 28px;border-radius:24px;
  /* Frosted glass core */
  background:rgba(18,22,40,0.30);
  backdrop-filter:blur(14px) saturate(150%) brightness(1.05);
  -webkit-backdrop-filter:blur(14px) saturate(150%) brightness(1.05);
  /* Directional borders */
  border-top:1px solid rgba(255,255,255,0.16);
  border-left:1px solid rgba(255,255,255,0.12);
  border-right:1px solid rgba(255,255,255,0.05);
  border-bottom:1px solid rgba(255,255,255,0.03);
  /* Multi-layer shadow for glass depth */
  box-shadow:
    0 20px 50px rgba(0,0,0,0.45),
    0 0 0 1px rgba(255,255,255,0.02) inset,
    0 1px 0 rgba(255,255,255,0.05) inset;
  transition:transform 0.4s cubic-bezier(0.22,1,0.36,1);
}

/* ============================================================
   FORM SECTIONS
============================================================ */
.login-section{margin-bottom:22px;text-align:left}
.login-label{
  display:block;
  font-family:"JetBrains Mono",ui-monospace,monospace;
  font-size:0.72rem;color:var(--t2);letter-spacing:0.1em;
  margin-bottom:8px;
}
.login-label::before{content:'▸ ';color:var(--gold)}

/* Name input */
.name-input-wrap{position:relative}
.name-input{
  width:100%;padding:12px 16px;border-radius:10px;
  font-family:"JetBrains Mono",ui-monospace,monospace;
  font-size:0.9rem;color:var(--g3);
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  border-top:1px solid rgba(255,255,255,0.12);
  border-left:1px solid rgba(255,255,255,0.08);
  border-right:1px solid rgba(255,255,255,0.04);
  border-bottom:1px solid rgba(255,255,255,0.02);
  outline:none;transition:all 0.3s ease;
  box-shadow:0 4px 16px rgba(0,0,0,0.25),0 0 0 1px rgba(255,255,255,0.01) inset;
  letter-spacing:0.04em;
}
.name-input::placeholder{color:var(--t3);opacity:0.6}
.name-input:focus{
  border-top-color:rgba(212,184,122,0.35);
  border-left-color:rgba(212,184,122,0.25);
  box-shadow:0 0 24px rgba(212,184,122,0.1),0 4px 16px rgba(0,0,0,0.3);
}
.input-hint{
  font-size:0.65rem;color:var(--t3);margin-top:6px;
  font-family:"JetBrains Mono",ui-monospace,monospace;
}

/* Error state */
.name-input.error{
  border-top-color:rgba(255,120,130,0.45)!important;
  border-left-color:rgba(255,120,130,0.30)!important;
  box-shadow:0 0 20px rgba(255,100,110,0.12)!important;
}
.input-error{
  font-size:0.65rem;color:#ff9098;margin-top:4px;
  font-family:"JetBrains Mono",ui-monospace,monospace;
  display:none;
}

/* ============================================================
   AVATAR GRID
============================================================ */
.avatar-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:14px;
  max-width:280px;margin:0 auto;
}
.avatar-option{
  width:72px;height:72px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;
  /* Frosted glass orb */
  background:rgba(18,22,40,0.28);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  border-top:1px solid rgba(255,255,255,0.14);
  border-left:1px solid rgba(255,255,255,0.10);
  border-right:1px solid rgba(255,255,255,0.04);
  border-bottom:1px solid rgba(255,255,255,0.02);
  cursor:pointer;
  transition:all 0.3s cubic-bezier(0.22,1,0.36,1);
  box-shadow:0 6px 20px rgba(0,0,0,0.35),0 0 0 1px rgba(255,255,255,0.02) inset;
  margin:0 auto;
}
.avatar-option:hover{
  transform:translateY(-3px);
  border-top-color:rgba(255,255,255,0.22);
  box-shadow:0 10px 28px rgba(0,0,0,0.45),0 0 0 1px rgba(255,255,255,0.04) inset;
}
.avatar-option.selected{
  border-top-color:rgba(212,184,122,0.5)!important;
  border-left-color:rgba(212,184,122,0.35)!important;
  border-right-color:rgba(212,184,122,0.2)!important;
  border-bottom-color:rgba(212,184,122,0.12)!important;
  box-shadow:
    0 0 28px rgba(212,184,122,0.3),
    0 0 60px rgba(212,184,122,0.1),
    0 8px 24px rgba(0,0,0,0.4),
    0 0 0 1px rgba(255,255,255,0.05) inset!important;
  transform:translateY(-2px);
}

/* ============================================================
   ENTER BUTTON
============================================================ */
.btn-wrap{text-align:center;margin-top:28px}
.btn-enter{
  position:relative;padding:14px 48px;
  border:none;border-radius:8px;
  background:linear-gradient(180deg,rgba(30,22,60,0.85),rgba(14,10,32,0.95));
  color:var(--g2);font-size:1rem;font-weight:600;
  font-family:var(--ft);letter-spacing:3px;
  cursor:pointer;overflow:hidden;outline:none;
  transition:all 0.25s;
  clip-path:polygon(8px 0,calc(100% - 8px) 0,100% 8px,100% calc(100% - 8px),calc(100% - 8px) 100%,8px 100%,0 calc(100% - 8px),0 8px);
}
.btn-enter::before{
  content:"";position:absolute;inset:1px;border-radius:6px;
  background:linear-gradient(180deg,rgba(25,18,55,0.7),rgba(10,8,28,0.9));
  z-index:-1;
}
.btn-enter::after{
  content:"";position:absolute;inset:0;border-radius:6px;padding:1.5px;
  background:linear-gradient(135deg,rgba(212,184,122,0.5),rgba(176,143,255,0.3),rgba(212,184,122,0.2));
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  z-index:1;pointer-events:none;
}
.btn-enter .sweep{
  position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);
  transform:skewX(-25deg);z-index:2;pointer-events:none;
  animation:sweep-move 3.5s ease-in-out infinite;
}
@keyframes sweep-move{0%{left:-100%}100%{left:200%}}
.btn-enter:hover:not(:disabled){
  transform:translateY(-2px);
  box-shadow:0 0 26px rgba(212,184,122,0.35),0 0 50px rgba(176,143,255,0.14);
}
.btn-enter:active:not(:disabled){
  transform:scale(0.96);
  box-shadow:inset 0 3px 8px rgba(0,0,0,0.5);
}
.btn-enter:disabled{opacity:0.35;cursor:not-allowed;filter:grayscale(0.4)}

/* ============================================================
   AUTH DIVIDER
============================================================ */
.auth-divider{
  display:flex;align-items:center;gap:12px;
  margin:20px 0 16px;
  font-family:"JetBrains Mono",ui-monospace,monospace;
  font-size:0.65rem;color:var(--t3);letter-spacing:0.12em;
}
.auth-divider::before,.auth-divider::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);
}

/* ============================================================
   GITHUB LOGIN BUTTON
============================================================ */
.btn-github{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  width:100%;max-width:280px;padding:11px 20px;border-radius:10px;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  border-top:1px solid rgba(255,255,255,0.12);
  border-left:1px solid rgba(255,255,255,0.08);
  border-right:1px solid rgba(255,255,255,0.04);
  border-bottom:1px solid rgba(255,255,255,0.02);
  color:var(--text);font-size:0.85rem;
  font-family:"Inter","PingFang SC",sans-serif;font-weight:500;
  cursor:pointer;transition:all 0.3s cubic-bezier(0.22,1,0.36,1);
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
}
.btn-github:hover{
  border-top-color:rgba(255,255,255,0.22);
  border-left-color:rgba(255,255,255,0.14);
  background:rgba(255,255,255,0.07);
  box-shadow:0 8px 28px rgba(0,0,0,0.45),0 0 20px rgba(255,255,255,0.04);
  transform:translateY(-2px);
}
.btn-github:active{transform:scale(0.97)}
.gh-icon{opacity:0.85}
.gh-note{
  margin-top:8px;font-size:0.62rem;color:var(--t3);
  font-family:"JetBrains Mono",ui-monospace,monospace;
  letter-spacing:0.04em;
}

/* ============================================================
   WELCOME BACK (when profile exists)
============================================================ */
.welcome-back{
  margin-top:20px;padding:14px 18px;border-radius:12px;
  background:rgba(14,18,32,0.30);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  border-top:1px solid rgba(255,255,255,0.08);
  border-left:1px solid rgba(255,255,255,0.05);
  border-right:1px solid rgba(255,255,255,0.02);
  border-bottom:1px solid rgba(255,255,255,0.01);
  display:none;text-align:center;
}
.welcome-back.show{display:block}
.wb-avatar{
  display:inline-block;width:40px;height:40px;border-radius:50%;
  background:rgba(18,22,40,0.35);
  border-top:1px solid rgba(212,184,122,0.3);
  border-left:1px solid rgba(212,184,122,0.18);
  border-right:1px solid rgba(212,184,122,0.08);
  border-bottom:1px solid rgba(212,184,122,0.04);
  line-height:40px;font-size:1.3rem;margin-bottom:8px;
}
.wb-text{
  font-family:var(--ft);font-size:0.95rem;color:var(--g2);
  letter-spacing:0.08em;margin-bottom:8px;
}
.wb-name{color:var(--g3);font-weight:700}
.wb-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.wb-link{
  display:inline-block;padding:6px 16px;border-radius:8px;
  font-family:"JetBrains Mono",ui-monospace,monospace;
  font-size:0.72rem;text-decoration:none;letter-spacing:0.08em;
  transition:all 0.25s ease;
}
.wb-link.primary{
  background:rgba(212,184,122,0.12);
  border:1px solid rgba(212,184,122,0.3);
  color:var(--g3);
}
.wb-link.primary:hover{
  background:rgba(212,184,122,0.2);
  border-color:rgba(212,184,122,0.5);
  box-shadow:0 0 16px rgba(212,184,122,0.15);
}
.wb-link.secondary{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.1);
  color:var(--t2);
}
.wb-link.secondary:hover{
  border-color:rgba(255,255,255,0.2);
  color:var(--text);
}

/* ============================================================
   FOOTER
============================================================ */
.footer{
  position:fixed;bottom:0;left:0;right:0;z-index:2;
  padding:20px;text-align:center;
  font-size:0.7rem;color:var(--t2);
  letter-spacing:0.1em;
}

/* ============================================================
   RESPONSIVE
============================================================ */
@media(max-width:480px){
  .login-card{padding:24px 16px 20px}
  .avatar-grid{gap:10px}
  .avatar-option{width:56px;height:56px;font-size:1.4rem}
  .btn-enter{padding:12px 36px;font-size:0.9rem;letter-spacing:2px}
}
</style>

<script>
/* ==========================================================================
   Star Particle Canvas — 70 particles with links
   (adapted from index.html)
   ========================================================================== */
(function(){
  const c = document.getElementById('star-canvas');
  if(!c) return;
  const ctx = c.getContext('2d');
  const P = 60;
  let W, H;
  const particles = [];

  function resize(){ W=c.width=innerWidth; H=c.height=innerHeight; }
  resize(); addEventListener('resize', resize);

  for(let i=0;i<P;i++){
    particles.push({
      x:Math.random()*W, y:Math.random()*H,
      vx:(Math.random()-.5)*.3, vy:(Math.random()-.5)*.3,
      r:Math.random()*2+.5,
      phase:Math.random()*Math.PI*2,
    });
  }

  function draw(now){
    const t=now*0.001;
    ctx.clearRect(0,0,W,H);

    for(const p of particles){
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>W) p.vx*=-1;
      if(p.y<0||p.y>H) p.vy*=-1;
      p.vx*=.995; p.vy*=.995;

      const twinkle=.35+.65*Math.sin(t*2.2+p.phase);
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(220,200,160,${twinkle*.75})`;
      ctx.fill();
    }

    // Particle-to-particle links
    for(let i=0;i<P;i++){
      for(let j=i+1;j<P;j++){
        const a=particles[i],b=particles[j];
        const dx=a.x-b.x, dy=a.y-b.y;
        const d2=dx*dx+dy*dy;
        if(d2<14000){
          const alpha=(1-d2/14000)*.4;
          ctx.strokeStyle=`rgba(170,200,240,${alpha})`;
          ctx.lineWidth=.5;
          ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
</script>

<script>
/* ==========================================================================
   Login Logic
   ========================================================================== */
(function(){
  const AVATARS = [
    { key:'stellar',   emoji:'✦', label:'星辰' },
    { key:'moon',      emoji:'☾', label:'皓月' },
    { key:'comet',     emoji:'☄', label:'彗星' },
    { key:'nova',      emoji:'✧', label:'新星' },
    { key:'galaxy',    emoji:'◈', label:'银河' },
    { key:'astronaut', emoji:'◆', label:'旅者' },
  ];

  var profile = null;
  var selectedAvatar = AVATARS[0].key;
  try {
    var raw = localStorage.getItem('xlab-profile');
    if(raw) profile = JSON.parse(raw);
  } catch(e){}

  // ---- GitHub login state
  var ghUser = null;
  try {
    var ghRaw = sessionStorage.getItem('gh_user');
    if(ghRaw) ghUser = JSON.parse(ghRaw);
  } catch(e){}

  // ---- Logout mode
  if(/[?&]logout=1/.test(location.search)){
    localStorage.removeItem('xlab-profile');
    profile = null;
    sessionStorage.removeItem('gh_token');
    sessionStorage.removeItem('gh_user');
    ghUser = null;
    if(history.replaceState) history.replaceState(null,'',location.pathname);
  }

  // ---- If GitHub logged in, show GitHub welcome (hide guest form)
  if(ghUser){
    document.getElementById('subtag-line').textContent = '▸ github.user.verified()';
    var card = document.getElementById('login-card');
    var hiders = card.querySelectorAll('.login-section,.btn-wrap,.auth-divider,.btn-github,.gh-note');
    for(var i=0;i<hiders.length;i++) hiders[i].style.display = 'none';
    var wb = document.getElementById('welcome-back');
    wb.classList.add('show');
    var wba = document.getElementById('wb-avatar');
    wba.textContent = '';
    var img = document.createElement('img');
    img.src = ghUser.avatar_url; img.style.width = '40px'; img.style.height = '40px'; img.style.borderRadius = '50%';
    wba.appendChild(img);
    wba.style.background = 'transparent'; wba.style.border = 'none';
    document.getElementById('wb-name').textContent = ghUser.login;
    document.querySelector('.wb-text').innerHTML = '已通过 <b style=\"color:#fff\">GitHub</b> 登录';
    document.getElementById('wb-enter').textContent = '返回主页 ▸';
    document.getElementById('wb-enter').href = 'index.html';
    document.getElementById('wb-reset').textContent = '登出 GitHub';
    document.getElementById('wb-reset').href = '?logout=1';
    // No need to continue with guest form setup
  } else {

  // ---- Build avatar grid
  var grid = document.getElementById('avatar-grid');
  AVATARS.forEach(function(a){
    var opt = document.createElement('div');
    opt.className = 'avatar-option';
    opt.textContent = a.emoji;
    opt.title = a.label;
    opt.setAttribute('data-key', a.key);
    opt.addEventListener('click', function(){
      selectedAvatar = a.key;
      document.querySelectorAll('.avatar-option').forEach(function(el){ el.classList.remove('selected'); });
      opt.classList.add('selected');
    });
    grid.appendChild(opt);
  });

  // Pre-select: from existing profile, or default
  if(profile && profile.avatar){
    selectedAvatar = profile.avatar;
  }
  var selEl = grid.querySelector('[data-key="'+selectedAvatar+'"]');
  if(selEl) selEl.classList.add('selected');
  else grid.firstElementChild.classList.add('selected');

  // ---- Populate name input
  var nameInput = document.getElementById('traveler-name');
  var nameError = document.getElementById('name-error');
  if(profile && profile.name){
    nameInput.value = profile.name;
  }

  // ---- Welcome back
  var wb = document.getElementById('welcome-back');
  var wbName = document.getElementById('wb-name');
  var wbAvatar = document.getElementById('wb-avatar');
  if(profile){
    wb.classList.add('show');
    wbName.textContent = profile.name;
    // Find matching avatar emoji
    var av = AVATARS.find(function(a){ return a.key === profile.avatar; });
    wbAvatar.textContent = av ? av.emoji : '✦';
  }else{
    wb.classList.remove('show');
  }

  // ---- Name validation
  function validateName(name){
    var trimmed = name.trim();
    if(trimmed.length < 2) return '旅者之名至少需要 2 个字符';
    if(trimmed.length > 16) return '旅者之名不能超过 16 个字符';
    return null;
  }

  nameInput.addEventListener('input', function(){
    nameInput.classList.remove('error');
    nameError.style.display = 'none';
  });

  // ---- Enter button
  var btnEnter = document.getElementById('btn-enter');
  btnEnter.addEventListener('click', function(e){
    var name = nameInput.value.trim();
    var err = validateName(name);
    if(err){
      nameInput.classList.add('error');
      nameError.textContent = err;
      nameError.style.display = 'block';
      return;
    }

    // Save profile
    var newProfile = {
      name: name,
      avatar: selectedAvatar,
      createdAt: profile ? profile.createdAt : Date.now()
    };
    localStorage.setItem('xlab-profile', JSON.stringify(newProfile));

    // Wormhole transition to index
    var x = e.clientX || innerWidth/2;
    var y = e.clientY || innerHeight/2;

    // Try to use the wormhole transition if available
    if(window.XLabWormhole && window.XLabWormhole.start){
      window.XLabWormhole.start('index.html', x, y, btnEnter);
    }else{
      // Simple fallback with entry animation param
      location.href = 'index.html?from=' + Math.round(x) + ',' + Math.round(y);
    }
  });

  // ---- Enter key submits
  nameInput.addEventListener('keydown', function(e){
    if(e.key === 'Enter') btnEnter.click();
  });

  // ---- Auto-focus name input
  setTimeout(function(){
    if(!profile || /[?&]logout=1/.test(location.search)){
      nameInput.focus();
    }
  }, 400);
  } // end else (not GitHub)
})();
</script>

<script src="assets/sync.js"></script>
<script src="assets/wormhole.js" defer></script>

<script src="assets/page-transition.js"></script>
</body>
</html>
