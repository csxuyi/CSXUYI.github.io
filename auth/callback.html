<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X[AUTH_CALLBACK] · xLab</title>
<style>
:root{
  --gold:#D4B87A;--g2:#E8D5A3;--g3:#F5E6CC;
  --text:#E8E0D0;--t2:#9999AA;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#05081a;color:var(--text);
  font-family:"Inter","PingFang SC","Microsoft YaHei",sans-serif;
  -webkit-font-smoothing:antialiased;
  display:flex;align-items:center;justify-content:center;
}
.card{
  text-align:center;padding:40px 32px;border-radius:20px;
  background:rgba(18,22,40,0.30);
  backdrop-filter:blur(14px) saturate(150%);
  -webkit-backdrop-filter:blur(14px) saturate(150%);
  border-top:1px solid rgba(255,255,255,0.12);
  border-left:1px solid rgba(255,255,255,0.08);
  border-right:1px solid rgba(255,255,255,0.04);
  border-bottom:1px solid rgba(255,255,255,0.02);
  box-shadow:0 20px 50px rgba(0,0,0,0.45);
  max-width:380px;width:90vw;
}
.spinner{
  width:40px;height:40px;border-radius:50%;
  border:2px solid rgba(212,184,122,0.2);
  border-top-color:var(--gold);
  animation:spin 0.8s linear infinite;
  margin:0 auto 20px;
}
@keyframes spin{to{transform:rotate(360deg)}}
h2{
  font-family:"Noto Serif SC",serif;
  font-size:1.1rem;color:var(--g2);letter-spacing:0.08em;margin-bottom:8px;
}
p{font-size:0.8rem;color:var(--t2);line-height:1.6}
.error{color:#ff9098;margin-top:12px;display:none}
.btn{
  display:inline-block;margin-top:16px;padding:8px 20px;border-radius:8px;
  border:1px solid rgba(212,184,122,0.3);background:rgba(212,184,122,0.08);
  color:var(--g2);text-decoration:none;font-size:0.78rem;
  cursor:pointer;transition:all 0.25s;font-family:inherit;
}
.btn:hover{border-color:var(--gold);background:rgba(212,184,122,0.15)}
</style>
</head>
<body>
<!-- Page transition overlay -->
<div id="pt-overlay" style="position:fixed;inset:0;z-index:9999;pointer-events:none;background:radial-gradient(ellipse at 50% 50%,rgba(5,8,26,0.92),rgba(2,2,12,0.98));opacity:0;transition:opacity 0.35s ease"></div>
<div class="card">
  <div class="spinner" id="spinner"></div>
  <h2 id="status">正在验证身份...</h2>
  <p id="detail">通过 GitHub OAuth 换取访问凭证</p>
  <p class="error" id="error"></p>
  <a class="btn" id="retry" style="display:none" href="../login.html">返回登录页</a>
</div>

<script src="../assets/sync.js"></script>
<script>
(async function(){
  var status = document.getElementById('status');
  var detail = document.getElementById('detail');
  var error = document.getElementById('error');
  var spinner = document.getElementById('spinner');
  var retry = document.getElementById('retry');

  // 检查 URL 是否有 code
  var params = new URLSearchParams(location.search);
  var code = params.get('code');
  if(!code){
    showError('缺少授权码 (code)，请重新登录');
    return;
  }

  // 调用 Worker 换 token
  detail.textContent = '正在通过 Cloudflare Worker 换取访问凭证...';
  var result = await GitHubAuth.handleCallback();

  if(result.error){
    showError(result.error);
    return;
  }

  // 同步云端数据
  status.textContent = '正在同步数据...';
  detail.textContent = '从 GitHub Gist 拉取云端存档';
  spinner.style.display = 'block';

  var syncResult = await SyncVault.pull();
  if(syncResult.error){
    // 同步失败不阻断登录——使用本地数据
    console.warn('数据同步失败，使用本地数据:', syncResult.error);
  }

  // 成功 — 跳转到主页
  status.textContent = '验证成功 ✦';
  detail.textContent = '即将踏入星穹...';
  spinner.style.display = 'none';

  // 清理 URL 中的 code 参数，跳转
  setTimeout(function(){
    location.replace('../index.html?from=oauth');
  }, 600);

  function showError(msg){
    spinner.style.display = 'none';
    status.textContent = '验证失败';
    status.style.color = '#ff9098';
    detail.textContent = '';
    error.textContent = msg;
    error.style.display = 'block';
    retry.style.display = 'inline-block';
  }
})();
</script>
<script src="assets/page-transition.js"></script>
</body>
</html>
